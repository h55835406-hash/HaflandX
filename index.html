<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X Ultra</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --main: #3388FF;
            --main-rgb: 51, 136, 255;
            --bg: #060912;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #F8FAFC;
            --text-sec: #94A3B8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        .light-theme {
            --bg: #F0F4F9;
            --glass: rgba(0, 0, 0, 0.02);
            --glass-thick: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text: #1E293B;
            --text-sec: #64748B;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(var(--main-rgb), 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(var(--main-rgb), 0.1) 0%, transparent 40%);
        }

        .screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            background: var(--bg);
            z-index: 10;
        }

        .screen.active { 
            display: flex;
            animation: screenIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes screenIn { 
            from { transform: scale(1.05); opacity: 0; filter: blur(10px); } 
            to { transform: scale(1); opacity: 1; filter: blur(0); } 
        }

        .header {
            padding: calc(20px + var(--safe-top)) 24px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(30px) saturate(180%); 
            background: var(--glass-thick);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-header { display: flex; align-items: center; gap: 12px; }
        .brand-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-header img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--main)); }

        .scroll-area { 
            flex: 1; overflow-y: auto; 
            padding-bottom: 120px; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .input-field {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 18px 24px; color: var(--text);
            font-size: 16px; width: 100%; outline: none; 
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus { border-color: var(--main); background: var(--glass-thick); box-shadow: 0 0 0 4px rgba(var(--main-rgb), 0.1); }

        .btn-main {
            background: var(--main); color: #fff; border: none; border-radius: 22px;
            padding: 20px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 15px 30px rgba(var(--main-rgb), 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: var(--glass-thick);
            backdrop-filter: blur(40px) saturate(150%); 
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex; justify-content: space-around;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); transition: 0.3s; }
        .nav-item.active { color: var(--main); }

        .card {
            margin: 12px 20px; padding: 18px; 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            display: flex; align-items: center; gap: 16px;
        }
        .card:active { transform: scale(0.98); background: var(--glass-thick); }

        .avatar { width: 56px; height: 56px; border-radius: 20px; object-fit: cover; background: var(--glass-thick); }

        /* Floating Streak Island */
        .streak-island {
            align-self: center;
            margin: 20px 0;
            padding: 10px 18px;
            background: var(--glass-thick);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            display: flex; align-items: center; gap: 10px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .bubble {
            max-width: 80%; padding: 16px 20px; border-radius: 24px; font-size: 15px; margin: 4px 0;
            line-height: 1.4; position: relative; word-wrap: break-word;
        }
        .bubble.my { 
            align-self: flex-end; background: var(--main); color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 8px 20px rgba(var(--main-rgb), 0.2);
        }
        .bubble.other { 
            align-self: flex-start; background: var(--glass-thick); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; 
        }
        
        .sticker-msg { width: 150px; height: 150px; object-fit: contain; margin: 10px 0; align-self: flex-end; }
        .sticker-msg.other { align-self: flex-start; }

        .toggle { width: 52px; height: 30px; background: var(--glass-thick); border-radius: 20px; position: relative; cursor: pointer; }
        .toggle.on { background: var(--main); }
        .toggle::after { content: ''; position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toggle.on::after { left: 26px; }

        .streak-tag {
            background: rgba(255, 100, 0, 0.15); color: #FF7800;
            padding: 6px 12px; border-radius: 14px; font-size: 13px; font-weight: 700;
            backdrop-filter: blur(5px);
        }

        /* Keyboard Panel for Stickers */
        .kb-panel {
            background: var(--glass-thick); backdrop-filter: blur(40px);
            border-top: 1px solid var(--glass-border);
            height: 0; transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .kb-panel.open { height: 300px; padding-bottom: var(--safe-bottom); }
        .sticker-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px;
            overflow-y: auto; flex: 1;
        }
        .sticker-grid img { width: 100%; aspect-ratio: 1; border-radius: 12px; background: var(--glass); object-fit: cover; }
        .kb-tabs { display: flex; border-bottom: 1px solid var(--glass-border); }
        .kb-tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: 800; color: var(--text-sec); }
        .kb-tab.active { color: var(--main); border-bottom: 2px solid var(--main); }

        /* Group Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg); border: 1px solid var(--glass-border); border-radius: 30px; width: 100%; max-width: 400px; padding: 30px; }

        #chat-msgs { padding: 20px; display: flex; flex-direction: column; gap: 4px; }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="screen-login" class="screen active">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <div style="text-align:center; margin-bottom:60px">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:100px; filter: drop-shadow(0 0 15px var(--main));">
                <h1 style="font-size:36px; margin-top:20px; font-weight:900; letter-spacing:-1px">Hafland X</h1>
            </div>
            <div style="display:flex; flex-direction:column; gap:12px">
                <input type="text" id="l-nick" class="input-field" placeholder="Никнейм">
                <input type="password" id="l-pass" class="input-field" placeholder="Пароль">
                <button class="btn-main" onclick="authAction('login')" style="margin-top:10px">ВОЙТИ В СИСТЕМУ</button>
            </div>
            <p style="text-align:center; margin-top:30px; color:var(--text-sec); font-size:14px">
                Нет аккаунта? <span style="color:var(--main); font-weight:600" onclick="go('screen-reg')">Создать</span>
            </p>
        </div>
    </div>

    <div id="screen-reg" class="screen">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <h1 style="font-size:32px; font-weight:900; margin-bottom:40px">Регистрация</h1>
            <div style="display:flex; flex-direction:column; gap:12px">
                <input type="text" id="r-nick" class="input-field" placeholder="Придумайте ник">
                <input type="password" id="r-pass" class="input-field" placeholder="Пароль">
                <div style="background:var(--glass); padding:18px; border-radius:20px; border:1px solid var(--glass-border); margin-bottom:15px">
                    <label style="display:flex; gap:12px; font-size:12px; color:var(--text-sec); line-height:1.4">
                        <input type="checkbox" id="r-agree" style="width:18px; height:18px; accent-color:var(--main)">
                        Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент.
                    </label>
                </div>
                <button class="btn-main" onclick="authAction('reg')">ПОДТВЕРДИТЬ</button>
            </div>
            <p style="text-align:center; margin-top:30px; color:var(--text-sec)" onclick="go('screen-login')">Уже с нами? <span style="color:var(--main); font-weight:600">Войти</span></p>
        </div>
    </div>

    <!-- Main -->
    <div id="screen-main" class="screen">
        <header class="header">
            <div class="brand-header">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png">
                <h1>Hafland X</h1>
            </div>
            <div style="display:flex; gap:15px; align-items:center">
                <button onclick="showModal('modal-create-group')" style="background:var(--main); border:none; color:white; padding:8px 15px; border-radius:12px; font-weight:800; font-size:12px">ГРУППА +</button>
                <i data-lucide="sparkles" style="width:20px; color:var(--main)"></i>
            </div>
        </header>

        <div id="view-chats" class="tab-view scroll-area"></div>
        <div id="view-people" class="tab-view scroll-area" style="display:none"></div>

        <div id="view-options" class="tab-view scroll-area" style="display:none; padding-top:20px">
            <div class="card" style="justify-content:space-between">
                <div><b>Режим инкогнито</b><p style="font-size:11px; color:var(--text-sec)">Скрыть из списка "Люди"</p></div>
                <div id="tog-incog" class="toggle" onclick="setOpt('incog')"></div>
            </div>
            <div class="card" style="justify-content:space-between">
                <div><b>Светлая тема</b></div>
                <div id="tog-theme" class="toggle" onclick="setOpt('theme')"></div>
            </div>
        </div>

        <div id="view-profile" class="tab-view scroll-area" style="display:none; align-items:center; flex-direction:column; padding-top:40px">
            <div style="position:relative">
                <img id="p-ava" class="avatar" style="width:130px; height:130px; border-radius:40px; border:4px solid var(--main)">
                <div onclick="pickAva()" style="position:absolute; bottom:0; right:0; background:var(--main); width:44px; height:44px; border-radius:18px; border:4px solid var(--bg); display:flex; align-items:center; justify-content:center">
                    <i data-lucide="camera" style="width:20px; color:white"></i>
                </div>
            </div>
            <h2 id="p-nick" style="margin-top:20px; font-size:26px; font-weight:800">...</h2>
            <div class="streak-tag" style="margin-top:12px">🔥 <span id="p-streak">0</span></div>
            <div style="width:100%; padding:0 24px; margin-top:35px">
                <textarea id="p-bio" class="input-field" style="height:120px; resize:none" placeholder="Расскажите о себе..." onblur="updateMe()"></textarea>
            </div>
            <button onclick="logout()" style="color:#FF4B4B; background:none; border:none; margin-top:40px; font-weight:700">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="tab('chats', this)"><i data-lucide="message-circle"></i></div>
            <div class="nav-item" onclick="tab('people', this)"><i data-lucide="compass"></i></div>
            <div class="nav-item" onclick="tab('options', this)"><i data-lucide="layers"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i data-lucide="smile"></i></div>
        </nav>
    </div>

    <!-- Chat -->
    <div id="screen-chat" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:16px; flex:1" onclick="showChatDetails()">
                <i data-lucide="chevron-left" onclick="event.stopPropagation(); go('screen-main')"></i>
                <img id="c-ava" class="avatar" style="width:44px; height:44px; border-radius:15px">
                <div>
                    <b id="c-nick" style="font-size:17px">...</b>
                    <p id="c-status" style="font-size:11px; color:#22C55E">в сети</p>
                </div>
            </div>
            <i data-lucide="settings" style="width:18px; color:var(--text-sec)" onclick="showChatDetails()"></i>
        </header>
        <div id="chat-msgs" class="scroll-area"></div>
        <div style="background:var(--glass-thick); backdrop-filter: blur(40px); border-top:1px solid var(--glass-border)">
            <div style="padding:15px 20px; display:flex; gap:12px; align-items:center">
                <i data-lucide="sticker" onclick="toggleKB()" id="btn-sticker" style="color:var(--text-sec)"></i>
                <input type="text" id="m-input" class="input-field" placeholder="Сообщение..." style="margin:0">
                <button onclick="send()" style="background:var(--main); width:52px; height:52px; border-radius:18px; border:none; color:white; flex-shrink:0">
                    <i data-lucide="send-horizontal" style="width:24px"></i>
                </button>
            </div>
            <div id="kb-panel" class="kb-panel">
                <div class="kb-tabs">
                    <div class="kb-tab active">МОИ СТИКЕРЫ</div>
                    <div class="kb-tab" onclick="document.getElementById('f-sticker').click()" style="color:var(--main)">+ СОЗДАТЬ</div>
                </div>
                <div class="sticker-grid" id="sticker-grid"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-create-group" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px">Новая группа</h2>
            <input type="text" id="g-name" class="input-field" placeholder="Название группы" style="margin-bottom:15px">
            <button class="btn-main" style="width:100%" onclick="createGroup()">СОЗДАТЬ</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-sec)">ОТМЕНА</button>
        </div>
    </div>

    <div id="modal-group-info" class="modal">
        <div class="modal-content" style="max-height:80vh; overflow-y:auto">
            <div style="text-align:center; margin-bottom:20px">
                <img id="gi-ava" class="avatar" style="width:100px; height:100px; border-radius:30px" onclick="pickGroupAva()">
                <h2 id="gi-name" style="margin-top:10px">...</h2>
                <p id="gi-role" style="font-size:12px; color:var(--text-sec)"></p>
            </div>
            <div id="gi-admin-controls" style="display:none">
                <p style="font-size:12px; font-weight:800; margin-bottom:10px">ДОБАВИТЬ УЧАСТНИКА</p>
                <input type="text" id="gi-search" class="input-field" placeholder="Ник пользователя..." style="margin-bottom:15px" oninput="searchUsers(this.value)">
                <div id="gi-search-results" style="max-height:150px; overflow-y:auto; margin-bottom:20px"></div>
            </div>
            <p style="font-size:12px; font-weight:800; margin-bottom:10px">УЧАСТНИКИ</p>
            <div id="gi-members" style="margin-bottom:20px"></div>
            <button id="btn-group-action" class="btn-main" style="width:100%; background:#FF4B4B">ВЫЙТИ ИЗ ГРУППЫ</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-sec)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <input type="file" id="f-pick" hidden onchange="upAva(this)">
    <input type="file" id="f-sticker" hidden onchange="upSticker(this)" accept="image/*">
    <input type="file" id="f-group-ava" hidden onchange="upGroupAva(this)">

    <script>
        const cfg = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();
        let me = null, activeChat = null, chatSub = null, currentOtherId = null, chatData = null;

        const DEF_AVA = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png";
        const ST_ON = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-28_01-14-11-937.png";
        const ST_OFF = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-28_01-13-54-413.png";

        auth.onAuthStateChanged(async u => {
            if(u) {
                const d = await db.collection('users').doc(u.uid).get();
                if(d.exists) { 
                    me = {id: u.uid, ...d.data()}; 
                    sync(); 
                    go('screen-main'); 
                    listenChats();
                } else go('screen-reg');
            } else go('screen-login');
        });

        async function authAction(type) {
            const n = document.getElementById(type==='reg'?'r-nick':'l-nick').value.trim();
            const p = document.getElementById(type==='reg'?'r-pass':'l-pass').value;
            if(!n || !p) return;

            if(type === 'reg') {
                if(!document.getElementById('r-agree').checked) return alert("Примите соглашение");
                const nickLower = n.toLowerCase();
                
                // Исправлено: Атомарная проверка ника
                const nickDoc = await db.collection('nicknames').doc(nickLower).get();
                if(nickDoc.exists) return alert("Никнейм занят");
                
                try {
                    const res = await auth.signInAnonymously();
                    const data = { nick: n, pass: p, incog: false, streak: 0, lastMsgTime: Date.now(), stName: 'Огонек', bio: '', ava: DEF_AVA, theme: 'dark', stickers: [] };
                    await db.collection('users').doc(res.user.uid).set(data);
                    await db.collection('nicknames').doc(nickLower).set({uid: res.user.uid});
                    location.reload();
                } catch(e) { alert("Ошибка регистрации"); }
            } else {
                const snap = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(!snap.exists) return alert("Пользователь не найден");
                const uDoc = await db.collection('users').doc(snap.data().uid).get();
                if(uDoc.data().pass === p) {
                    me = {id: snap.data().uid, ...uDoc.data()};
                    sync(); go('screen-main'); listenChats();
                } else alert("Неверный пароль");
            }
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screen-chat' && chatSub) { chatSub(); chatSub = null; }
            if(id === 'screen-main') { document.getElementById('kb-panel').classList.remove('open'); }
            lucide.createIcons();
        }

        function tab(t, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
            document.getElementById('view-'+t).style.display = t === 'profile' ? 'flex' : 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(t === 'people') loadPeople();
            lucide.createIcons();
        }

        function sync() {
            document.getElementById('p-nick').innerText = me.nick;
            document.getElementById('p-streak').innerText = me.streak;
            document.getElementById('p-bio').value = me.bio;
            document.getElementById('p-ava').src = me.ava || DEF_AVA;
            document.getElementById('tog-incog').classList.toggle('on', me.incog);
            document.body.className = me.theme === 'light' ? 'light-theme' : 'dark-theme';
            document.getElementById('tog-theme').classList.toggle('on', me.theme === 'light');
            loadStickers();
            lucide.createIcons();
        }

        async function loadPeople() {
            const list = document.getElementById('view-people');
            list.innerHTML = `<h2 style="padding:25px 25px 10px; font-size:28px">Люди</h2>`;
            const snap = await db.collection('users').limit(40).get();
            snap.forEach(d => {
                const u = d.data();
                if(u.incog && d.id !== me.id) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openChat(d.id, u);
                card.innerHTML = `
                    <img src="${u.ava || DEF_AVA}" class="avatar">
                    <div style="flex:1">
                        <b>${u.nick}</b>
                        <p style="font-size:12px; color:var(--text-sec); margin-top:2px">${u.bio || 'Hafland User'}</p>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        async function openChat(id, otherOrGroup) {
            currentOtherId = id;
            chatData = otherOrGroup;
            activeChat = otherOrGroup.isGroup ? id : (me.id < id ? me.id+'_'+id : id+'_'+me.id);
            
            document.getElementById('c-nick').innerText = otherOrGroup.nick || otherOrGroup.name;
            document.getElementById('c-ava').src = otherOrGroup.ava || DEF_AVA;
            document.getElementById('c-status').style.display = otherOrGroup.isGroup ? 'none' : 'block';
            go('screen-chat');
            
            chatSub = db.collection('chats').doc(activeChat).collection('m').orderBy('t','asc').onSnapshot(s => {
                const box = document.getElementById('chat-msgs'); 
                box.innerHTML = "";
                let msgs = [];
                s.forEach(d => msgs.push(d.data()));

                const streakImg = getStreakImg(otherOrGroup);
                if(streakImg) {
                    box.innerHTML += `<div class="streak-island"><img src="${streakImg}" style="width:28px"> <span>${me.stName} в ударе!</span></div>`;
                }

                msgs.forEach((m) => {
                    if(m.type === 'sticker') {
                        box.innerHTML += `<img src="${m.txt}" class="sticker-msg ${m.s === me.id ? '' : 'other'}">`;
                    } else {
                        box.innerHTML += `<div class="bubble ${m.s === me.id ? 'my' : 'other'}">${m.txt}</div>`;
                    }
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function getStreakImg(u) {
            if(!u || u.isGroup || u.streak === 0) return null;
            const diff = Date.now() - (u.lastMsgTime || 0);
            if(diff < 24 * 3600000) return ST_ON;
            if(diff < 48 * 3600000) return ST_OFF;
            return null;
        }

        function listenChats() {
            db.collection('chats').where('participants', 'array-contains', me.id).onSnapshot(async s => {
                const list = document.getElementById('view-chats');
                list.innerHTML = `<h2 style="padding:25px 25px 10px; font-size:28px">Чаты</h2>`;
                for (const d of s.docs) {
                    const c = d.data();
                    let info = { name: c.name || "Группа", ava: c.ava || DEF_AVA };
                    if(!c.isGroup) {
                        const otherId = c.participants.find(p => p !== me.id);
                        const uDoc = await db.collection('users').doc(otherId).get();
                        if(uDoc.exists) info = { name: uDoc.data().nick, ava: uDoc.data().ava };
                    }
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openChat(c.isGroup ? d.id : c.participants.find(p=>p!==me.id), c);
                    card.innerHTML = `
                        <img src="${info.ava}" class="avatar">
                        <div style="flex:1">
                            <div style="display:flex; justify-content:space-between">
                                <b>${info.name}</b>
                                <span style="font-size:10px; color:var(--text-sec)">${c.lastT ? new Date(c.lastT).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                            </div>
                            <p style="font-size:13px; color:var(--text-sec); margin-top:4px">${c.lastMsg || ''}</p>
                        </div>
                    `;
                    list.appendChild(card);
                }
            });
        }

        async function send(sticker = null) {
            const inp = document.getElementById('m-input');
            const txt = sticker || inp.value.trim();
            if(!txt || !activeChat) return;
            if(!sticker) inp.value = "";
            
            const t = Date.now();
            const chatRef = db.collection('chats').doc(activeChat);

            await chatRef.set({ 
                participants: chatData.isGroup ? chatData.participants : [me.id, currentOtherId], 
                lastT: t,
                lastMsg: sticker ? '[Стикер]' : txt,
                isGroup: chatData.isGroup || false,
                name: chatData.name || null,
                ava: chatData.ava || null
            }, {merge: true});
            
            await chatRef.collection('m').add({ s: me.id, txt: txt, t: t, type: sticker ? 'sticker' : 'text' });
            
            // Streak logic
            if(!chatData.isGroup) {
                const diff = t - (me.lastMsgTime || 0);
                if(diff > 20 * 3600000 && diff < 48 * 3600000) {
                    me.streak++;
                    db.collection('users').doc(me.id).update({streak: me.streak, lastMsgTime: t});
                } else if(diff >= 48 * 3600000) {
                    me.streak = 1;
                    db.collection('users').doc(me.id).update({streak: 1, lastMsgTime: t});
                }
            }
        }

        // Stickers
        function toggleKB() { document.getElementById('kb-panel').classList.toggle('open'); }
        async function loadStickers() {
            const grid = document.getElementById('sticker-grid');
            grid.innerHTML = "";
            (me.stickers || []).forEach(s => {
                const img = document.createElement('img');
                img.src = s;
                img.onclick = () => { send(s); toggleKB(); };
                grid.appendChild(img);
            });
        }
        function upSticker(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = async e => {
                await db.collection('users').doc(me.id).update({
                    stickers: firebase.firestore.FieldValue.arrayUnion(e.target.result)
                });
                me.stickers.push(e.target.result);
                loadStickers();
            };
            r.readAsDataURL(f);
        }

        // Groups
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        async function createGroup() {
            const name = document.getElementById('g-name').value.trim();
            if(!name) return;
            const id = 'group_' + Date.now();
            const gData = {
                id, name, isGroup: true, owner: me.id, admins: [me.id], 
                participants: [me.id], ava: DEF_AVA, lastT: Date.now(), lastMsg: "Группа создана"
            };
            await db.collection('chats').doc(id).set(gData);
            closeModals();
            openChat(id, gData);
        }

        async function showChatDetails() {
            if(!chatData.isGroup) return renameFire();
            const doc = await db.collection('chats').doc(activeChat).get();
            const data = doc.data();
            showModal('modal-group-info');
            document.getElementById('gi-name').innerText = data.name;
            document.getElementById('gi-ava').src = data.ava || DEF_AVA;
            const isAdmin = data.admins.includes(me.id);
            const isOwner = data.owner === me.id;
            document.getElementById('gi-role').innerText = isOwner ? 'Владелец' : (isAdmin ? 'Админ' : 'Участник');
            document.getElementById('gi-admin-controls').style.display = isAdmin ? 'block' : 'none';
            
            const btn = document.getElementById('btn-group-action');
            btn.innerText = isOwner ? "УДАЛИТЬ ГРУППУ" : "ВЫЙТИ ИЗ ГРУППЫ";
            btn.onclick = isOwner ? () => deleteGroup() : () => leaveGroup();

            renderMembers(data);
        }

        async function renderMembers(data) {
            const box = document.getElementById('gi-members');
            box.innerHTML = "";
            for(let uid of data.participants) {
                const u = await db.collection('users').doc(uid).get();
                if(!u.exists) continue;
                const ud = u.data();
                const isAdmin = data.admins.includes(uid);
                const item = document.createElement('div');
                item.className = 'card';
                item.style.margin = "5px 0";
                item.innerHTML = `
                    <img src="${ud.ava || DEF_AVA}" class="avatar" style="width:40px; height:40px">
                    <div style="flex:1"><b>${ud.nick}</b><p style="font-size:10px">${isAdmin ? 'Админ' : ''}</p></div>
                    ${data.admins.includes(me.id) && uid !== me.id ? `<i data-lucide="user-minus" style="width:16px; color:#FF4B4B" onclick="kickUser('${uid}')"></i>` : ''}
                `;
                box.appendChild(item);
            }
            lucide.createIcons();
        }

        async function searchUsers(q) {
            if(q.length < 2) return;
            const resBox = document.getElementById('gi-search-results');
            resBox.innerHTML = "";
            const snap = await db.collection('users').where('nick', '>=', q).limit(5).get();
            snap.forEach(d => {
                const ud = d.data();
                const item = document.createElement('div');
                item.className = 'card';
                item.style.margin = "5px 0";
                item.innerHTML = `<b>${ud.nick}</b> <button onclick="addUserToGroup('${d.id}')" style="margin-left:auto; background:var(--main); color:white; border:none; padding:5px 10px; border-radius:8px">ДОБАВИТЬ</button>`;
                resBox.appendChild(item);
            });
        }

        async function addUserToGroup(uid) {
            await db.collection('chats').doc(activeChat).update({
                participants: firebase.firestore.FieldValue.arrayUnion(uid)
            });
            alert("Добавлен!");
            showChatDetails();
        }

        async function kickUser(uid) {
            await db.collection('chats').doc(activeChat).update({
                participants: firebase.firestore.FieldValue.arrayRemove(uid),
                admins: firebase.firestore.FieldValue.arrayRemove(uid)
            });
            showChatDetails();
        }

        async function leaveGroup() {
            await db.collection('chats').doc(activeChat).update({
                participants: firebase.firestore.FieldValue.arrayRemove(me.id),
                admins: firebase.firestore.FieldValue.arrayRemove(me.id)
            });
            go('screen-main'); closeModals();
        }

        async function deleteGroup() {
            if(!confirm("Удалить группу навсегда?")) return;
            await db.collection('chats').doc(activeChat).delete();
            go('screen-main'); closeModals();
        }

        function pickGroupAva() { if(chatData.admins.includes(me.id)) document.getElementById('f-group-ava').click(); }
        function upGroupAva(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = async e => {
                await db.collection('chats').doc(activeChat).update({ava: e.target.result});
                document.getElementById('gi-ava').src = e.target.result;
            };
            r.readAsDataURL(f);
        }

        function renameFire() {
            const val = prompt("Имя огонька:", me.stName);
            if(val) { me.stName = val; db.collection('users').doc(me.id).update({stName: val}); }
        }

        function setOpt(type) {
            if(type === 'incog') me.incog = !me.incog;
            else me.theme = me.theme === 'light' ? 'dark' : 'light';
            sync();
            db.collection('users').doc(me.id).update({incog: me.incog, theme: me.theme});
        }

        function pickAva() { document.getElementById('f-pick').click(); }
        function upAva(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                me.ava = e.target.result;
                sync();
                db.collection('users').doc(me.id).update({ava: me.ava});
            };
            r.readAsDataURL(f);
        }

        function updateMe() {
            me.bio = document.getElementById('p-bio').value;
            db.collection('users').doc(me.id).update({bio: me.bio});
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        lucide.createIcons();
    </script>
</body>
</html>
