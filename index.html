<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #2563eb;
            --input: #11141d;
            --card: rgba(15, 15, 20, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --bubble-me: #2563eb;
            --bubble-them: #1a1d26;
        }

        .light-theme {
            --bg: #f3f4f6;
            --text: #111827;
            --accent: #2563eb;
            --input: #ffffff;
            --card: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --bubble-me: #2563eb;
            --bubble-them: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden;
        }

        /* UI Elements */
        .auth-input {
            width: 100%;
            background-color: var(--input);
            border: 1px solid var(--border);
            padding: 20px 24px;
            border-radius: 22px;
            outline: none;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 14px;
            transition: all 0.2s ease;
        }
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .blue-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            padding: 20px;
            border-radius: 22px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: all 0.2s active;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }
        .blue-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Navigation */
        .nav-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 420px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            display: flex;
            padding: 6px;
            border: 1px solid var(--border);
            z-index: 1000;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .nav-indicator {
            position: absolute;
            height: calc(100% - 12px);
            top: 6px;
            background: rgba(37, 99, 235, 0.12);
            border-radius: 24px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 0;
            border: 1px solid rgba(37, 99, 235, 0.1);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            color: #94a3b8;
            z-index: 1;
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .nav-btn.active { color: var(--accent); }
        .nav-btn i { width: 22px; height: 22px; margin-bottom: 2px; }

        /* Bubbles */
        .bubble {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .bubble.me { background: var(--bubble-me); color: white; border-bottom-right-radius: 6px; }
        .bubble.them { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 6px; border: 1px solid var(--border); }

        /* Switches */
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .4s; border-radius: 26px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        .screen-content { height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .status-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; border: 2.5px solid var(--bg); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Notification Banner */
        #in-app-notify {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--accent);
            border-radius: 28px;
            padding: 16px;
            z-index: 2000;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            cursor: pointer;
        }
        #in-app-notify.show { top: 20px; }
    </style>
</head>
<body>

<div id="app-root">
    <!-- Notification Overlay -->
    <div id="in-app-notify" onclick="this.classList.remove('show')">
        <img id="notify-img" src="" class="w-12 h-12 rounded-full bg-zinc-800 border border-white/10">
        <div class="flex-1 overflow-hidden">
            <p id="notify-name" class="font-black text-sm truncate text-blue-500 uppercase tracking-wider"></p>
            <p id="notify-msg" class="text-xs text-zinc-300 font-medium truncate"></p>
        </div>
        <i data-lucide="bell-ring" class="w-5 h-5 text-blue-600 animate-pulse"></i>
    </div>

    <div id="screen" class="screen-content no-scrollbar"></div>

    <nav id="nav-bar" class="nav-container hidden">
        <div id="nav-indicator" class="nav-indicator"></div>
        <button onclick="window.goTab('chats')" id="tab-chats" class="nav-btn active"><i data-lucide="message-square"></i><span>Чаты</span></button>
        <button onclick="window.goTab('search')" id="tab-search" class="nav-btn"><i data-lucide="search"></i><span>Поиск</span></button>
        <button onclick="window.goTab('settings')" id="tab-settings" class="nav-btn"><i data-lucide="sliders-horizontal"></i><span>Настройки</span></button>
        <button onclick="window.goTab('profile')" id="tab-profile" class="nav-btn"><i data-lucide="circle-user"></i><span>Профиль</span></button>
    </nav>
</div>

<input type="file" id="gallery-input" accept="image/*" class="hidden" onchange="window.handleFile(this)">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const fbConfig = {
        apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
        authDomain: "hafland-x-66cdc.firebaseapp.com",
        projectId: "hafland-x-66cdc",
        storageBucket: "hafland-x-66cdc.firebasestorage.app",
        messagingSenderId: "1007892951941",
        appId: "1:1007892951941:web:692984898e47747307caec"
    };

    const app = initializeApp(fbConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const APP_ID = "hx_v4_final";

    let me = null;
    let isReg = false;
    let activeUnsub = null;
    let currentChatOther = null;
    let isTabActive = true;

    window.onfocus = () => { isTabActive = true; };
    window.onblur = () => { isTabActive = false; };

    const applyTheme = (t) => {
        if(t === 'light') document.body.classList.add('light-theme');
        else document.body.classList.remove('light-theme');
        localStorage.setItem('hx_t', t);
    };
    applyTheme(localStorage.getItem('hx_t') || 'dark');

    const requestNotify = () => {
        if ("Notification" in window) {
            Notification.requestPermission();
        }
    };

    const triggerNotification = (from, text) => {
        if (!isTabActive && Notification.permission === "granted") {
            new Notification(`Hafland X: ${from}`, {
                body: text,
                icon: `https://api.dicebear.com/7.x/avataaars/svg?seed=${from}`
            });
        }
        if (currentChatOther !== from) {
            const banner = document.getElementById('in-app-notify');
            document.getElementById('notify-img').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${from}`;
            document.getElementById('notify-name').innerText = from;
            document.getElementById('notify-msg').innerText = text;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 4000);
        }
    };

    const showLogin = () => {
        document.getElementById('nav-bar').classList.add('hidden');
        const scr = document.getElementById('screen');
        scr.innerHTML = `
            <div class="p-8 pt-24 max-w-sm mx-auto fade-in">
                <h1 class="text-5xl font-black text-blue-600 mb-2 italic tracking-tighter text-center">Hafland X</h1>
                <p class="text-zinc-500 font-bold text-[10px] mb-12 uppercase tracking-widest opacity-60 text-center">version 4.2 by Hafa Studio</p>
                <input id="auth-n" type="text" placeholder="Никнейм" class="auth-input">
                <input id="auth-p" type="password" placeholder="Пароль" class="auth-input">
                ${isReg ? `
                <div class="flex gap-4 mb-8 p-6 bg-zinc-900/40 rounded-[28px] border border-white/5">
                    <input type="checkbox" id="agree" class="w-6 h-6 mt-0.5 accent-blue-600 shrink-0">
                    <label for="agree" class="text-[11px] text-zinc-500 leading-relaxed font-semibold">Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент.</label>
                </div>` : ''}
                <button onclick="window.doAuth()" class="blue-btn mb-6">${isReg ? 'Создать аккаунт' : 'Войти'}</button>
                <button onclick="window.toggleM()" class="w-full text-blue-500 font-black text-[11px] uppercase tracking-[0.2em]">${isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация'}</button>
            </div>`;
    };

    window.toggleM = () => { isReg = !isReg; showLogin(); };

    window.doAuth = async () => {
        const n = document.getElementById('auth-n').value.trim().toLowerCase();
        const p = document.getElementById('auth-p').value;
        if(!n || !p) return;
        try {
            await signInAnonymously(auth);
            const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', n);
            const snap = await getDoc(ref);
            if(isReg) {
                if(snap.exists()) throw "busy";
                const d = { nick: n, pass: p, bio: 'Использую Hafland X', avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${n}`, hidden: false, ts: Date.now() };
                await setDoc(ref, d); me = d;
            } else {
                if(!snap.exists() || snap.data().pass !== p) throw "err";
                me = snap.data();
            }
            localStorage.setItem('hx_s', n);
            requestNotify();
            initNotifications();
            window.goTab('chats');
        } catch(e) { alert("Ошибка авторизации"); }
    };

    const initNotifications = () => {
        onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
            s.docChanges().forEach(change => {
                if (change.type === "added") {
                    const m = change.doc.data();
                    if (m.t === me.nick && m.f !== me.nick && m.ts > (Date.now() - 5000)) {
                        triggerNotification(m.f, m.img ? "[Фотография]" : m.txt);
                    }
                }
            });
        });
    };

    window.goTab = (t) => {
        currentChatOther = null;
        document.getElementById('nav-bar').classList.remove('hidden');
        if(activeUnsub) activeUnsub();
        const btn = document.getElementById('tab-'+t);
        const ind = document.getElementById('nav-indicator');
        if(btn && ind) { ind.style.width = btn.offsetWidth + 'px'; ind.style.left = btn.offsetLeft + 'px'; }
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(t);
        lucide.createIcons();
    };

    const render = (t) => {
        const scr = document.getElementById('screen');
        if(t === 'chats') {
            scr.innerHTML = `<div class="p-6 pt-12 fade-in"><h2 class="text-3xl font-black mb-8">Чаты</h2><div id="c-list" class="space-y-1"></div></div>`;
            loadChats();
        } else if(t === 'search') {
            scr.innerHTML = `<div class="p-6 pt-12 fade-in"><h2 class="text-3xl font-black mb-8">Поиск</h2><div id="u-list" class="space-y-3"></div></div>`;
            loadUsers();
        } else if(t === 'settings') {
            const isL = localStorage.getItem('hx_t') === 'light';
            scr.innerHTML = `
                <div class="p-6 pt-12 fade-in space-y-4">
                    <h2 class="text-3xl font-black mb-8">Настройки</h2>
                    <div class="p-6 bg-zinc-900/10 border border-white/5 rounded-[32px] flex justify-between items-center">
                        <span class="font-bold text-sm">Светлая тема</span>
                        <label class="switch"><input type="checkbox" ${isL?'checked':''} onchange="window.setT(this.checked)"><span class="slider"></span></label>
                    </div>
                    <div class="p-6 bg-zinc-900/10 border border-white/5 rounded-[32px] flex justify-between items-center">
                        <span class="font-bold text-sm">Инкогнито</span>
                        <label class="switch"><input type="checkbox" ${me.hidden?'checked':''} onchange="window.setH(this.checked)"><span class="slider"></span></label>
                    </div>
                    <div class="p-6 bg-zinc-900/10 border border-white/5 rounded-[32px] space-y-4">
                        <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">О себе</span>
                        <div class="flex gap-3"><input id="bio-i" value="${me.bio}" class="flex-1 bg-transparent border-b border-white/10 outline-none text-sm"><button onclick="window.saveBio()" class="text-blue-500 font-black">OK</button></div>
                    </div>
                    <button onclick="window.requestNotify()" class="w-full p-6 bg-blue-600/10 border border-blue-600/20 rounded-[32px] text-blue-600 font-bold text-sm flex justify-between items-center">Уведомления <i data-lucide="bell"></i></button>
                </div>`;
        } else if(t === 'profile') {
            scr.innerHTML = `<div class="p-12 flex flex-col items-center fade-in"><img src="${me.avatar}" class="w-32 h-32 rounded-full mb-8 border-4 border-blue-600/10 shadow-2xl"><h3 class="text-3xl font-black mb-1">${me.nick}</h3><p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em]">${me.bio}</p><button onclick="localStorage.clear(); location.reload();" class="mt-32 text-red-500 font-black text-[10px] uppercase tracking-widest opacity-40">Выйти</button></div>`;
        }
        lucide.createIcons();
    };

    window.saveBio = async () => {
        const b = document.getElementById('bio-i').value; me.bio = b;
        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', me.nick), { bio: b });
    };

    window.setT = (l) => applyTheme(l?'light':'dark');
    window.setH = async (h) => {
        me.hidden = h;
        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', me.nick), { hidden: h });
    };

    const loadUsers = () => {
        activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), (s) => {
            const l = document.getElementById('u-list'); if(!l) return;
            l.innerHTML = '';
            s.docs.forEach(d => {
                const u = d.data(); if(u.nick === me.nick || u.hidden) return;
                l.innerHTML += `<div onclick="window.openChat('${u.nick}')" class="flex items-center gap-4 p-5 bg-zinc-900/5 rounded-[28px] border border-transparent active:border-white/5"><img src="${u.avatar}" class="w-12 h-12 rounded-full bg-zinc-900"><div class="flex-1"><p class="font-bold text-lg leading-tight">${u.nick}</p><p class="text-zinc-500 text-[11px] truncate">${u.bio}</p></div><i data-lucide="chevron-right" class="text-zinc-600"></i></div>`;
            });
            lucide.createIcons();
        });
    };

    const loadChats = () => {
        activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
            const l = document.getElementById('c-list'); if(!l) return;
            const ms = new Map();
            s.docs.forEach(doc => {
                const m = doc.data();
                if(m.f === me.nick || m.t === me.nick) {
                    const o = m.f === me.nick ? m.t : m.f;
                    if(!ms.has(o) || ms.get(o).ts < m.ts) ms.set(o, m);
                }
            });
            l.innerHTML = ms.size === 0 ? '<div class="py-32 text-center opacity-20 font-black text-xs uppercase tracking-widest">Пусто</div>' : '';
            [...ms.entries()].sort((a,b)=>b[1].ts - a[1].ts).forEach(([n, m]) => {
                l.innerHTML += `<div onclick="window.openChat('${n}')" class="flex items-center gap-4 p-5 border-b border-white/5 active:bg-blue-600/10"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${n}" class="w-14 h-14 rounded-full bg-zinc-900"><div class="flex-1 overflow-hidden"><div class="flex justify-between items-center mb-1"><span class="font-black text-lg">${n}</span><span class="text-[9px] opacity-40 font-bold">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div><p class="text-zinc-500 text-sm truncate">${m.img?'[Фотография]':m.txt}</p></div></div>`;
            });
        });
    };

    window.openChat = (other) => {
        currentChatOther = other;
        document.getElementById('nav-bar').classList.add('hidden');
        const scr = document.getElementById('screen');
        scr.innerHTML = `
            <div class="flex flex-col h-screen fade-in">
                <header class="p-6 pt-10 flex items-center gap-4 border-b border-white/5 bg-black/60 backdrop-blur-xl">
                    <button onclick="window.goTab('chats')" class="p-2 -ml-2"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="w-11 h-11 rounded-full bg-zinc-900">
                    <div><p class="font-black text-xl leading-tight">${other}</p><p class="text-[10px] text-blue-500 font-black uppercase tracking-widest">Hafland Connect</p></div>
                </header>
                <div id="flow" class="flex-1 overflow-y-auto p-5 space-y-5 no-scrollbar pb-32"></div>
                <footer class="p-5 fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gradient-to-t from-black to-transparent">
                    <div class="flex gap-3 items-center">
                        <button onclick="document.getElementById('gallery-input').click()" class="p-4 bg-zinc-900 rounded-[22px] text-zinc-400"><i data-lucide="paperclip"></i></button>
                        <input id="msg-i" type="text" placeholder="Написать..." class="flex-1 bg-zinc-900 p-4 px-6 rounded-[22px] outline-none border-2 border-transparent focus:border-blue-600/30 transition-all">
                        <button onclick="window.send('${other}')" class="bg-blue-600 p-4 px-5 rounded-[22px] text-white shadow-xl shadow-blue-600/30"><i data-lucide="arrow-up-right"></i></button>
                    </div>
                </footer>
            </div>`;
        lucide.createIcons();
        activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
            const f = document.getElementById('flow'); if(!f) return;
            const ms = s.docs.map(d=>d.data()).filter(m => (m.f===me.nick && m.t===other) || (m.f===other && m.t===me.nick)).sort((a,b)=>a.ts-b.ts);
            f.innerHTML = '';
            ms.forEach(m => {
                const isMe = m.f === me.nick;
                f.innerHTML += `<div class="flex ${isMe?'justify-end':'justify-start'}"><div class="bubble ${isMe?'me':'them'}">${m.img?`<img src="${m.img}" class="rounded-2xl mb-2 max-w-full">`:''}<p class="font-medium">${m.txt||''}</p><span class="block text-[8px] opacity-40 mt-1.5 text-right font-bold">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div></div>`;
            });
            f.scrollTop = f.scrollHeight;
        });
    };

    window.handleFile = (input) => {
        const file = input.files[0]; if(!file || file.size > 800000) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: me.nick, t: currentChatOther, img: e.target.result, ts: Date.now() });
        };
        reader.readAsDataURL(file);
    };

    window.send = async (to) => {
        const i = document.getElementById('msg-i'); if(!i.value.trim()) return;
        const v = i.value; i.value = '';
        await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: me.nick, t: to, txt: v, ts: Date.now() });
    };

    onAuthStateChanged(auth, async (u) => {
        const s = localStorage.getItem('hx_s');
        if(u && s) {
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', s));
            if(snap.exists()) { me = snap.data(); initNotifications(); window.goTab('chats'); return; }
        }
        showLogin();
    });
</script>
</body>
</html>
