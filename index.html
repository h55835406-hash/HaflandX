<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: rgba(23, 23, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: #0f172a;
        }

        .light-theme {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --input-bg: #f3f4f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .floating-nav-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;
        }

        .floating-nav {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            display: flex;
            position: relative;
            padding: 6px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .nav-indicator {
            position: absolute;
            height: calc(100% - 12px);
            width: calc(25% - 6px);
            background: rgba(59, 130, 246, 0.2);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .nav-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 10px 0;
            color: #9ca3af;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .nav-btn.active { color: #3b82f6; }
        .nav-btn i { width: 22px; height: 22px; margin-bottom: 2px; }
        .nav-btn span { font-size: 10px; font-weight: 700; }

        .loader-spin {
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .auth-field {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 18px;
            border-radius: 20px;
            width: 100%;
            outline: none;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.4;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #screen { height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        
        .light-theme .chat-bubble.other { background: #f1f3f4; color: #000; }
        .light-theme .chat-bubble.me { background: #1a73e8; color: #fff; }
    </style>
</head>
<body class="dark-theme">

    <div id="app-root" class="max-w-md mx-auto relative h-screen">
        <div id="screen" class="no-scrollbar"></div>

        <div id="navigation" class="floating-nav-container hidden">
            <nav class="floating-nav">
                <div id="nav-indicator" class="nav-indicator"></div>
                <button onclick="window.switchTab('chats', 0)" id="btn-chats" class="nav-btn active">
                    <i data-lucide="search"></i>
                    <span>Чаты</span>
                </button>
                <button onclick="window.switchTab('contacts', 1)" id="btn-contacts" class="nav-btn">
                    <i data-lucide="message-circle"></i>
                    <span>Контакты</span>
                </button>
                <button onclick="window.switchTab('settings', 2)" id="btn-settings" class="nav-btn">
                    <i data-lucide="settings"></i>
                    <span>Опции</span>
                </button>
                <button onclick="window.switchTab('profile', 3)" id="btn-profile" class="nav-btn">
                    <i data-lucide="user"></i>
                    <span>Профиль</span>
                </button>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "hafland-x-v5-pro";

        let currentUser = null;
        let isRegisterMode = false;
        let activeTab = 'chats';
        let theme = localStorage.getItem('hx_theme') || 'dark';

        const refreshIcons = () => lucide.createIcons();

        const applyTheme = (t) => {
            theme = t;
            localStorage.setItem('hx_theme', t);
            document.body.className = t === 'light' ? 'light-theme' : 'dark-theme';
        };
        applyTheme(theme);

        window.processAuth = async () => {
            const nick = document.getElementById('nick-in').value.trim().toLowerCase();
            const pass = document.getElementById('pass-in').value;
            const btn = document.getElementById('auth-submit');

            if (!nick || !pass) return alert("Заполните поля");
            if (isRegisterMode && !document.getElementById('agree-cb').checked) return alert("Примите соглашение");

            btn.disabled = true;
            btn.innerHTML = '<div class="loader-spin mx-auto"></div>';

            try {
                await signInAnonymously(auth);
                const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', nick);
                const userSnap = await getDoc(userRef);

                if (!isRegisterMode) {
                    if (userSnap.exists() && userSnap.data().password === pass) {
                        localStorage.setItem('hx_nick', nick);
                        currentUser = userSnap.data();
                        launchMessenger();
                    } else throw new Error("Ошибка входа");
                } else {
                    if (userSnap.exists()) throw new Error("Ник занят");
                    const data = { nickname: nick, password: pass, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}`, contacts: [], hidden: false, ts: Date.now() };
                    await setDoc(userRef, data);
                    localStorage.setItem('hx_nick', nick);
                    currentUser = data;
                    launchMessenger();
                }
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = isRegisterMode ? 'ЗАРЕГИСТРИРОВАТЬСЯ' : 'ВОЙТИ';
            }
        };

        window.toggleAuth = () => { isRegisterMode = !isRegisterMode; renderAuthPage(); };

        function renderAuthPage() {
            document.getElementById('navigation').classList.add('hidden');
            document.getElementById('screen').innerHTML = `
                <div class="p-8 pt-20 flex flex-col min-h-screen">
                    <h1 class="text-5xl font-black text-blue-500 tracking-tighter mb-1">Hafland X</h1>
                    <p class="text-zinc-500 font-bold mb-10">Версия 1.0 Stable</p>
                    <div class="space-y-4">
                        <input id="nick-in" type="text" placeholder="Никнейм" class="auth-field">
                        <input id="pass-in" type="password" placeholder="Пароль" class="auth-field">
                        ${isRegisterMode ? `
                        <div class="flex gap-3 p-4 bg-blue-500/5 border border-blue-500/10 rounded-3xl">
                            <input type="checkbox" id="agree-cb" class="w-6 h-6 accent-blue-500 mt-1">
                            <label for="agree-cb" class="text-[11px] text-zinc-400 font-medium leading-tight">
                                Hafland не зависимая платформа и не несёт ответственности за контент и содержание ваших сообщений внутри платформы.
                            </label>
                        </div>` : ''}
                        <button id="auth-submit" onclick="window.processAuth()" class="w-full bg-blue-600 p-5 rounded-3xl font-black text-lg active:scale-95 transition-all">
                            ${isRegisterMode ? 'ЗАРЕГИСТРИРОВАТЬСЯ' : 'ВОЙТИ'}
                        </button>
                        <button onclick="window.toggleAuth()" class="w-full text-blue-500 font-bold text-sm mt-4">
                            ${isRegisterMode ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать'}
                        </button>
                    </div>
                </div>`;
        }

        function launchMessenger() {
            document.getElementById('navigation').classList.remove('hidden');
            window.switchTab(activeTab, 0);
        }

        window.switchTab = (tab, index) => {
            activeTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            
            const indicator = document.getElementById('nav-indicator');
            indicator.style.left = `calc(${index * 25}% + 3px)`;

            const scr = document.getElementById('screen');
            if (tab === 'chats') renderSearch(scr);
            if (tab === 'contacts') renderContacts(scr);
            if (tab === 'profile') renderProfile(scr);
            if (tab === 'settings') renderSettings(scr);
            refreshIcons();
        };

        // Вкладка "ЧАТЫ" (теперь тут ПОИСК всех пользователей)
        function renderSearch(el) {
            el.innerHTML = `<div class="p-6 pt-10"><h2 class="text-3xl font-black mb-6">Поиск</h2><div id="user-results" class="space-y-3"></div></div>`;
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), (s) => {
                const list = document.getElementById('user-results');
                if (!list) return;
                list.innerHTML = '';
                s.docs.forEach(doc => {
                    const u = doc.data();
                    if (u.nickname === currentUser.nickname || u.hidden) return;
                    const isAdded = (currentUser.contacts || []).includes(u.nickname);
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-zinc-50 dark:bg-zinc-900/40 rounded-3xl border border-zinc-100 dark:border-transparent">
                            <div class="flex items-center gap-4">
                                <img src="${u.avatar}" class="w-12 h-12 rounded-full">
                                <span class="font-bold text-lg">${u.nickname}</span>
                            </div>
                            <button onclick="window.addContact('${u.nickname}')" class="${isAdded ? 'bg-zinc-200 text-zinc-500' : 'bg-blue-600 text-white'} px-4 py-2 rounded-full text-[10px] font-black uppercase">
                                ${isAdded ? 'В КОНТАКТАХ' : 'ДОБАВИТЬ'}
                            </button>
                        </div>`;
                });
            });
        }

        window.addContact = async (nick) => {
            const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', currentUser.nickname);
            await updateDoc(userRef, { contacts: arrayUnion(nick) });
            if (!currentUser.contacts.includes(nick)) currentUser.contacts.push(nick);
            window.switchTab('contacts', 1);
        };

        // Вкладка "КОНТАКТЫ" (теперь тут ЛИЧНЫЕ ЧАТЫ)
        function renderContacts(el) {
            el.innerHTML = `<div class="p-6 pt-10"><h2 class="text-3xl font-black mb-6">Контакты</h2><div id="chat-items" class="space-y-2"></div></div>`;
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const list = document.getElementById('chat-items');
                if (!list) return;
                const sessions = new Map();
                
                s.docs.forEach(doc => {
                    const d = doc.data();
                    if (d.f === currentUser.nickname || d.t === currentUser.nickname) {
                        const other = d.f === currentUser.nickname ? d.t : d.f;
                        if (!sessions.has(other) || sessions.get(other).ts < d.ts) sessions.set(other, d);
                    }
                });

                (currentUser.contacts || []).forEach(contactNick => {
                    if (!sessions.has(contactNick)) {
                        sessions.set(contactNick, { f: contactNick, txt: 'Напишите первым...', ts: 0 });
                    }
                });

                if (sessions.size === 0) {
                    list.innerHTML = `<p class="text-center text-zinc-500 mt-10">Добавьте друзей во вкладке Поиск</p>`;
                    return;
                }

                list.innerHTML = '';
                [...sessions.entries()].sort((a,b) => b[1].ts - a[1].ts).forEach(([name, m]) => {
                    list.innerHTML += `
                        <div onclick="window.openChat('${name}')" class="flex items-center gap-4 p-4 border-b border-zinc-100 dark:border-zinc-900 active:opacity-70 transition-all cursor-pointer">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" class="w-14 h-14 rounded-full bg-zinc-100 dark:bg-zinc-800">
                            <div class="flex-1 overflow-hidden">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-lg">${name}</span>
                                    <span class="text-[10px] text-zinc-400 font-bold uppercase">${m.ts ? '12:00' : ''}</span>
                                </div>
                                <p class="text-zinc-500 text-sm truncate font-medium">${m.txt}</p>
                            </div>
                        </div>`;
                });
            });
        }

        window.openChat = (other) => {
            document.getElementById('navigation').classList.add('hidden');
            const scr = document.getElementById('screen');
            scr.innerHTML = `
                <div class="flex flex-col h-screen bg-inherit">
                    <div class="p-4 flex items-center gap-4 border-b border-zinc-200 dark:border-zinc-900 bg-inherit sticky top-0 z-50">
                        <button onclick="window.switchTab('contacts', 1)" class="p-1"><i data-lucide="chevron-left"></i></button>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="w-10 h-10 rounded-full">
                        <span class="font-bold text-xl">${other}</span>
                    </div>
                    <div id="chat-flow" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar pb-24"></div>
                    <div class="p-4 bg-inherit border-t border-zinc-200 dark:border-zinc-900 flex gap-2 fixed bottom-0 left-0 right-0 max-w-md mx-auto">
                        <input id="chat-input" type="text" placeholder="Сообщение" class="flex-1 p-4 bg-zinc-100 dark:bg-zinc-900 rounded-2xl outline-none font-medium text-inherit">
                        <button onclick="window.sendMessage('${other}')" class="bg-blue-600 p-4 rounded-2xl text-white"><i data-lucide="send"></i></button>
                    </div>
                </div>`;
            refreshIcons();
            
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const flow = document.getElementById('chat-flow');
                if (!flow) return;
                const msgs = s.docs.map(d => d.data())
                    .filter(m => (m.f === currentUser.nickname && m.t === other) || (m.f === other && m.t === currentUser.nickname))
                    .sort((a,b) => a.ts - b.ts);
                flow.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.f === currentUser.nickname;
                    flow.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="chat-bubble ${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-100 dark:bg-zinc-800 text-inherit'}">
                                ${m.txt}
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        };

        window.sendMessage = async (to) => {
            const inp = document.getElementById('chat-input');
            const val = inp.value.trim();
            if (!val) return;
            inp.value = '';
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: currentUser.nickname, t: to, txt: val, ts: Date.now() });
        };

        function renderSettings(el) {
            el.innerHTML = `
                <div class="p-6 pt-10">
                    <h2 class="text-3xl font-black mb-6">Настройки</h2>
                    <div class="space-y-4">
                        <div class="p-5 bg-zinc-50 dark:bg-zinc-900 rounded-3xl flex justify-between items-center">
                            <span class="font-bold">Светлая тема</span>
                            <button onclick="window.changeTheme()" class="w-12 h-6 bg-blue-600 rounded-full relative">
                                <div class="absolute top-1 ${theme === 'light' ? 'right-1' : 'left-1'} w-4 h-4 bg-white rounded-full transition-all"></div>
                            </button>
                        </div>
                        <div class="p-5 bg-zinc-50 dark:bg-zinc-900 rounded-3xl flex justify-between items-center">
                            <span class="font-bold">Скрыть меня в поиске</span>
                            <button onclick="window.toggleHidden()" class="w-12 h-6 ${currentUser.hidden ? 'bg-green-600' : 'bg-zinc-400'} rounded-full relative">
                                <div class="absolute top-1 ${currentUser.hidden ? 'right-1' : 'left-1'} w-4 h-4 bg-white rounded-full transition-all"></div>
                            </button>
                        </div>
                    </div>
                </div>`;
        }

        window.changeTheme = () => applyTheme(theme === 'dark' ? 'light' : 'dark');
        
        window.toggleHidden = async () => {
            currentUser.hidden = !currentUser.hidden;
            const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', currentUser.nickname);
            await updateDoc(userRef, { hidden: currentUser.hidden });
            renderSettings(document.getElementById('screen'));
        };

        function renderProfile(el) {
            el.innerHTML = `
                <div class="p-10 flex flex-col items-center pt-20">
                    <img src="${currentUser.avatar}" class="w-32 h-32 rounded-full border-4 border-blue-500/20 shadow-2xl mb-6">
                    <h2 class="text-4xl font-black mb-2">${currentUser.nickname}</h2>
                    <p class="text-zinc-500 font-bold mb-14 uppercase tracking-tighter">Hafland X Citizen</p>
                    <button onclick="localStorage.clear(); location.reload();" class="w-full p-5 bg-red-500/10 text-red-500 font-black rounded-[30px]">ВЫЙТИ</button>
                </div>`;
        }

        onAuthStateChanged(auth, async (fbUser) => {
            const saved = localStorage.getItem('hx_nick');
            if (fbUser && saved) {
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', saved));
                if (snap.exists()) { currentUser = snap.data(); launchMessenger(); }
                else renderAuthPage();
            } else renderAuthPage();
        });

    </script>
</body>
</html>
