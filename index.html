<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hafland X</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
<style>
  :root {
    --bg: #090a0f; --panel: #161a2b; --accent: #2b66ff;
    --text: #ffffff; --text-muted: #8a91a8; --border: #23283e;
    --nav-bg: #121522; --danger: #ff4444;
  }
  [data-theme="light"] {
    --bg: #f4f6f9; --panel: #ffffff; --accent: #2b66ff;
    --text: #1a1d29; --text-muted: #6b7280; --border: #e5e7eb;
    --nav-bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; }
  body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  
  input, textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 16px; margin-bottom: 16px; outline: none; font-size: 16px; transition: 0.2s; }
  input:focus { border-color: var(--accent); }
  button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  button:active { transform: scale(0.97); }
  
  .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(10px); z-index: 1; }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); z-index: 10; }
  
  .auth-container { padding: 40px 24px; max-width: 400px; margin: auto; width: 100%; }
  .logo-title { font-size: 42px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .logo-subtitle { color: var(--text-muted); margin-bottom: 40px; }
  .checkbox-group { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; background: var(--panel); padding: 16px; border-radius: 16px; }
  .checkbox-group input { width: 20px; height: 20px; margin: 0; flex-shrink: 0; accent-color: var(--accent); }
  .checkbox-group label { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .switch-auth { text-align: center; margin-top: 24px; color: var(--accent); font-weight: 600; cursor: pointer; }
  
  .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
  .header-brand { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; color: var(--accent); }
  .header-brand img { height: 28px; border-radius: 6px; }
  
  .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; scroll-behavior: smooth; }
  .tab-content { display: none; animation: slideIn 0.3s ease-out; }
  .tab-content.active { display: block; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
  
  .search-bar { position: relative; margin-bottom: 16px; }
  .search-bar .material-symbols-outlined { position: absolute; left: 16px; top: 16px; color: var(--text-muted); }
  .search-bar input { padding-left: 48px; border-radius: 20px; margin: 0; }
  
  .user-card { display: flex; align-items: center; gap: 16px; padding: 14px; background: var(--panel); border-radius: 18px; margin-bottom: 10px; cursor: pointer; }
  .avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-name { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
  .user-msg { font-size: 13px; color: var(--text-muted); }
  
  .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 24px; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; position: relative; }
  .nav-item.active { color: var(--accent); }
  .nav-indicator { position: absolute; top: -12px; width: 20px; height: 3px; background: var(--accent); border-radius: 0 0 4px 4px; opacity: 0; transition: 0.3s; }
  .nav-item.active .nav-indicator { opacity: 1; }
  
  .fab { position: fixed; bottom: 95px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(43,102,255,0.3); color: #fff; z-index: 90; }
  
  .toggle { width: 52px; height: 28px; background: var(--border); border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: 0.3s; }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(24px); }
  
  .chat-screen { background: var(--bg); z-index: 200; }
  .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; animation: pop 0.2s ease-out; }
  @keyframes pop { from { scale: 0.8; opacity: 0; } to { scale: 1; opacity: 1; } }
  .msg.in { background: var(--panel); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.out { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-input-area { display: flex; gap: 12px; padding: 12px 16px 24px; background: var(--panel); align-items: center; }
  .chat-input-area input { margin: 0; border-radius: 25px; background: var(--bg); border: none; }
</style>
</head>
<body>

<div id="auth-screen" class="screen active">
  <div class="auth-container">
    <div class="logo-title">Hafland X</div>
    <div class="logo-subtitle">Версия 1.0.0 Stable</div>
    
    <div id="reg-form">
      <input type="text" id="reg-nick" placeholder="Никнейм">
      <input type="password" id="reg-pass" placeholder="Пароль">
      <div class="checkbox-group">
        <input type="checkbox" id="reg-terms">
        <label>Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент.</label>
      </div>
      <button onclick="handleAuth('register')">ЗАРЕГИСТРИРОВАТЬСЯ</button>
      <div class="switch-auth" onclick="toggleAuthMode()">Уже есть аккаунт? Войти</div>
    </div>

    <div id="log-form" style="display: none;">
      <input type="text" id="log-nick" placeholder="Никнейм">
      <input type="password" id="log-pass" placeholder="Пароль">
      <button onclick="handleAuth('login')">ВОЙТИ</button>
      <div class="switch-auth" onclick="toggleAuthMode()">Нет аккаунта? Создать</div>
    </div>
  </div>
</div>

<div id="main-screen" class="screen">
  <div class="header">
    <div class="header-brand">Hafland X <img src="Picsart_26-02-27_19-28-17-781.png" alt="X"></div>
    <span class="material-symbols-outlined">more_vert</span>
  </div>

  <div class="content">
    <div id="tab-chats" class="tab-content active">
      <div class="search-bar"><span class="material-symbols-outlined">search</span><input type="text" placeholder="Поиск чатов"></div>
      <div class="user-card" style="opacity: 0.7;"><div class="avatar"><span class="material-symbols-outlined">archive</span></div><div class="user-info"><div class="user-name">Архив</div></div></div>
      <div id="active-chats-list"></div>
    </div>

    <div id="tab-contacts" class="tab-content">
      <h3 style="margin-bottom: 16px;">Контакты</h3>
      <div id="contacts-list"></div>
    </div>

    <div id="tab-settings" class="tab-content">
      <h3>Настройки</h3>
      <div style="margin-top: 20px;">
        <div class="user-card"><div class="user-info">Инкогнито</div><div id="incognito-toggle" class="toggle" onclick="toggleSetting('incognito')"></div></div>
        <div class="user-card"><div class="user-info">Светлая тема</div><div id="theme-toggle" class="toggle" onclick="toggleSetting('theme')"></div></div>
      </div>
    </div>

    <div id="tab-profile" class="tab-content">
      <div style="text-align: center; margin-bottom: 24px;">
        <div class="avatar" style="width: 110px; height: 110px; margin: 0 auto 16px; border: 3px solid var(--accent);" onclick="document.getElementById('avatar-upload').click()">
          <img id="profile-img-preview" src="" style="display:none">
          <span id="person-icon" class="material-symbols-outlined" style="font-size: 48px;">person</span>
        </div>
        <input type="file" id="avatar-upload" hidden accept="image/*" onchange="uploadAvatar(event)">
        <h2 id="display-nick">Никнейм</h2>
      </div>
      <textarea id="user-bio" placeholder="О себе..." onblur="saveProfile()"></textarea>
      <input type="text" id="new-nick" placeholder="Новый ник">
      <input type="password" id="new-pass" placeholder="Новый пароль">
      <button onclick="changeCreds()" style="margin-bottom: 12px;">Обновить данные</button>
      <button onclick="logout()" style="background: var(--danger);">Выйти</button>
    </div>
  </div>

  <div class="fab" onclick="switchTab('contacts')"><span class="material-symbols-outlined">add_comment</span></div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('chats', this)"><div class="nav-indicator"></div><span class="material-symbols-outlined">chat_bubble</span><span>Чаты</span></div>
    <div class="nav-item" onclick="switchTab('contacts', this)"><div class="nav-indicator"></div><span class="material-symbols-outlined">group</span><span>Контакты</span></div>
    <div class="nav-item" onclick="switchTab('settings', this)"><div class="nav-indicator"></div><span class="material-symbols-outlined">settings</span><span>Настройки</span></div>
    <div class="nav-item" onclick="switchTab('profile', this)"><div class="nav-indicator"></div><span class="material-symbols-outlined">person</span><span>Профиль</span></div>
  </div>
</div>

<div id="chat-screen" class="screen chat-screen">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 12px;">
      <span class="material-symbols-outlined" onclick="closeChat()" style="cursor: pointer;">arrow_back</span>
      <div class="avatar" style="width: 38px; height: 38px;"><span class="material-symbols-outlined">person</span></div>
      <div id="chat-user-title" class="user-name">Чат</div>
    </div>
  </div>
  <div class="messages" id="msg-container"></div>
  <div class="chat-input-area">
    <input type="text" id="msg-input" placeholder="Сообщение...">
    <div onclick="sendMsg()" style="color: var(--accent); cursor: pointer;"><span class="material-symbols-outlined" style="font-size: 32px;">send</span></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, onSnapshot, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
    authDomain: "hafland-x-66cdc.firebaseapp.com",
    projectId: "hafland-x-66cdc",
    storageBucket: "hafland-x-66cdc.firebasestorage.app",
    messagingSenderId: "1007892951941",
    appId: "1:1007892951941:web:692984898e47747307caec"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let userMe = null;
  let targetUid = null;
  let unsubChat = null;

  window.toggleAuthMode = () => {
    const rf = document.getElementById('reg-form'), lf = document.getElementById('log-form');
    rf.style.display = rf.style.display === 'none' ? 'block' : 'none';
    lf.style.display = lf.style.display === 'none' ? 'block' : 'none';
  };

  window.handleAuth = async (type) => {
    if (type === 'register') {
      const nick = document.getElementById('reg-nick').value.trim();
      const pass = document.getElementById('reg-pass').value;
      if (!nick || !pass || !document.getElementById('reg-terms').checked) return alert('Проверь поля и галочку');
      const q = query(collection(db, "users"), where("nickname", "==", nick));
      const snap = await getDocs(q);
      if (!snap.empty) return alert('Ник занят');
      const res = await signInAnonymously(auth);
      await setDoc(doc(db, "users", res.user.uid), { nickname: nick, password: pass, incognito: false, bio: '', lastUpd: 0 });
      location.reload();
    } else {
      const nick = document.getElementById('log-nick').value.trim();
      const pass = document.getElementById('log-pass').value;
      const q = query(collection(db, "users"), where("nickname", "==", nick), where("password", "==", pass));
      const snap = await getDocs(q);
      if (snap.empty) return alert('Ошибка входа');
      localStorage.setItem('hfx_uid', snap.docs[0].id);
      await signInAnonymously(auth);
      location.reload();
    }
  };

  onAuthStateChanged(auth, async (u) => {
    const uid = localStorage.getItem('hfx_uid') || (u ? u.uid : null);
    if (uid) {
      const s = await getDoc(doc(db, "users", uid));
      if (s.exists()) {
        userMe = { uid, ...s.data() };
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        initApp();
      }
    }
  });

  function initApp() {
    document.getElementById('display-nick').innerText = userMe.nickname;
    document.getElementById('user-bio').value = userMe.bio || '';
    if (userMe.incognito) document.getElementById('incognito-toggle').classList.add('on');
    
    onSnapshot(collection(db, "users"), (snap) => {
      const list = document.getElementById('contacts-list');
      list.innerHTML = '';
      snap.forEach(s => {
        const u = s.data();
        if (s.id !== userMe.uid && !u.incognito) {
          list.innerHTML += `<div class="user-card" onclick="openChat('${s.id}', '${u.nickname}')"><div class="avatar"><span class="material-symbols-outlined">person</span></div><div class="user-name">${u.nickname}</div></div>`;
        }
      });
    });

    onSnapshot(collection(db, `chats/${userMe.uid}/active_chats`), (snap) => {
      const list = document.getElementById('active-chats-list');
      list.innerHTML = '';
      snap.forEach(async (s) => {
        const us = await getDoc(doc(db, "users", s.id));
        if (us.exists()) {
          list.innerHTML += `<div class="user-card" onclick="openChat('${s.id}', '${us.data().nickname}')"><div class="avatar"><span class="material-symbols-outlined">person</span></div><div class="user-info"><div class="user-name">${us.data().nickname}</div><div class="user-msg">Активный диалог</div></div></div>`;
        }
      });
    });
  }

  window.switchTab = (tab, el) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (el) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
    }
  };

  window.toggleSetting = async (type) => {
    const btn = document.getElementById(type + '-toggle');
    btn.classList.toggle('on');
    if (type === 'theme') document.documentElement.setAttribute('data-theme', btn.classList.contains('on') ? 'light' : 'dark');
    if (type === 'incognito') await updateDoc(doc(db, "users", userMe.uid), { incognito: btn.classList.contains('on') });
  };

  window.openChat = async (uid, nick) => {
    targetUid = uid;
    document.getElementById('chat-user-title').innerText = nick;
    document.getElementById('chat-screen').classList.add('active');
    const chatId = userMe.uid < uid ? `${userMe.uid}_${uid}` : `${uid}_${userMe.uid}`;
    
    await setDoc(doc(db, `chats/${userMe.uid}/active_chats`, uid), { last: serverTimestamp() }, { merge: true });
    
    if (unsubChat) unsubChat();
    const q = query(collection(db, `messages/${chatId}/msg_list`), orderBy('ts'));
    unsubChat = onSnapshot(q, (snap) => {
      const cont = document.getElementById('msg-container');
      cont.innerHTML = '';
      snap.forEach(m => {
        const d = m.data();
        cont.innerHTML += `<div class="msg ${d.s === userMe.uid ? 'out' : 'in'}">${d.t}</div>`;
      });
      cont.scrollTop = cont.scrollHeight;
    });
  };

  window.closeChat = () => {
    document.getElementById('chat-screen').classList.remove('active');
    if (unsubChat) { unsubChat(); unsubChat = null; }
  };

  window.sendMsg = async () => {
    const i = document.getElementById('msg-input');
    const text = i.value.trim();
    if (!text) return;
    const chatId = userMe.uid < targetUid ? `${userMe.uid}_${targetUid}` : `${targetUid}_${userMe.uid}`;
    i.value = '';
    await addDoc(collection(db, `messages/${chatId}/msg_list`), { s: userMe.uid, t: text, ts: serverTimestamp() });
    await setDoc(doc(db, `chats/${targetUid}/active_chats`, userMe.uid), { last: serverTimestamp() }, { merge: true });
  };

  window.saveProfile = async () => await updateDoc(doc(db, "users", userMe.uid), { bio: document.getElementById('user-bio').value });

  window.uploadAvatar = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        document.getElementById('profile-img-preview').src = ev.target.result;
        document.getElementById('profile-img-preview').style.display = 'block';
        document.getElementById('person-icon').style.display = 'none';
        await updateDoc(doc(db, "users", userMe.uid), { avatar: ev.target.result });
      };
      reader.readAsDataURL(file);
    }
  };

  window.changeCreds = async () => {
    const now = Date.now();
    if (now - (userMe.lastUpd || 0) < 604800000) return alert('Можно менять раз в 7 дней');
    const n = document.getElementById('new-nick').value, p = document.getElementById('new-pass').value;
    let up = { lastUpd: now };
    if (n) up.nickname = n; if (p) up.password = p;
    await updateDoc(doc(db, "users", userMe.uid), up);
    alert('Успешно');
  };

  window.logout = () => { localStorage.clear(); auth.signOut(); location.reload(); };
</script>
</body>
</html>
