<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v1.0</title>
    <!-- Библиотеки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Legacy (самый стабильный для GitHub Pages без сборщиков) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: white; color: black; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); }
        .dark { background-color: #09090b; color: white; }
        .dark .glass { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        .chat-bubble-mine { border-radius: 20px 20px 4px 20px; background: #000000; color: white; }
        .chat-bubble-theirs { border-radius: 20px 20px 20px 4px; background: #f4f4f5; color: black; border: 1px solid #e4e4e7; }
        .dark .chat-bubble-theirs { background: #27272a; color: white; border: none; }
        .dark .chat-bubble-mine { background: #ffffff; color: black; }
        .active-nav { background: rgba(0, 0, 0, 0.05); border-radius: 24px; color: black !important; }
        .dark .active-nav { background: rgba(255, 255, 255, 0.1); color: white !important; }
        ::-webkit-scrollbar { width: 0px; }
        input[type="checkbox"] { accent-color: #000; }
        .loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; z-index: 9999; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Предотвращаем ошибки JSX в обычном скрипте через React.createElement
        const e = React.createElement;
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        // Инициализация
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (err) {
            console.error("Firebase init error:", err);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        function Icon({ name, size = 24, className = "" }) {
            const LucideIcon = lucide[name];
            return LucideIcon ? e(LucideIcon, { size, className }) : null;
        }

        // Основной компонент приложения
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('chats'); // chats, contacts, settings, profile, activeChat
            const [activeChatUser, setActiveChatUser] = useState(null);
            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        const userDoc = await db.collection("users").doc(u.uid).get();
                        const userData = userDoc.data();
                        setUser({ uid: u.uid, ...userData });
                        setIsDark(userData?.darkMode || false);
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return unsub;
            }, []);

            useEffect(() => {
                if (isDark) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [isDark]);

            if (loading) {
                return e('div', { className: 'loading-screen' }, 
                    e('div', { className: 'w-10 h-10 border-4 border-black border-t-transparent rounded-full animate-spin mb-4' }),
                    e('p', { className: 'font-bold tracking-tighter text-xl' }, 'Hafland X')
                );
            }

            if (!user) return e(AuthScreen);

            // Рендеринг контента в зависимости от view
            let content;
            if (view === 'chats') content = e(ChatsView, { user, setView, setActiveChatUser });
            else if (view === 'contacts') content = e(ContactsView, { user, setView, setActiveChatUser });
            else if (view === 'settings') content = e(SettingsView, { user, isDark, setIsDark });
            else if (view === 'profile') content = e(ProfileView, { user });
            else if (view === 'activeChat') content = e(ChatRoom, { user, target: activeChatUser, setView });

            return e('div', { className: 'h-screen w-screen flex flex-col' },
                e('main', { className: 'flex-1 overflow-hidden relative' }, content),
                view !== 'activeChat' && e('nav', { className: 'h-24 flex items-center justify-center px-6' },
                    e('div', { className: 'glass w-full max-w-sm h-16 rounded-full flex items-center justify-around px-2 shadow-xl' },
                        e(NavItem, { active: view === 'chats', icon: 'MessageCircle', label: 'Чаты', onClick: () => setView('chats') }),
                        e(NavItem, { active: view === 'contacts', icon: 'Search', label: 'Люди', onClick: () => setView('contacts') }),
                        e(NavItem, { active: view === 'settings', icon: 'Settings', label: 'Опции', onClick: () => setView('settings') }),
                        e(NavItem, { active: view === 'profile', icon: 'User', label: 'Профиль', onClick: () => setView('profile') })
                    )
                )
            );
        }

        function NavItem({ active, icon, label, onClick }) {
            return e('button', { 
                onClick, 
                className: `flex flex-col items-center justify-center flex-1 h-12 transition-all ${active ? 'active-nav' : 'text-gray-400'}`
            }, 
                e(Icon, { name: icon, size: 20 }),
                active && e('span', { className: 'text-[9px] font-black uppercase mt-0.5' }, label)
            );
        }

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [agreed, setAgreed] = useState(false);

            const handleAuth = async () => {
                if (!isLogin && !agreed) return setError('Примите соглашение');
                if (!username || !password) return setError('Заполните данные');
                
                const email = username.includes('@') ? username : `${username}@hafland.x`;
                try {
                    if (isLogin) {
                        await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        const nameCheck = await db.collection("users").where("username", "==", username).get();
                        if (!nameCheck.empty) return setError('Ник занят');
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        await db.collection("users").doc(cred.user.uid).set({
                            username, uid: cred.user.uid,
                            photoURL: `https://api.dicebear.com/7.x/bottts/svg?seed=${username}`,
                            isDiscoverable: true, darkMode: false
                        });
                        alert("Регистрация Hafland X успешна. Ваши данные конфиденциальны.");
                    }
                } catch (e) { setError('Ошибка входа/регистрации'); }
            };

            return e('div', { className: 'h-screen w-screen flex flex-col items-center justify-center p-10 bg-white' },
                e('div', { className: 'w-full max-w-xs' },
                    e('h1', { className: 'text-4xl font-black mb-1 text-center italic tracking-tighter' }, 'HAFLAND X'),
                    e('p', { className: 'text-center text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-10' }, 'Secure Messeneger'),
                    
                    e('div', { className: 'space-y-4' },
                        e('div', {}, 
                            e('p', { className: 'text-[10px] font-black text-gray-400 mb-1 ml-1' }, 'НИКНЕЙМ'),
                            e('input', { 
                                type: 'text', placeholder: 'Любой ник и пароль',
                                className: 'w-full bg-gray-100 p-4 rounded-2xl outline-none font-bold',
                                value: username, onChange: (ev) => setUsername(ev.target.value.toLowerCase())
                            })
                        ),
                        e('div', {}, 
                            e('p', { className: 'text-[10px] font-black text-gray-400 mb-1 ml-1' }, 'ПАРОЛЬ'),
                            e('input', { 
                                type: 'password', placeholder: '••••••••',
                                className: 'w-full bg-gray-100 p-4 rounded-2xl outline-none font-bold',
                                value: password, onChange: (ev) => setPassword(ev.target.value)
                            })
                        ),
                        !isLogin && e('div', { className: 'flex gap-2 items-start p-1' },
                            e('input', { type: 'checkbox', className: 'mt-1', checked: agreed, onChange: e => setAgreed(e.target.checked) }),
                            e('p', { className: 'text-[9px] text-gray-400 font-medium' }, 'Hafland не несёт ответственности за ваши действия внутри мессенджера')
                        ),
                        error && e('p', { className: 'text-red-500 text-[10px] text-center font-bold' }, error),
                        e('button', { 
                            onClick: handleAuth,
                            className: 'w-full bg-black text-white p-4 rounded-2xl font-black active:scale-95 transition-all shadow-lg'
                        }, isLogin ? 'ВОЙТИ' : 'ЗАРЕГИСТРИРОВАТЬСЯ'),
                        e('button', { 
                            onClick: () => setIsLogin(!isLogin),
                            className: 'w-full text-blue-500 font-bold text-xs'
                        }, isLogin ? 'Создать новый аккаунт' : 'Уже есть аккаунт? Войти')
                    )
                )
            );
        }

        function ChatsView({ user, setView, setActiveChatUser }) {
            const [items, setItems] = useState([]);
            useEffect(() => {
                return db.collection("chats").where("participants", "array-contains", user.uid).onSnapshot(async snap => {
                    const res = [];
                    for (const d of snap.docs) {
                        const data = d.data();
                        const otherId = data.participants.find(p => p !== user.uid);
                        const otherDoc = await db.collection("users").doc(otherId).get();
                        res.push({ id: d.id, last: data.lastMessage, other: otherDoc.data() });
                    }
                    setItems(res);
                });
            }, []);

            return e('div', { className: 'p-6 h-full overflow-y-auto' },
                e('h2', { className: 'text-3xl font-black mb-6 mt-4 italic' }, 'Chats'),
                items.length === 0 && e('p', { className: 'text-center text-gray-300 mt-20 font-bold uppercase text-xs' }, 'Пусто'),
                items.map(i => e('div', { 
                    key: i.id, onClick: () => { setActiveChatUser(i.other); setView('activeChat'); },
                    className: 'flex items-center gap-4 p-4 rounded-3xl bg-gray-50 dark:bg-zinc-900 mb-3 active:scale-95 transition-all border border-gray-100 dark:border-zinc-800'
                }, 
                    e('img', { src: i.other?.photoURL, className: 'w-14 h-14 rounded-full bg-white shadow-sm' }),
                    e('div', { className: 'flex-1 overflow-hidden' },
                        e('h3', { className: 'font-black' }, i.other?.username),
                        e('p', { className: 'text-xs text-gray-400 truncate' }, i.last || 'Начните чат')
                    )
                ))
            );
        }

        function ContactsView({ user, setView, setActiveChatUser }) {
            const [users, setUsers] = useState([]);
            const [myContacts, setMyContacts] = useState([]);

            useEffect(() => {
                db.collection("users").where("isDiscoverable", "==", true).limit(20).get().then(s => {
                    setUsers(s.docs.map(d => d.data()).filter(u => u.uid !== user.uid));
                });
                db.collection("users").doc(user.uid).collection("contacts").onSnapshot(s => {
                    setMyContacts(s.docs.map(d => d.id));
                });
            }, []);

            const add = async (u) => {
                await db.collection("users").doc(user.uid).collection("contacts").doc(u.uid).set({ active: true });
            };

            return e('div', { className: 'p-6 h-full overflow-y-auto' },
                e('h2', { className: 'text-3xl font-black mb-6 mt-4 italic' }, 'Explore'),
                users.map(u => e('div', { key: u.uid, className: 'flex items-center justify-between p-4 glass rounded-3xl mb-3' },
                    e('div', { className: 'flex items-center gap-3' },
                        e('img', { src: u.photoURL, className: 'w-10 h-10 rounded-full' }),
                        e('span', { className: 'font-bold' }, u.username)
                    ),
                    myContacts.includes(u.uid) 
                        ? e('button', { 
                            onClick: () => { setActiveChatUser(u); setView('activeChat'); },
                            className: 'bg-black text-white px-4 py-2 rounded-xl text-[10px] font-black'
                          }, 'ЧАТ')
                        : e('button', { 
                            onClick: () => add(u),
                            className: 'bg-gray-100 dark:bg-zinc-800 text-black dark:text-white px-4 py-2 rounded-xl text-[10px] font-black'
                          }, 'ДОБАВИТЬ')
                ))
            );
        }

        function ChatRoom({ user, target, setView }) {
            const [text, setText] = useState('');
            const [messages, setMessages] = useState([]);
            const id = [user.uid, target.uid].sort().join('_');
            const endRef = useRef();

            useEffect(() => {
                return db.collection("chats").doc(id).collection("messages").orderBy("createdAt", "asc").onSnapshot(s => {
                    setMessages(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setTimeout(() => endRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
            }, []);

            const send = async () => {
                if (!text.trim()) return;
                const m = text; setText('');
                const ts = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("chats").doc(id).set({ participants: [user.uid, target.uid], lastMessage: m, updatedAt: ts }, { merge: true });
                await db.collection("chats").doc(id).collection("messages").add({ text: m, senderId: user.uid, createdAt: ts });
            };

            return e('div', { className: 'h-full flex flex-col' },
                e('header', { className: 'p-4 glass flex items-center gap-4 z-10' },
                    e('button', { onClick: () => setView('chats') }, e(Icon, { name: 'ChevronLeft' })),
                    e('img', { src: target.photoURL, className: 'w-10 h-10 rounded-full' }),
                    e('span', { className: 'font-black' }, target.username)
                ),
                e('div', { className: 'flex-1 overflow-y-auto p-4 space-y-4' },
                    messages.map(m => e('div', { key: m.id, className: `flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}` },
                        e('div', { className: `max-w-[75%] p-4 font-medium text-sm ${m.senderId === user.uid ? 'chat-bubble-mine' : 'chat-bubble-theirs'}` }, m.text)
                    )),
                    e('div', { ref: endRef })
                ),
                e('div', { className: 'p-4 glass flex gap-2' },
                    e('input', { 
                        className: 'flex-1 bg-gray-100 dark:bg-zinc-900 p-4 rounded-3xl outline-none text-sm font-bold',
                        placeholder: 'Пиши здесь...', value: text, onChange: ev => setText(ev.target.value),
                        onKeyPress: ev => ev.key === 'Enter' && send()
                    }),
                    e('button', { onClick: send, className: 'bg-black text-white w-12 h-12 rounded-full flex items-center justify-center' }, e(Icon, { name: 'ArrowUp', size: 20 }))
                )
            );
        }

        function SettingsView({ user, isDark, setIsDark }) {
            const [disc, setDisc] = useState(user.isDiscoverable);
            const upd = async (key, val) => {
                await db.collection("users").doc(user.uid).update({ [key]: val });
            };

            return e('div', { className: 'p-6' },
                e('h2', { className: 'text-3xl font-black mb-10 mt-4 italic' }, 'Options'),
                e('div', { className: 'space-y-4' },
                    e('div', { className: 'flex justify-between items-center p-5 glass rounded-3xl' },
                        e('span', { className: 'font-bold' }, 'Темная тема'),
                        e('input', { type: 'checkbox', checked: isDark, onChange: () => { setIsDark(!isDark); upd('darkMode', !isDark); } })
                    ),
                    e('div', { className: 'flex justify-between items-center p-5 glass rounded-3xl' },
                        e('span', { className: 'font-bold' }, 'Публичный профиль'),
                        e('input', { type: 'checkbox', checked: disc, onChange: () => { setDisc(!disc); upd('isDiscoverable', !disc); } })
                    )
                )
            );
        }

        function ProfileView({ user }) {
            const logout = () => auth.signOut();
            return e('div', { className: 'p-6 flex flex-col items-center' },
                e('h2', { className: 'text-3xl font-black mb-10 mt-4 italic self-start' }, 'Profile'),
                e('img', { src: user.photoURL, className: 'w-32 h-32 rounded-full mb-4 border-4 border-black p-1 shadow-2xl' }),
                e('h3', { className: 'text-xl font-black mb-10' }, `@${user.username}`),
                e('button', { onClick: logout, className: 'w-full bg-gray-100 dark:bg-zinc-900 p-4 rounded-2xl font-black text-red-500 mb-2' }, 'ВЫЙТИ'),
                e('button', { onClick: () => alert('Удаление...'), className: 'text-[10px] text-gray-300 font-bold uppercase' }, 'Удалить аккаунт')
            );
        }

        // Рендер
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));

    </script>
</body>
</html>
