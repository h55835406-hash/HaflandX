<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafland X Messenger</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for GitHub Pages Compatibility -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .glass-dark { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Firebase imports from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "hafland-x-v1";

        // Icons Component
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [view, setView] = useState('chats'); 
            const [allUsers, setAllUsers] = useState([]);
            const [myContacts, setMyContacts] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [darkMode, setDarkMode] = useState(false);
            const [authView, setAuthView] = useState('login');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) { setUserData(null); setLoading(false); }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
                return onSnapshot(userDocRef, (snap) => {
                    if (snap.exists()) {
                        setUserData(snap.data());
                        setDarkMode(snap.data().darkMode || false);
                    }
                    setLoading(false);
                });
            }, [user]);

            useEffect(() => {
                if (!user) return;
                return onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                    setAllUsers(snap.docs.filter(d => d.id !== user.uid).map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            useEffect(() => {
                if (!user) return;
                return onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'contacts'), (snap) => {
                    setMyContacts(snap.docs.map(d => d.id));
                });
            }, [user]);

            useEffect(() => {
                if (!user || !activeChat) return;
                const chatId = [user.uid, activeChat.id].sort().join('_');
                const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats', chatId, 'messages');
                return onSnapshot(msgsRef, (snap) => {
                    const m = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(m.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
                });
            }, [user, activeChat]);

            const handleRegister = async (username, password) => {
                if (allUsers.some(u => u.username?.toLowerCase() === username.toLowerCase())) return alert("Ник занят!");
                await signInAnonymously(auth);
                const u = auth.currentUser;
                const payload = {
                    uid: u.uid, username, password,
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${username}`,
                    visible: true, darkMode: false, createdAt: new Date().toISOString()
                };
                await setDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'info'), payload);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), {
                    username: payload.username, avatar: payload.avatar, visible: payload.visible
                });
                alert("Успех! Ваши данные конфиденциальны.");
            };

            const sendMessage = async (text) => {
                if (!text.trim() || !activeChat) return;
                const chatId = [user.uid, activeChat.id].sort().join('_');
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats', chatId, 'messages'), {
                    senderId: user.uid, text, createdAt: serverTimestamp()
                });
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-gray-50 text-gray-400">Загрузка Hafland X...</div>;

            if (!user || !userData) return <AuthScreen view={authView} setView={setAuthView} onRegister={handleRegister} />;

            return (
                <div className={`h-screen w-screen flex flex-col ${darkMode ? 'bg-black text-white' : 'bg-gray-50 text-black'}`}>
                    <header className={`px-6 py-4 flex justify-between items-center border-b z-50 ${darkMode ? 'glass-dark border-gray-800' : 'glass border-gray-200'}`}>
                        <div><h1 className="text-xl font-bold">Hafland X</h1><p className="text-[10px] opacity-50 uppercase tracking-widest">v1.0</p></div>
                        <div onClick={() => setView('profile')} className="w-10 h-10 rounded-full border-2 border-blue-500 overflow-hidden cursor-pointer"><img src={userData.avatar} /></div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24 px-4 pt-4 hide-scrollbar">
                        {view === 'chats' && (
                            <div className="max-w-md mx-auto space-y-3">
                                {allUsers.filter(u => myContacts.includes(u.id)).map(c => (
                                    <div key={c.id} onClick={() => { setActiveChat(c); setView('chatRoom'); }} className={`p-4 rounded-2xl flex items-center border shadow-sm cursor-pointer active:scale-95 transition-all ${darkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100'}`}>
                                        <img src={c.avatar} className="w-12 h-12 rounded-full mr-4 bg-gray-100" />
                                        <div className="font-semibold">{c.username}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'contacts' && (
                            <div className="max-w-md mx-auto space-y-3">
                                {allUsers.filter(u => u.visible).map(c => (
                                    <div key={c.id} className={`p-4 rounded-2xl flex items-center border shadow-sm ${darkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100'}`}>
                                        <img src={c.avatar} className="w-12 h-12 rounded-full mr-4 bg-gray-100" />
                                        <div className="flex-1 font-semibold">{c.username}</div>
                                        {myContacts.includes(c.id) ? <Icon name="check" className="text-green-500"/> : 
                                        <button onClick={() => setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contacts', c.id), {added: true})} className="p-2 bg-blue-500 text-white rounded-full"><Icon name="user-plus" size={18}/></button>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'chatRoom' && activeChat && (
                            <div className="h-full flex flex-col max-w-2xl mx-auto">
                                <div className="flex-1 space-y-4 pb-4">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-3 rounded-2xl text-sm ${m.senderId === user.uid ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-200 text-black rounded-tl-none'}`}>{m.text}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className={`p-2 flex gap-2 border rounded-full sticky bottom-0 ${darkMode ? 'bg-gray-900 border-gray-700' : 'bg-white border-gray-200'}`}>
                                    <input id="msgInput" type="text" placeholder="Сообщение..." className="flex-1 bg-transparent px-4 outline-none" onKeyDown={(e) => { if(e.key==='Enter'){ sendMessage(e.target.value); e.target.value=''; }}} />
                                    <button onClick={() => { const i=document.getElementById('msgInput'); sendMessage(i.value); i.value=''; }} className="bg-blue-500 text-white p-2 rounded-full"><Icon name="send" size={18}/></button>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="max-w-md mx-auto p-6 rounded-3xl border shadow-xl glass">
                                <div className="flex justify-between items-center py-4 border-b"><span>Тёмная тема</span><button onClick={() => updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), {darkMode: !darkMode})} className={`w-12 h-6 rounded-full relative ${darkMode ? 'bg-blue-500' : 'bg-gray-300'}`}><div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${darkMode ? 'left-7' : 'left-1'}`}></div></button></div>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="max-w-md mx-auto text-center space-y-6">
                                <img src={userData.avatar} className="w-32 h-32 rounded-full mx-auto border-4 border-blue-500 shadow-xl" />
                                <h2 className="text-2xl font-bold">{userData.username}</h2>
                                <button onClick={() => signOut(auth)} className="w-full py-4 bg-orange-100 text-orange-600 rounded-2xl font-bold">Выйти</button>
                                <button onClick={async () => { if(confirm("Удалить?")){ await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid)); signOut(auth); }}} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-bold">Удалить аккаунт</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm h-16 glass border border-white/20 rounded-full flex items-center justify-around px-4 shadow-2xl z-50">
                        {['chats', 'contacts', 'settings', 'profile'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`p-3 rounded-full transition-all ${view === v ? 'bg-blue-500 text-white scale-110 shadow-lg' : 'text-gray-400'}`}>
                                <Icon name={v === 'chats' ? 'message-square' : v === 'contacts' ? 'users' : v === 'settings' ? 'settings' : 'user'} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        function AuthScreen({ view, setView, onRegister }) {
            const [n, setN] = useState(''); const [p, setP] = useState(''); const [a, setA] = useState(false);
            return (
                <div className="h-screen flex items-center justify-center p-6 bg-white">
                    <div className="w-full max-w-sm space-y-6">
                        <div className="text-center"><div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black rotate-12">H</div><h1 className="text-3xl font-bold">Hafland X</h1></div>
                        <div className="bg-gray-50 p-6 rounded-[2.5rem] border space-y-4">
                            <p className="text-center text-sm font-semibold">Придумайте любой ник и пароль</p>
                            <input type="text" placeholder="Никнейм" className="w-full p-4 rounded-2xl border-none shadow-sm" onChange={e=>setN(e.target.value)} />
                            <input type="password" placeholder="Пароль" className="w-full p-4 rounded-2xl border-none shadow-sm" onChange={e=>setP(e.target.value)} />
                            <div className="flex gap-2 text-[10px]"><input type="checkbox" onChange={e=>setA(e.target.checked)} /><span>Hafland не несёт ответственности за ваши действия внутри мессенджера</span></div>
                            <button disabled={!a || !n || !p} onClick={() => onRegister(n, p)} className="w-full py-4 bg-black text-white rounded-2xl font-bold disabled:opacity-30">Создать аккаунт</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
