<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; color: #000000; transition: background-color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); }
        .dark { background-color: #000000; color: #ffffff; }
        .dark .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        
        .chat-bubble-mine { border-radius: 20px 20px 4px 20px; background: #000000; color: #ffffff; }
        .chat-bubble-theirs { border-radius: 20px 20px 20px 4px; background: #f4f4f5; color: #000000; border: 1px solid #e4e4e7; }
        
        .dark .chat-bubble-theirs { background: #27272a; color: #ffffff; border: none; }
        .dark .chat-bubble-mine { background: #ffffff; color: #000000; }
        
        .active-nav { background: rgba(0, 0, 0, 0.05); border-radius: 24px; color: #000000 !important; }
        .dark .active-nav { background: rgba(255, 255, 255, 0.1); color: #ffffff !important; }
        
        ::-webkit-scrollbar { width: 0px; }
        .loading-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; z-index: 9999; }
        .dark .loading-screen { background: #000; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function Icon({ name, size = 24, className = "" }) {
            const LucideIcon = lucide[name];
            return LucideIcon ? e(LucideIcon, { size, className }) : null;
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('chats'); 
            const [activeChatUser, setActiveChatUser] = useState(null);
            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const savedUid = localStorage.getItem('hafland_uid');
                if (savedUid) {
                    db.collection("users").doc(savedUid).get().then(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            setUser({ uid: savedUid, ...data });
                            setIsDark(data.darkMode || false);
                        }
                        setLoading(false);
                    }).catch(() => setLoading(false));
                } else {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                if (isDark) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [isDark]);

            if (loading) return e('div', { className: 'loading-screen' }, e('div', { className: 'w-8 h-8 border-4 border-black dark:border-white border-t-transparent rounded-full animate-spin' }));

            if (!user) return e(AuthScreen, { onAuth: (u) => { setUser(u); setIsDark(u.darkMode || false); } });

            let content;
            if (view === 'chats') content = e(ChatsView, { user, setView, setActiveChatUser });
            else if (view === 'contacts') content = e(ContactsView, { user, setView, setActiveChatUser });
            else if (view === 'settings') content = e(SettingsView, { user, isDark, setIsDark });
            else if (view === 'profile') content = e(ProfileView, { user, onLogout: () => { setUser(null); localStorage.removeItem('hafland_uid'); } });
            else if (view === 'activeChat') content = e(ChatRoom, { user, target: activeChatUser, setView });

            return e('div', { className: 'h-screen w-screen flex flex-col' },
                e('main', { className: 'flex-1 overflow-hidden relative' }, content),
                view !== 'activeChat' && e('nav', { className: 'h-24 flex items-center justify-center px-6' },
                    e('div', { className: 'glass w-full max-w-sm h-16 rounded-full flex items-center justify-around px-2 shadow-xl' },
                        e(NavItem, { active: view === 'chats', icon: 'MessageCircle', label: 'Чаты', onClick: () => setView('chats') }),
                        e(NavItem, { active: view === 'contacts', icon: 'Search', label: 'Люди', onClick: () => setView('contacts') }),
                        e(NavItem, { active: view === 'settings', icon: 'Settings', label: 'Опции', onClick: () => setView('settings') }),
                        e(NavItem, { active: view === 'profile', icon: 'User', label: 'Профиль', onClick: () => setView('profile') })
                    )
                )
            );
        }

        function NavItem({ active, icon, label, onClick }) {
            return e('button', { onClick, className: `flex flex-col items-center justify-center flex-1 h-12 transition-all ${active ? 'active-nav' : 'text-gray-400'}` }, 
                e(Icon, { name: icon, size: 20 }),
                active && e('span', { className: 'text-[9px] font-black uppercase mt-0.5' }, label)
            );
        }

        function AuthScreen({ onAuth }) {
            const [isLogin, setIsLogin] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [agreed, setAgreed] = useState(false);

            const handleAuth = async () => {
                setError('');
                if (!isLogin && !agreed) return setError('Примите соглашение');
                if (!username || !password) return setError('Заполните поля');
                const cleanName = username.trim().toLowerCase().replace(/[^a-z0-9]/g, '');

                try {
                    const userRef = db.collection("users").doc(cleanName);
                    const doc = await userRef.get();
                    if (isLogin) {
                        if (doc.exists && doc.data().password === password) {
                            localStorage.setItem('hafland_uid', cleanName);
                            onAuth({ uid: cleanName, ...doc.data() });
                        } else setError('Неверные данные');
                    } else {
                        if (doc.exists) setError('Ник занят');
                        else {
                            const newUser = { username: cleanName, password, uid: cleanName, photoURL: `https://api.dicebear.com/7.x/bottts/svg?seed=${cleanName}`, isDiscoverable: true, darkMode: false };
                            await userRef.set(newUser);
                            localStorage.setItem('hafland_uid', cleanName);
                            onAuth(newUser);
                        }
                    }
                } catch { setError('Ошибка сервера'); }
            };

            return e('div', { className: 'h-screen w-screen flex flex-col items-center justify-center p-10' },
                e('h1', { className: 'text-4xl font-black mb-1 italic tracking-tighter' }, 'HAFLAND X'),
                e('p', { className: 'text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-10' }, 'v1.2 Secure Messenger'),
                e('div', { className: 'w-full max-w-xs space-y-3' },
                    e('input', { placeholder: 'Никнейм', className: 'w-full bg-gray-100 dark:bg-zinc-900 p-4 rounded-2xl outline-none font-bold', value: username, onChange: ev => setUsername(ev.target.value) }),
                    e('input', { type: 'password', placeholder: 'Пароль', className: 'w-full bg-gray-100 dark:bg-zinc-900 p-4 rounded-2xl outline-none font-bold', value: password, onChange: ev => setPassword(ev.target.value) }),
                    !isLogin && e('div', { className: 'flex gap-2 p-2' },
                        e('input', { type: 'checkbox', checked: agreed, onChange: ev => setAgreed(ev.target.checked) }),
                        e('p', { className: 'text-[9px] text-gray-400 font-bold uppercase' }, 'Hafland не несёт ответственности за ваши действия внутри сайта')
                    ),
                    error && e('p', { className: 'text-red-500 text-center text-[10px] font-bold' }, error),
                    e('button', { onClick: handleAuth, className: 'w-full bg-black dark:bg-white dark:text-black text-white p-4 rounded-2xl font-black' }, isLogin ? 'ВОЙТИ' : 'РЕГИСТРАЦИЯ'),
                    e('button', { onClick: () => setIsLogin(!isLogin), className: 'w-full text-blue-500 text-[10px] font-bold' }, isLogin ? 'СОЗДАТЬ АККАУНТ' : 'УЖЕ ЕСТЬ АККАУНТ')
                )
            );
        }

        function ChatsView({ user, setView, setActiveChatUser }) {
            const [items, setItems] = useState([]);
            useEffect(() => {
                return db.collection("chats").where("participants", "array-contains", user.uid).onSnapshot(async snap => {
                    const res = [];
                    for (const d of snap.docs) {
                        const data = d.data();
                        const otherId = data.participants.find(p => p !== user.uid);
                        const oDoc = await db.collection("users").doc(otherId).get();
                        if (oDoc.exists) res.push({ id: d.id, last: data.lastMessage, other: oDoc.data() });
                    }
                    setItems(res);
                });
            }, []);

            return e('div', { className: 'p-6 h-full overflow-y-auto' },
                e('h2', { className: 'text-3xl font-black mb-6 italic' }, 'Chats'),
                items.map(i => e('div', { key: i.id, onClick: () => { setActiveChatUser(i.other); setView('activeChat'); }, className: 'flex items-center gap-4 p-4 glass rounded-3xl mb-3 active:scale-95 transition-all' },
                    e('img', { src: i.other.photoURL, className: 'w-12 h-12 rounded-full bg-white' }),
                    e('div', { className: 'flex-1' }, e('h3', { className: 'font-black' }, i.other.username), e('p', { className: 'text-xs text-gray-400 truncate' }, i.last))
                ))
            );
        }

        function ContactsView({ user, setView, setActiveChatUser }) {
            const [users, setUsers] = useState([]);
            useEffect(() => {
                db.collection("users").where("isDiscoverable", "==", true).limit(20).get().then(s => setUsers(s.docs.map(d => d.data()).filter(u => u.uid !== user.uid)));
            }, []);

            return e('div', { className: 'p-6 h-full overflow-y-auto' },
                e('h2', { className: 'text-3xl font-black mb-6 italic' }, 'Explore'),
                users.map(u => e('div', { key: u.uid, className: 'flex items-center justify-between p-4 glass rounded-3xl mb-3' },
                    e('div', { className: 'flex items-center gap-3' }, e('img', { src: u.photoURL, className: 'w-10 h-10 rounded-full bg-white' }), e('span', { className: 'font-bold' }, u.username)),
                    e('button', { onClick: () => { setActiveChatUser(u); setView('activeChat'); }, className: 'bg-black dark:bg-white dark:text-black text-white px-4 py-2 rounded-xl text-[10px] font-black' }, 'ЧАТ')
                ))
            );
        }

        function ChatRoom({ user, target, setView }) {
            const [text, setText] = useState('');
            const [messages, setMessages] = useState([]);
            const chatId = [user.uid, target.uid].sort().join('_');
            const scrollRef = useRef();

            useEffect(() => {
                return db.collection("chats").doc(chatId).collection("messages").orderBy("createdAt", "asc").onSnapshot(s => {
                    setMessages(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setTimeout(() => scrollRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                });
            }, []);

            const send = async () => {
                if (!text.trim()) return;
                const m = text; setText('');
                const ts = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("chats").doc(chatId).set({ participants: [user.uid, target.uid], lastMessage: m, updatedAt: ts }, { merge: true });
                await db.collection("chats").doc(chatId).collection("messages").add({ text: m, senderId: user.uid, createdAt: ts });
            };

            return e('div', { className: 'h-full flex flex-col' },
                e('header', { className: 'p-4 glass flex items-center gap-4' },
                    e('button', { onClick: () => setView('chats') }, e(Icon, { name: 'ChevronLeft' })),
                    e('img', { src: target.photoURL, className: 'w-10 h-10 rounded-full bg-white' }),
                    e('span', { className: 'font-black' }, target.username)
                ),
                e('div', { className: 'flex-1 overflow-y-auto p-4 space-y-3' },
                    messages.map(m => e('div', { key: m.id, className: `flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}` },
                        e('div', { className: `max-w-[80%] p-4 text-sm font-medium ${m.senderId === user.uid ? 'chat-bubble-mine' : 'chat-bubble-theirs'}` }, m.text)
                    )),
                    e('div', { ref: scrollRef })
                ),
                e('div', { className: 'p-4 glass flex gap-2' },
                    e('input', { className: 'flex-1 bg-gray-100 dark:bg-zinc-900 p-4 rounded-3xl outline-none text-sm font-bold', placeholder: 'Текст...', value: text, onChange: ev => setText(ev.target.value), onKeyPress: ev => ev.key === 'Enter' && send() }),
                    e('button', { onClick: send, className: 'bg-black dark:bg-white dark:text-black text-white w-12 h-12 rounded-full flex items-center justify-center' }, e(Icon, { name: 'ArrowUp', size: 18 }))
                )
            );
        }

        function SettingsView({ user, isDark, setIsDark }) {
            const upd = (k, v) => db.collection("users").doc(user.uid).update({ [k]: v });
            return e('div', { className: 'p-6' },
                e('h2', { className: 'text-3xl font-black mb-10 italic' }, 'Options'),
                e('div', { className: 'space-y-4' },
                    e('div', { className: 'flex justify-between items-center p-5 glass rounded-3xl' }, e('span', { className: 'font-bold' }, 'Тёмная тема'), e('input', { type: 'checkbox', checked: isDark, onChange: () => { setIsDark(!isDark); upd('darkMode', !isDark); } })),
                    e('div', { className: 'flex justify-between items-center p-5 glass rounded-3xl' }, e('span', { className: 'font-bold' }, 'Публичный поиск'), e('input', { type: 'checkbox', checked: user.isDiscoverable, onChange: ev => upd('isDiscoverable', ev.target.checked) }))
                )
            );
        }

        function ProfileView({ user, onLogout }) {
            return e('div', { className: 'p-6 flex flex-col items-center' },
                e('h2', { className: 'text-3xl font-black mb-10 italic self-start' }, 'Profile'),
                e('img', { src: user.photoURL, className: 'w-32 h-32 rounded-[40px] mb-4 border-4 border-black dark:border-white p-1 bg-white' }),
                e('h3', { className: 'text-2xl font-black mb-10' }, `@${user.username}`),
                e('button', { onClick: onLogout, className: 'w-full bg-red-50 text-red-500 p-5 rounded-3xl font-black' }, 'ВЫЙТИ')
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
</body>
</html>
