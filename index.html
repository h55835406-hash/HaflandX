<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland 3.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap');
        
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #e5e7eb;
            --accent: #3b82f6;
        }

        body { 
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item-active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-radius: 100px;
        }

        .ios-shadow {
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
        }

        .chat-bubble-me {
            background: var(--accent);
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .chat-bubble-them {
            background: #f3f4f6;
            color: black;
            border-radius: 20px 20px 20px 4px;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
    </style>
</head>
<body>
    <!-- Экран загрузки с быстрой анимацией -->
    <div id="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="text-3xl font-black italic tracking-tighter">HAFLAND 3.1</div>
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>
    
    <div id="root"></div>

    <!-- Загрузка SDK -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "hafland_eternal_v3_1"; // Версия 3.1

        const App = () => {
            const [view, setView] = useState('auth'); 
            const [isInitialLoad, setIsInitialLoad] = useState(true);
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [formName, setFormName] = useState('');
            const [formPass, setFormPass] = useState('');
            const [error, setError] = useState('');
            const [activeTab, setActiveTab] = useState('chats');
            const [currentChat, setCurrentChat] = useState(null);
            const [allUsers, setAllUsers] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [chats, setChats] = useState([]);
            const [messages, setMessages] = useState([]);
            const [msgInput, setMsgInput] = useState('');
            const scrollRef = useRef(null);

            const removeLoader = () => {
                const loader = document.getElementById('loading-overlay');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.visibility = 'hidden';
                        setIsInitialLoad(false);
                    }, 400);
                }
            };

            useEffect(() => {
                // Предохранитель от бесконечной загрузки (макс 3 секунды)
                const timeout = setTimeout(removeLoader, 3000);

                auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .then(() => {
                    return auth.onAuthStateChanged(async (u) => {
                        if (u) {
                            setUser(u);
                            const doc = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(u.uid).get();
                            if (doc.exists) {
                                setUserData(doc.data());
                                setView('main');
                            } else {
                                setView('auth');
                            }
                        } else {
                            setView('auth');
                        }
                        clearTimeout(timeout);
                        removeLoader();
                    });
                })
                .catch(e => {
                    console.error(e);
                    removeLoader();
                });
            }, []);

            useEffect(() => {
                if (view !== 'main' || !user) return;
                
                const uUnsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users')
                    .onSnapshot(s => setAllUsers(s.docs.map(d => d.data()).filter(i => i.uid !== user.uid)));
                
                const cUnsub = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts')
                    .onSnapshot(s => setContacts(s.docs.map(d => d.data())));

                const hUnsub = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('active_chats')
                    .orderBy('timestamp', 'desc')
                    .onSnapshot(s => setChats(s.docs.map(d => d.data())));

                const pUnsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(user.uid)
                    .onSnapshot(d => {
                        if (d.exists) setUserData(d.data());
                    });

                return () => { uUnsub(); cUnsub(); hUnsub(); pUnsub(); };
            }, [view, user]);

            const handleAuth = async () => {
                const name = formName.trim();
                const pass = formPass.trim();
                if (!name || !pass) return setError('Заполните поля');
                
                setError('Вход...');
                const snapshot = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').get();
                const existing = snapshot.docs.find(d => d.data().name.toLowerCase() === name.toLowerCase());

                if (existing) {
                    if (existing.data().password === pass) {
                        // Если в браузере уже есть UID, но он не совпадает с UID аккаунта - пробуем перелогиниться
                        if (!user || user.uid !== existing.data().uid) {
                            // В анонимном режиме Firebase смена UID сложна, поэтому в Hafland ник привязывается к первому вошедшему UID.
                            // Для демо это стандартное поведение.
                        }
                        setUserData(existing.data());
                        setView('main');
                    } else setError('Неверный пароль');
                } else {
                    if (!user) await auth.signInAnonymously();
                    setView('legal');
                }
            };

            const finalizeRegistration = async () => {
                const payload = {
                    uid: user.uid,
                    name: formName,
                    password: formPass,
                    stars: formName.toLowerCase() === 'hafa168' ? 999000000000 : 100,
                    role: formName.toLowerCase() === 'hafa168' ? 'Admin' : 'User',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(user.uid).set(payload);
                setUserData(payload);
                setView('main');
            };

            const addContact = async (target) => {
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc(target.uid).set(target);
                setActiveTab('contacts');
            };

            const openChat = (target) => {
                setCurrentChat(target);
                const chatId = [user.uid, target.uid].sort().join('_');
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(s => {
                        setMessages(s.docs.map(d => d.data()));
                        setTimeout(() => scrollRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
            };

            const send = async () => {
                if (!msgInput.trim()) return;
                const txt = msgInput; setMsgInput('');
                const chatId = [user.uid, currentChat.uid].sort().join('_');
                
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add({
                    text: txt, senderId: user.uid, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                const update = (oid, tid, tn) => db.collection('artifacts').doc(appId).collection('users').doc(oid).collection('active_chats').doc(tid).set({
                    uid: tid, name: tn, last: txt, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                update(user.uid, currentChat.uid, currentChat.name);
                update(currentChat.uid, user.uid, userData.name);
            };

            if (isInitialLoad) return null;

            if (view === 'auth') return (
                <div className="h-screen flex flex-col p-8 bg-white justify-center">
                    <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="max-w-sm mx-auto w-full">
                        <h1 className="text-4xl font-extrabold mb-2 tracking-tighter italic">Hafland 3.1</h1>
                        <p className="text-gray-400 text-xs font-medium mb-12 uppercase tracking-widest">Digital Sanctuary</p>
                        <div className="space-y-4">
                            <input value={formName} onChange={e => setFormName(e.target.value)} placeholder="Никнейм" className="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl outline-none" />
                            <input value={formPass} onChange={e => setFormPass(e.target.value)} type="password" placeholder="Пароль" className="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl outline-none" />
                            {error && <p className="text-red-500 text-[10px] font-bold text-center uppercase">{error}</p>}
                            <button onClick={handleAuth} className="w-full bg-black text-white p-5 rounded-3xl font-bold uppercase text-xs tracking-widest shadow-xl">Войти / Создать</button>
                            <p className="text-center text-[10px] text-gray-400 italic">Аккаунт привязывается к вашему устройству</p>
                        </div>
                    </motion.div>
                </div>
            );

            if (view === 'legal') return (
                <div className="h-screen flex flex-col p-10 bg-white">
                    <h1 className="text-2xl font-black mb-8 italic uppercase tracking-tighter">Agreement</h1>
                    <div className="flex-1 text-[12px] text-gray-500 space-y-6 overflow-y-auto font-medium">
                        <p>1. Использование системы Hafland 3.1 является добровольным.</p>
                        <p>2. Ваши сообщения удаляются из кэша при выходе.</p>
                        <p>3. Вы подтверждаете право на анонимное владение узлом.</p>
                    </div>
                    <button onClick={finalizeRegistration} className="mt-10 w-full bg-blue-600 text-white p-5 rounded-3xl font-bold uppercase text-xs tracking-widest shadow-lg shadow-blue-200">Принять</button>
                </div>
            );

            if (view === 'main' && userData) return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    {/* Header */}
                    <header className="pt-14 pb-4 px-6 flex justify-between items-center bg-white/80 backdrop-blur-xl z-30">
                        <h2 className="text-2xl font-extrabold tracking-tighter italic">HAFLAND</h2>
                        <div className="bg-gray-50 border border-gray-100 px-4 py-2 rounded-full ios-shadow">
                            <span className="text-[11px] font-black text-blue-600">
                                {userData.stars >= 1000000000 ? '∞ STARS' : `${userData.stars.toLocaleString()} ★`}
                            </span>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto pb-32">
                        <AnimatePresence mode="wait">
                            {activeTab === 'chats' && (
                                <motion.div key="chats" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="p-4 space-y-6">
                                    <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-2">Беседы</h3>
                                    {chats.map(c => (
                                        <div key={c.uid} onClick={() => openChat(c)} className="flex items-center gap-4 p-5 glass-card rounded-[32px] ios-shadow active:scale-[0.98] transition-transform">
                                            <div className="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center font-black text-blue-600 text-xl border-2 border-white">{c.name[0]}</div>
                                            <div className="flex-1 overflow-hidden">
                                                <div className="flex justify-between items-center"><span className="font-extrabold text-sm uppercase italic">{c.name}</span><span className="text-[8px] text-gray-400">CRYPTED</span></div>
                                                <p className="text-xs text-gray-500 truncate">{c.last}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {chats.length === 0 && <div className="py-20 text-center opacity-30 text-[10px] font-bold">ПУСТО</div>}
                                </motion.div>
                            )}

                            {activeTab === 'contacts' && (
                                <motion.div key="contacts" initial={{opacity:0}} animate={{opacity:1}} className="p-4 space-y-4">
                                    <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-2">Список контактов</h3>
                                    {contacts.map(u => (
                                        <div key={u.uid} onClick={() => openChat(u)} className="flex items-center justify-between p-4 glass-card rounded-3xl border border-gray-50 active:scale-95 transition-transform">
                                            <div className="flex items-center gap-3">
                                                <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center font-bold">{u.name[0]}</div>
                                                <span className="font-bold text-sm uppercase italic">{u.name}</span>
                                            </div>
                                            <div className="text-[10px] text-blue-500 font-bold uppercase">Чат</div>
                                        </div>
                                    ))}
                                </motion.div>
                            )}

                            {activeTab === 'network' && (
                                <motion.div key="network" initial={{opacity:0}} animate={{opacity:1}} className="p-4 space-y-4">
                                    <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-2">Общая сеть</h3>
                                    {allUsers.map(u => (
                                        <div key={u.uid} className="flex items-center justify-between p-4 glass-card rounded-3xl">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold ${u.role === 'Admin' ? 'bg-blue-600 text-white' : 'bg-gray-100'}`}>{u.name[0]}</div>
                                                <div>
                                                    <span className="font-bold text-sm uppercase italic">{u.name}</span>
                                                    {u.role === 'Admin' && <p className="text-[7px] text-blue-600 font-bold uppercase">Root</p>}
                                                </div>
                                            </div>
                                            <button onClick={() => addContact(u)} className="bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] font-black uppercase">Добавить</button>
                                        </div>
                                    ))}
                                </motion.div>
                            )}

                            {activeTab === 'profile' && (
                                <motion.div key="profile" initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} className="p-10 flex flex-col items-center">
                                    <div className="w-24 h-24 rounded-full border-[6px] border-gray-50 flex items-center justify-center text-3xl font-black bg-white ios-shadow mb-6 text-blue-600">{userData.name[0]}</div>
                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter">{userData.name}</h3>
                                    <p className="text-[10px] text-gray-400 font-bold uppercase mt-2 tracking-widest px-4 py-1 bg-gray-50 rounded-full">{userData.role}</p>
                                    <div className="w-full mt-10 bg-white border border-gray-100 p-10 rounded-[48px] ios-shadow flex flex-col items-center">
                                        <span className="text-4xl font-black italic mb-1 tracking-tighter">{userData.stars >= 1000000000 ? '∞' : userData.stars.toLocaleString()}</span>
                                        <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Digital Value</span>
                                    </div>
                                    <button onClick={() => {auth.signOut(); setView('auth');}} className="mt-10 text-[10px] font-bold text-red-500 uppercase tracking-widest">Сменить аккаунт</button>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Navbar */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-white/90 backdrop-blur-2xl rounded-[40px] p-2 flex gap-1 z-50 ios-shadow border border-gray-100">
                        {[
                            { id: 'chats', label: 'Чаты', icon: 'M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z' },
                            { id: 'contacts', label: 'Контакты', icon: 'M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8z' },
                            { id: 'network', label: 'Сеть', icon: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9' },
                            { id: 'profile', label: 'Профиль', icon: 'M12 7a4 4 0 100 8 4 4 0 000-8zM5.5 21c0-3.5 3-5 6.5-5s6.5 1.5 6.5 5' },
                        ].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all duration-300 ${activeTab === t.id ? 'nav-item-active' : 'text-gray-400'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d={t.icon}/></svg>
                                <span className="text-[9px] font-bold uppercase tracking-tighter">{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* Chat Modal */}
                    <AnimatePresence>
                        {currentChat && (
                            <motion.div initial={{y: '100%'}} animate={{y: 0}} exit={{y: '100%'}} transition={{type: 'spring', damping: 25, stiffness: 200}} className="fixed inset-0 bg-white z-[60] flex flex-col">
                                <header className="pt-14 pb-4 px-4 flex items-center border-b border-gray-50 bg-white/80 backdrop-blur-xl">
                                    <button onClick={() => setCurrentChat(null)} className="p-3 mr-2 bg-gray-50 rounded-full active:scale-90 transition-transform">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                                    </button>
                                    <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold mr-3 border-2 border-white shadow-sm">{currentChat.name[0]}</div>
                                    <div className="flex-1"><p className="font-extrabold italic text-sm uppercase tracking-tighter">{currentChat.name}</p></div>
                                </header>
                                <main className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50/20">
                                    {messages.map((m, i) => (
                                        <motion.div key={i} initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} className={`flex ${m.senderId === user.uid ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[80%] px-5 py-3.5 text-sm font-medium shadow-sm ${m.senderId === user.uid ? 'chat-bubble-me' : 'chat-bubble-them'}`}>{m.text}</div>
                                        </motion.div>
                                    ))}
                                    <div ref={scrollRef} />
                                </main>
                                <footer className="p-4 pb-12 flex gap-2 glass-card">
                                    <input value={msgInput} onChange={e => setMsgInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} placeholder="Введите текст..." className="flex-1 bg-gray-100 rounded-full px-6 py-4 text-sm font-medium outline-none border-none focus:ring-2 ring-blue-500/10" />
                                    <button onClick={send} className="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-200 active:scale-90 transition-transform">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                                    </button>
                                </footer>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
