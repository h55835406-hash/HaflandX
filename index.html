<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: rgba(23, 25, 35, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: #11141d;
            --accent: #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-input {
            width: 100%;
            background-color: #11141d;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px 24px;
            border-radius: 20px;
            outline: none;
            color: white;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .auth-checkbox-container {
            background-color: #11141d;
            padding: 18px 24px;
            border-radius: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .blue-btn {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
        }

        .nav-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border-radius: 32px;
            display: flex;
            padding: 6px;
            border: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-indicator {
            position: absolute;
            height: calc(100% - 12px);
            top: 6px;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            color: #94a3b8;
            z-index: 1;
            background: none;
            border: none;
        }

        .nav-btn.active { color: var(--accent); }
        .nav-btn i { width: 22px; height: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 10px; font-weight: 700; }

        .screen-content { height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; }
        .msg-time { font-size: 9px; opacity: 0.5; margin-top: 4px; display: block; text-align: right; }
        .online-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; border: 2px solid #000; }
    </style>
</head>
<body>

    <div id="app-root">
        <div id="screen" class="screen-content no-scrollbar">
            <!-- Loading State -->
            <div class="flex items-center justify-center h-full">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            </div>
        </div>

        <div id="nav-bar" class="nav-container hidden">
            <div id="nav-indicator" class="nav-indicator"></div>
            <button onclick="window.goTab('chats', 0)" id="tab-chats" class="nav-btn active">
                <i data-lucide="message-circle"></i>
                <span>Чаты</span>
            </button>
            <button onclick="window.goTab('contacts', 1)" id="tab-contacts" class="nav-btn">
                <i data-lucide="search"></i>
                <span>Поиск</span>
            </button>
            <button onclick="window.goTab('settings', 2)" id="tab-settings" class="nav-btn">
                <i data-lucide="settings"></i>
                <span>Настройки</span>
            </button>
            <button onclick="window.goTab('profile', 3)" id="tab-profile" class="nav-btn">
                <i data-lucide="circle-user"></i>
                <span>Профиль</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Запасной конфиг, если системный не передан
        const fallbackConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
        } catch (e) {
            firebaseConfig = fallbackConfig;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : "hx_v27_final";

        let currentUserData = null;
        let isRegMode = false;
        let activeUnsub = null;

        const showLogin = () => {
            document.getElementById('nav-bar').classList.add('hidden');
            const screen = document.getElementById('screen');
            
            const titleHtml = `
                <h1 class="text-5xl font-extrabold text-blue-600 mb-2 italic tracking-tighter">Hafland X</h1>
                <p class="text-zinc-600 font-bold mb-12">Версия 3.5 by Hafa Studio</p>
            `;

            if (isRegMode) {
                screen.innerHTML = `
                <div class="p-6 pt-24 max-w-md mx-auto">
                    ${titleHtml}
                    <input id="auth-nick" type="text" placeholder="Никнейм" class="auth-input">
                    <input id="auth-pass" type="password" placeholder="Пароль" class="auth-input">
                    <div class="auth-checkbox-container">
                        <input type="checkbox" id="agree" class="w-5 h-5 mt-1 accent-blue-600">
                        <label for="agree" class="text-zinc-500 text-xs font-medium leading-relaxed">
                            Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент и содержание ваших сообщений внутри платформы.
                        </label>
                    </div>
                    <button onclick="window.doAuth()" class="blue-btn mb-6">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                    <div class="text-center">
                        <button onclick="window.toggleMode()" class="text-blue-500 font-bold text-sm">Уже есть аккаунт? Войти</button>
                    </div>
                </div>`;
            } else {
                screen.innerHTML = `
                <div class="p-6 pt-24 max-w-md mx-auto">
                    ${titleHtml}
                    <input id="auth-nick" type="text" placeholder="Никнейм" class="auth-input">
                    <input id="auth-pass" type="password" placeholder="Пароль" class="auth-input">
                    <button onclick="window.doAuth()" class="blue-btn mb-6 mt-4">ВОЙТИ</button>
                    <div class="text-center">
                        <button onclick="window.toggleMode()" class="text-blue-500 font-bold text-sm">Нет аккаунта? Создать</button>
                    </div>
                </div>`;
            }
        };

        window.toggleMode = () => { isRegMode = !isRegMode; showLogin(); };

        window.doAuth = async () => {
            const nick = document.getElementById('auth-nick').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value;
            if (!nick || !pass) return;
            if (isRegMode && !document.getElementById('agree').checked) return;

            try {
                await signInAnonymously(auth);
                const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', nick);
                const snap = await getDoc(userRef);
                
                if (isRegMode) {
                    if (snap.exists()) throw new Error("Ник занят");
                    const data = { 
                        nick, pass, 
                        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}`, 
                        hidden: false, 
                        bio: 'Использую Hafland X', 
                        lastSeen: Date.now() 
                    };
                    await setDoc(userRef, data);
                    currentUserData = data;
                } else {
                    if (!snap.exists() || snap.data().pass !== pass) throw new Error("Неверные данные");
                    currentUserData = snap.data();
                }
                localStorage.setItem('hx_session', nick);
                window.goTab('chats', 0);
            } catch (e) {
                alert("Ошибка: Проверьте ник/пароль");
            }
        };

        window.goTab = (tab, idx) => {
            document.getElementById('nav-bar').classList.remove('hidden');
            const ind = document.getElementById('nav-indicator');
            const btn = document.getElementById('tab-' + tab);
            
            if (btn) {
                ind.style.width = btn.offsetWidth + 'px';
                ind.style.left = btn.offsetLeft + 'px';
            }
            
            if (activeUnsub) { activeUnsub(); activeUnsub = null; }
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            renderTab(tab);
            lucide.createIcons();
        };

        const renderTab = (tab) => {
            const scr = document.getElementById('screen');
            if (tab === 'chats') {
                scr.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6 italic">Диалоги</h2><div id="chats-list" class="space-y-1"></div></div>`;
                loadChats();
            } else if (tab === 'contacts') {
                scr.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6 italic">Поиск</h2><div id="user-list" class="space-y-3"></div></div>`;
                loadUsers();
            } else if (tab === 'settings') {
                scr.innerHTML = `
                    <div class="p-6 pt-10">
                        <h2 class="text-3xl font-black mb-8 italic">Настройки</h2>
                        <div class="space-y-4">
                            <div class="p-5 bg-zinc-900/40 rounded-3xl border border-white/5 flex justify-between items-center">
                                <span class="font-bold">Инкогнито</span>
                                <input type="checkbox" ${currentUserData.hidden ? 'checked' : ''} onchange="window.updateIncognito(this.checked)" class="w-6 h-6">
                            </div>
                            <div class="p-5 bg-zinc-900/40 rounded-3xl border border-white/5 space-y-3">
                                <p class="text-xs font-bold text-zinc-500 uppercase">О себе</p>
                                <input id="bio-input" value="${currentUserData.bio}" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm outline-none">
                                <button onclick="window.saveBio()" class="w-full bg-blue-600 p-3 rounded-xl font-bold">СОХРАНИТЬ</button>
                            </div>
                        </div>
                    </div>`;
            } else if (tab === 'profile') {
                scr.innerHTML = `
                    <div class="p-10 flex flex-col items-center">
                        <img src="${currentUserData.avatar}" class="w-32 h-32 rounded-full border-4 border-blue-600/20 mb-6 bg-zinc-900">
                        <h2 class="text-4xl font-black">${currentUserData.nick}</h2>
                        <p class="text-blue-500 font-bold text-xs mt-2 uppercase">${currentUserData.bio}</p>
                        <button onclick="localStorage.clear(); location.reload();" class="w-full p-5 bg-red-600/10 text-red-600 font-bold rounded-3xl mt-12">ВЫЙТИ</button>
                    </div>`;
            }
        };

        window.updateIncognito = async (val) => {
            currentUserData.hidden = val;
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', currentUserData.nick), { hidden: val });
        };

        window.saveBio = async () => {
            const bio = document.getElementById('bio-input').value;
            currentUserData.bio = bio;
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', currentUserData.nick), { bio });
            alert("Обновлено");
        };

        const loadUsers = () => {
            activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), (s) => {
                const list = document.getElementById('user-list');
                if (!list) return;
                list.innerHTML = '';
                s.docs.forEach(d => {
                    const u = d.data();
                    if (u.nick === currentUserData.nick || u.hidden) return;
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-zinc-900/40 rounded-3xl border border-white/5">
                            <div class="flex items-center gap-4">
                                <img src="${u.avatar}" class="w-12 h-12 rounded-full bg-zinc-900">
                                <div>
                                    <p class="font-bold text-lg">${u.nick}</p>
                                    <p class="text-[9px] text-zinc-500 uppercase">${u.bio}</p>
                                </div>
                            </div>
                            <button onclick="window.openChat('${u.nick}')" class="bg-blue-600 p-3 rounded-2xl text-white"><i data-lucide="send"></i></button>
                        </div>`;
                });
                lucide.createIcons();
            });
        };

        const loadChats = () => {
            activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const list = document.getElementById('chats-list');
                if (!list) return;
                const sessions = new Map();
                s.docs.forEach(doc => {
                    const m = doc.data();
                    if (m.f === currentUserData.nick || m.t === currentUserData.nick) {
                        const other = m.f === currentUserData.nick ? m.t : m.f;
                        if (!sessions.has(other) || sessions.get(other).ts < m.ts) sessions.set(other, m);
                    }
                });
                list.innerHTML = sessions.size === 0 ? `<p class="text-center text-zinc-600 py-20 font-bold italic opacity-30">Сообщений нет</p>` : '';
                [...sessions.entries()].sort((a,b) => b[1].ts - a[1].ts).forEach(([name, m]) => {
                    list.innerHTML += `
                        <div onclick="window.openChat('${name}')" class="flex items-center gap-4 p-4 active:bg-blue-600/5 transition-all border-b border-white/5">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" class="w-14 h-14 rounded-full bg-zinc-900">
                            <div class="flex-1 overflow-hidden">
                                <div class="flex justify-between items-center"><span class="font-bold text-lg">${name}</span></div>
                                <p class="text-zinc-500 text-sm truncate">${m.txt || 'Фото'}</p>
                            </div>
                        </div>`;
                });
            });
        };

        window.openChat = (other) => {
            document.getElementById('nav-bar').classList.add('hidden');
            const scr = document.getElementById('screen');
            scr.innerHTML = `
                <div class="flex flex-col h-screen">
                    <div class="p-4 flex items-center gap-4 border-b border-white/5 bg-black/80 backdrop-blur-md">
                        <button onclick="window.goTab('chats', 0)" class="p-2"><i data-lucide="arrow-left"></i></button>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="w-10 h-10 rounded-full">
                        <p class="font-bold text-xl">${other}</p>
                    </div>
                    <div id="flow" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-28"></div>
                    <div class="p-4 fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/80 backdrop-blur-xl">
                        <div class="flex gap-2">
                            <input id="msg-input" type="text" placeholder="Сообщение..." class="flex-1 p-4 bg-zinc-900 rounded-2xl outline-none text-white">
                            <button onclick="window.send('${other}')" class="bg-blue-600 p-4 rounded-2xl text-white"><i data-lucide="send"></i></button>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
            
            activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const flow = document.getElementById('flow');
                if (!flow) return;
                const msgs = s.docs.map(d => d.data())
                    .filter(m => (m.f===currentUserData.nick && m.t===other) || (m.f===other && m.t===currentUserData.nick))
                    .sort((a,b) => a.ts - b.ts);
                flow.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.f === currentUserData.nick;
                    flow.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="chat-bubble ${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-300'}">
                                <p>${m.txt}</p>
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        };

        window.send = async (to) => {
            const inp = document.getElementById('msg-input');
            const v = inp.value.trim();
            if (!v) return;
            inp.value = '';
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: currentUserData.nick, t: to, txt: v, ts: Date.now() });
        };

        onAuthStateChanged(auth, async (fbUser) => {
            if (fbUser) {
                const savedNick = localStorage.getItem('hx_session');
                if (savedNick) {
                    const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', savedNick));
                    if (snap.exists()) {
                        currentUserData = snap.data();
                        window.goTab('chats', 0);
                        return;
                    }
                }
            }
            showLogin();
        });
    </script>
</body>
</html>
