<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --main: #3388FF;
            --main-rgb: 51, 136, 255;
            --bg: #060912;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #F8FAFC;
            --text-sec: #94A3B8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            background-image: radial-gradient(circle at 0% 0%, rgba(var(--main-rgb), 0.15) 0%, transparent 40%);
        }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--bg); }
        .screen.active { display: flex; animation: screenIn 0.4s ease; }
        @keyframes screenIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .header {
            padding: calc(20px + var(--safe-top)) 24px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(30px); background: var(--glass-thick);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        
        .input-field {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 16px 20px; color: var(--text);
            font-size: 16px; width: 100%; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--main); background: var(--glass-thick); }

        .btn-main {
            background: var(--main); color: #fff; border: none; border-radius: 20px;
            padding: 18px; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: var(--glass-thick);
            backdrop-filter: blur(40px); border: 1px solid var(--glass-border);
            border-radius: 25px; display: flex; justify-content: space-around; z-index: 1000;
        }

        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-sec); }
        .nav-item.active { color: var(--main); }

        .card {
            margin: 10px 20px; padding: 15px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 22px;
            display: flex; align-items: center; gap: 12px;
        }

        .avatar { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; background: #222; }

        .bubble {
            max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 15px; margin: 4px 20px;
            word-wrap: break-word; line-height: 1.4; position: relative;
        }
        .bubble.my { align-self: flex-end; background: var(--main); color: white; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--glass-thick); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        .sticker { width: 140px; height: 140px; object-fit: contain; margin: 5px 20px; border-radius: 10px; cursor: pointer; }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; 
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: var(--bg); border: 1px solid var(--glass-border); border-radius: 30px; width: 100%; max-width: 400px; padding: 25px; }

        .group-btn-premium {
            background: linear-gradient(135deg, #3388FF 0%, #1D4ED8 100%);
            padding: 10px 18px; border-radius: 16px; color: white;
            display: flex; align-items: center; gap: 8px; font-weight: 800;
            font-size: 13px; cursor: pointer; border: none;
            box-shadow: 0 4px 15px rgba(51, 136, 255, 0.4);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .keyboard-panel {
            background: var(--glass-thick); backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            height: 0; transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .keyboard-panel.open { height: 300px; padding-bottom: var(--safe-bottom); }
        .sticker-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px;
            overflow-y: auto; flex: 1;
        }
        .sticker-item { width: 100%; aspect-ratio: 1; border-radius: 12px; background: var(--glass); object-fit: contain; padding: 5px; }
        .keyboard-tabs { display: flex; border-bottom: 1px solid var(--glass-border); background: var(--glass); }
        .kb-tab { flex: 1; padding: 14px; text-align: center; color: var(--text-sec); font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .kb-tab.active { color: var(--main); border-bottom: 3px solid var(--main); }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <div style="text-align:center; margin-bottom:50px">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:80px">
                <h1 style="font-size:32px; margin-top:15px; font-weight:900">Hafland X</h1>
            </div>
            <input type="text" id="l-nick" class="input-field" placeholder="Никнейм" style="margin-bottom:10px">
            <input type="password" id="l-pass" class="input-field" placeholder="Пароль" style="margin-bottom:20px">
            <button class="btn-main" onclick="authAction('login')">ВОЙТИ</button>
            <p style="text-align:center; margin-top:20px; color:var(--text-sec)" onclick="go('screen-reg')">Создать аккаунт</p>
        </div>
    </div>

    <div id="screen-reg" class="screen">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <h1 style="font-size:28px; font-weight:900; margin-bottom:30px">Регистрация</h1>
            <input type="text" id="r-nick" class="input-field" placeholder="Никнейм" style="margin-bottom:10px">
            <input type="password" id="r-pass" class="input-field" placeholder="Пароль" style="margin-bottom:20px">
            <div style="font-size:12px; color:var(--text-sec); margin-bottom:20px; display:flex; gap:10px">
                <input type="checkbox" id="r-agree"> <span>Принимаю правила Hafland X</span>
            </div>
            <button class="btn-main" id="reg-btn" onclick="authAction('reg')">СОЗДАТЬ</button>
            <p style="text-align:center; margin-top:20px; color:var(--text-sec)" onclick="go('screen-login')">Уже есть аккаунт?</p>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:10px">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:30px">
                <h1 style="font-size:20px; font-weight:800">Hafland X</h1>
            </div>
            <button class="group-btn-premium" onclick="showGroupModal()">
                <i data-lucide="plus-circle" style="width:18px"></i> ГРУППА
            </button>
        </header>
        <div id="view-chats" class="tab-view scroll-area"></div>
        <div id="view-people" class="tab-view scroll-area" style="display:none"></div>
        <div id="view-profile" class="tab-view scroll-area" style="display:none"></div>
        <nav class="nav-bar">
            <div class="nav-item active" onclick="tab('chats', this)"><i data-lucide="message-circle"></i></div>
            <div class="nav-item" onclick="tab('people', this)"><i data-lucide="compass"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i data-lucide="user"></i></div>
        </nav>
    </div>

    <div id="screen-chat" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <i data-lucide="chevron-left" onclick="go('screen-main')"></i>
                <img id="c-ava" class="avatar" style="width:38px; height:38px">
                <div>
                    <b id="c-nick">...</b>
                    <p id="c-status" style="font-size:10px; color:#22C55E">в сети</p>
                </div>
            </div>
        </header>
        <div id="chat-msgs" class="scroll-area" style="display:flex; flex-direction:column; padding-top:10px"></div>
        <div style="background:var(--glass-thick); border-top:1px solid var(--glass-border);">
            <div style="padding:12px 16px; display:flex; gap:10px; align-items:center">
                <i data-lucide="smile" onclick="toggleStickers()" id="sticker-icon" style="color:var(--text-sec); cursor:pointer"></i>
                <input type="text" id="m-input" class="input-field" placeholder="Написать..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:var(--main); width:48px; height:48px; border-radius:16px; border:none; color:white; flex-shrink:0">
                    <i data-lucide="arrow-up"></i>
                </button>
            </div>
            <div id="keyboard-panel" class="keyboard-panel">
                <div class="keyboard-tabs">
                    <div class="kb-tab active">СТИКЕРЫ</div>
                    <div class="kb-tab" onclick="document.getElementById('f-sticker').click()" style="color:var(--main)">+ ДОБАВИТЬ</div>
                </div>
                <div class="sticker-grid" id="sticker-grid"></div>
            </div>
        </div>
    </div>

    <div id="modal-group" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; text-align:center">Новая группа</h2>
            <input type="text" id="g-name" class="input-field" placeholder="Название" style="margin-bottom:15px">
            <button class="btn-main" style="width:100%" onclick="createGroup()">СОЗДАТЬ</button>
            <button style="width:100%; margin-top:10px; background:none; border:none; color:var(--text-sec)" onclick="closeModals()">ОТМЕНА</button>
        </div>
    </div>

    <input type="file" id="f-ava" hidden onchange="handleAva(this)">
    <input type="file" id="f-sticker" hidden onchange="handleSticker(this)" accept="image/*">

    <script>
        const config = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth(), db = firebase.firestore();
        let me = null, activeChat = null, chatSub = null;

        const DEFAULT_AVA = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png";

        auth.onAuthStateChanged(async u => {
            if(u) {
                const doc = await db.collection('users').doc(u.uid).get();
                if(doc.exists) { me = {id: u.uid, ...doc.data()}; startApp(); }
                else go('screen-reg');
            } else go('screen-login');
        });

        async function authAction(type) {
            const n = document.getElementById(type==='reg'?'r-nick':'l-nick').value.trim();
            const p = document.getElementById(type==='reg'?'r-pass':'l-pass').value;
            if(!n || !p) return;
            if(type === 'reg') {
                const check = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(check.exists) return alert("Ник занят");
                const res = await auth.signInAnonymously();
                const data = { nick: n, pass: p, ava: DEFAULT_AVA, bio: '', stickers: [], lastActivity: Date.now() };
                await db.collection('users').doc(res.user.uid).set(data);
                await db.collection('nicknames').doc(n.toLowerCase()).set({uid: res.user.uid});
                location.reload();
            } else {
                const snap = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(!snap.exists) return alert("Нет такого");
                const uDoc = await db.collection('users').doc(snap.data().uid).get();
                if(uDoc.data().pass === p) { me = {id: snap.data().uid, ...uDoc.data()}; startApp(); }
                else alert("Ошибка пароля");
            }
        }

        function startApp() { go('screen-main'); listenChats(); lucide.createIcons(); }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screen-chat') {
                if(chatSub) { chatSub(); chatSub = null; }
                document.getElementById('keyboard-panel').classList.remove('open');
            }
        }

        function tab(t, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
            document.getElementById('view-'+t).style.display = t==='profile'?'flex':'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(t === 'people') loadPeople();
            if(t === 'profile') renderProfile();
        }

        function listenChats() {
            db.collection('chats').where('users', 'array-contains', me.id).onSnapshot(s => {
                const v = document.getElementById('view-chats');
                v.innerHTML = `<h2 style="padding:20px">Диалоги</h2>`;
                s.docs.sort((a,b) => b.data().lastT - a.data().lastT).forEach(doc => {
                    const c = doc.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openChat(doc.id, c);
                    if(c.isGroup) {
                        card.innerHTML = `<img src="${c.ava || DEFAULT_AVA}" class="avatar"><div><b>${c.name}</b><p style="font-size:12px;color:var(--text-sec)">Группа</p></div>`;
                        v.appendChild(card);
                    } else {
                        const otherId = c.users.find(u => u !== me.id);
                        db.collection('users').doc(otherId).get().then(ud => {
                            if(!ud.exists) return;
                            card.innerHTML = `<img src="${ud.data().ava}" class="avatar"><div><b>${ud.data().nick}</b><p style="font-size:12px;color:var(--text-sec);max-width:200px;overflow:hidden">${c.lastMsg || '...'}</p></div>`;
                            v.appendChild(card);
                        });
                    }
                });
            });
        }

        async function openChat(id, data) {
            activeChat = id;
            document.getElementById('c-nick').innerText = data.name || "Чат";
            document.getElementById('c-ava').src = data.ava || DEFAULT_AVA;
            go('screen-chat');
            if(chatSub) chatSub();
            chatSub = db.collection('chats').doc(id).collection('m').orderBy('t','asc').onSnapshot(s => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                s.forEach(d => {
                    const m = d.data();
                    if(m.type === 'sticker') box.innerHTML += `<img src="${m.txt}" class="sticker" style="align-self:${m.s===me.id?'flex-end':'flex-start'}">`;
                    else box.innerHTML += `<div class="bubble ${m.s === me.id ? 'my' : 'other'}">${m.txt}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
            loadStickers();
        }

        async function sendMsg(txt = null, type = 'text') {
            const inp = document.getElementById('m-input');
            const val = txt || inp.value.trim();
            if(!val || !activeChat) return;
            if(!txt) inp.value = "";
            const t = Date.now();
            await db.collection('chats').doc(activeChat).collection('m').add({ s: me.id, txt: val, t, type });
            await db.collection('chats').doc(activeChat).set({ lastMsg: type==='sticker'?'[Стикер]':val, lastT: t }, {merge: true});
        }

        function toggleStickers() {
            const kb = document.getElementById('keyboard-panel');
            kb.classList.toggle('open');
            document.getElementById('sticker-icon').style.color = kb.classList.contains('open') ? 'var(--main)' : 'var(--text-sec)';
        }

        async function loadStickers() {
            const grid = document.getElementById('sticker-grid');
            grid.innerHTML = "";
            const userDoc = await db.collection('users').doc(me.id).get();
            const stickers = userDoc.data().stickers || [];
            stickers.forEach(src => {
                const img = document.createElement('img');
                img.className = 'sticker-item';
                img.src = src;
                img.onclick = () => sendMsg(src, 'sticker');
                grid.appendChild(img);
            });
        }

        function handleSticker(input) {
            const file = input.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = async e => {
                await db.collection('users').doc(me.id).update({ stickers: firebase.firestore.FieldValue.arrayUnion(e.target.result) });
                loadStickers();
            };
            r.readAsDataURL(file);
        }

        function showGroupModal() { document.getElementById('modal-group').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        async function createGroup() {
            const name = document.getElementById('g-name').value.trim();
            if(!name) return;
            const ref = db.collection('chats').doc();
            await ref.set({ id: ref.id, name, isGroup: true, owner: me.id, users: [me.id], ava: DEFAULT_AVA, lastT: Date.now(), lastMsg: "Группа создана" });
            closeModals();
            openChat(ref.id, {name, isGroup: true, ava: DEFAULT_AVA});
        }

        async function loadPeople() {
            const v = document.getElementById('view-people');
            v.innerHTML = `<h2 style="padding:20px">Пользователи</h2>`;
            const snap = await db.collection('users').limit(40).get();
            snap.forEach(doc => {
                if(doc.id === me.id) return;
                const u = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = async () => {
                    const chatId = me.id < doc.id ? me.id+'_'+doc.id : doc.id+'_'+me.id;
                    const chatRef = db.collection('chats').doc(chatId);
                    const chatDoc = await chatRef.get();
                    if(!chatDoc.exists) await chatRef.set({ users: [me.id, doc.id], isGroup: false, lastT: Date.now() });
                    openChat(chatId, {name: u.nick, ava: u.ava});
                };
                card.innerHTML = `<img src="${u.ava}" class="avatar"><div><b>${u.nick}</b><p style="font-size:12px;color:var(--text-sec)">${u.bio || 'Активен'}</p></div>`;
                v.appendChild(card);
            });
        }

        function renderProfile() {
            const v = document.getElementById('view-profile');
            v.style.padding = "40px 20px";
            v.innerHTML = `
                <div style="text-align:center; width:100%">
                    <img src="${me.ava}" class="avatar" style="width:100px; height:100px; border-radius:30px
