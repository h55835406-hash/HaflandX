<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
            -webkit-tap-highlight-color: transparent;
        }
        .dark { background-color: #000000; color: #ffffff; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        .dark .glass-nav {
            background: rgba(15, 15, 15, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item-active {
            color: #2563eb;
        }

        .message-bubble {
            max-width: 80%;
            border-radius: 20px;
            padding: 12px 16px;
            margin: 4px 0;
            font-size: 15px;
            line-height: 1.4;
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        input {
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        input:focus {
            border-color: #2563eb;
            background: #ffffff !important;
        }
        .dark input:focus {
            background: #1a1a1a !important;
        }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden bg-white dark:bg-black">
        <!-- Основной контент -->
        <div id="screen-content" class="flex-1 overflow-y-auto no-scrollbar"></div>

        <!-- Нижняя панель навигации -->
        <div id="bottom-nav" class="fixed bottom-0 left-0 right-0 z-50 hidden glass-nav">
            <nav class="flex justify-around items-center p-3">
                <button onclick="window.navTo('chats')" id="nav-chats" class="flex flex-col items-center flex-1 py-2 transition-all">
                    <i data-lucide="message-circle" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-1 font-bold">Чаты</span>
                </button>
                <button onclick="window.navTo('contacts')" id="nav-contacts" class="flex flex-col items-center flex-1 py-2 transition-all">
                    <i data-lucide="search" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-1 font-bold">Поиск</span>
                </button>
                <button onclick="window.navTo('profile')" id="nav-profile" class="flex flex-col items-center flex-1 py-2 transition-all">
                    <i data-lucide="user" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-1 font-bold">Профиль</span>
                </button>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "hafland-x-v3-final";

        let currentUser = null;
        let authMode = 'login'; // 'login' или 'register'
        let activeTab = 'chats';

        const refreshIcons = () => lucide.createIcons();

        // Принудительный вход в интерфейс
        const enterApp = (userData) => {
            currentUser = userData;
            document.getElementById('bottom-nav').classList.remove('hidden');
            renderMain();
        };

        window.setAuthMode = (mode) => {
            authMode = mode;
            renderAuth();
        };

        window.handleAuth = async () => {
            const nick = document.getElementById('nick').value.trim().toLowerCase();
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn-auth');
            
            if (!nick || !pass) return alert("Введите данные");

            // Проверка согласия ТОЛЬКО при регистрации
            if (authMode === 'register') {
                const agree = document.getElementById('agree_checkbox')?.checked;
                if (!agree) return alert("Необходимо принять соглашение");
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';

            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', nick);
                const snap = await getDoc(userRef);

                if (authMode === 'login') {
                    if (snap.exists() && snap.data().password === pass) {
                        localStorage.setItem('hx_session_nick', nick);
                        await signInAnonymously(auth);
                        enterApp(snap.data());
                    } else {
                        alert("Неверный ник или пароль");
                        btn.disabled = false;
                        btn.innerText = "Войти";
                    }
                } else {
                    if (snap.exists()) {
                        alert("Никнейм уже занят");
                        btn.disabled = false;
                        btn.innerText = "Создать аккаунт";
                    } else {
                        const newUser = {
                            nickname: nick,
                            password: pass,
                            avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}`,
                            joined: Date.now()
                        };
                        await setDoc(userRef, newUser);
                        localStorage.setItem('hx_session_nick', nick);
                        await signInAnonymously(auth);
                        enterApp(newUser);
                    }
                }
            } catch (e) {
                alert("Ошибка: " + e.message);
                btn.disabled = false;
                btn.innerText = authMode === 'login' ? 'Войти' : 'Создать аккаунт';
            }
        };

        window.navTo = (tab) => {
            activeTab = tab;
            renderMain();
        };

        window.openChat = (nick) => {
            document.getElementById('bottom-nav').classList.add('hidden');
            const cont = document.getElementById('screen-content');
            cont.innerHTML = `
                <div class="flex flex-col h-full bg-slate-50 dark:bg-zinc-950">
                    <div class="p-4 bg-white dark:bg-zinc-900 flex items-center gap-3 border-b dark:border-zinc-800 shadow-sm sticky top-0 z-10">
                        <button onclick="window.navTo('chats')" class="p-1"><i data-lucide="chevron-left"></i></button>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}" class="w-10 h-10 rounded-full bg-blue-50">
                        <span class="font-bold text-lg">${nick}</span>
                    </div>
                    <div id="msg-box" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
                    <div class="p-4 bg-white dark:bg-zinc-900 border-t dark:border-zinc-800 flex gap-2 pb-8">
                        <input id="m-inp" type="text" placeholder="Сообщение" class="flex-1 p-4 bg-slate-100 dark:bg-zinc-800 rounded-2xl outline-none font-medium">
                        <button onclick="window.sendMsg('${nick}')" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg shadow-blue-500/30"><i data-lucide="send"></i></button>
                    </div>
                </div>
            `;
            refreshIcons();

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), (s) => {
                const box = document.getElementById('msg-box');
                if(!box) return;
                const msgs = s.docs.map(d => d.data())
                    .filter(m => (m.f === currentUser.nickname && m.t === nick) || (m.f === nick && m.t === currentUser.nickname))
                    .sort((a,b) => a.ts - b.ts);
                
                box.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.f === currentUser.nickname;
                    box.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble shadow-sm ${isMe ? 'bg-blue-600 text-white' : 'bg-white dark:bg-zinc-800 dark:text-white'}">
                                ${m.txt}
                            </div>
                        </div>
                    `;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.sendMsg = async (to) => {
            const inp = document.getElementById('m-inp');
            const val = inp.value.trim();
            if(!val) return;
            inp.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                f: currentUser.nickname,
                t: to,
                txt: val,
                ts: Date.now()
            });
        };

        function renderAuth() {
            document.getElementById('bottom-nav').classList.add('hidden');
            const isReg = authMode === 'register';
            
            document.getElementById('screen-content').innerHTML = `
                <div class="p-8 flex flex-col justify-center min-h-screen">
                    <div class="mb-12">
                        <h1 class="text-5xl font-extrabold text-blue-600 tracking-tighter">Hafland X</h1>
                        <p class="text-gray-400 font-medium mt-1">Версия 1.0.0 Stable</p>
                    </div>
                    
                    <div class="space-y-4">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">
                            ${isReg ? 'Создание нового аккаунта' : 'Вход в мессенджер'}
                        </p>
                        <input id="nick" type="text" placeholder="Никнейм" class="w-full p-4 bg-gray-100 dark:bg-zinc-900 rounded-2xl outline-none font-bold">
                        <input id="pass" type="password" placeholder="Пароль" class="w-full p-4 bg-gray-100 dark:bg-zinc-900 rounded-2xl outline-none font-bold">
                        
                        ${isReg ? `
                        <div id="agreement-block" class="flex gap-3 items-start p-4 bg-blue-50 dark:bg-blue-900/10 rounded-2xl border border-blue-100 dark:border-blue-900/20">
                            <input type="checkbox" id="agree_checkbox" class="mt-1 w-5 h-5 accent-blue-600">
                            <label for="agree_checkbox" class="text-[11px] text-blue-900 dark:text-blue-300 font-semibold leading-tight">
                                Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за содержание моих переписок.
                            </label>
                        </div>
                        ` : ''}

                        <button id="btn-auth" onclick="window.handleAuth()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-2xl shadow-blue-600/20 active:scale-95 transition-all mt-4">
                            ${isReg ? 'ЗАРЕГИСТРИРОВАТЬСЯ' : 'ВОЙТИ'}
                        </button>
                        
                        <div class="text-center mt-6">
                            <button onclick="window.setAuthMode('${isReg ? 'login' : 'register'}')" class="text-blue-600 text-sm font-bold">
                                ${isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMain() {
            const cont = document.getElementById('screen-content');
            document.getElementById('bottom-nav').classList.remove('hidden');

            // Подсветка активной вкладки
            ['chats', 'contacts', 'profile'].forEach(id => {
                const el = document.getElementById('nav-'+id);
                if(el) el.classList.toggle('nav-item-active', activeTab === id);
            });

            if(activeTab === 'chats') {
                cont.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6">Чаты</h2><div id="chats-list-box" class="space-y-2"></div></div>`;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), (s) => {
                    const box = document.getElementById('chats-list-box');
                    if(!box) return;
                    const map = new Map();
                    s.docs.forEach(d => {
                        const m = d.data();
                        if(m.f === currentUser.nickname || m.t === currentUser.nickname) {
                            const other = m.f === currentUser.nickname ? m.t : m.f;
                            if(!map.has(other) || map.get(other).ts < m.ts) map.set(other, m);
                        }
                    });
                    
                    if(map.size === 0) {
                        box.innerHTML = `<div class="text-center py-24 text-gray-300 font-bold">У вас пока нет чатов</div>`;
                        return;
                    }
                    
                    box.innerHTML = '';
                    [...map.entries()].sort((a,b) => b[1].ts - a[1].ts).forEach(([nick, m]) => {
                        box.innerHTML += `
                            <div onclick="window.openChat('${nick}')" class="flex items-center gap-4 p-4 hover:bg-gray-50 dark:hover:bg-zinc-900 rounded-3xl transition-all cursor-pointer">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}" class="w-14 h-14 rounded-full bg-blue-50">
                                <div class="flex-1 overflow-hidden border-b dark:border-zinc-800 pb-2">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-lg">${nick}</span>
                                        <span class="text-[10px] text-gray-400 font-bold">НЕДАВНО</span>
                                    </div>
                                    <p class="text-sm text-gray-500 truncate font-medium">${m.txt}</p>
                                </div>
                            </div>
                        `;
                    });
                });
            }

            if(activeTab === 'contacts') {
                cont.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6">Поиск</h2><div id="contacts-list-box" class="space-y-4"></div></div>`;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (s) => {
                    const box = document.getElementById('contacts-list-box');
                    if(!box) return;
                    box.innerHTML = '';
                    s.docs.forEach(d => {
                        const u = d.data();
                        if(u.nickname === currentUser.nickname) return;
                        box.innerHTML += `
                            <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-zinc-900 rounded-3xl">
                                <div class="flex items-center gap-4">
                                    <img src="${u.avatar}" class="w-12 h-12 rounded-full">
                                    <span class="font-bold text-lg">${u.nickname}</span>
                                </div>
                                <button onclick="window.openChat('${u.nickname}')" class="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-black shadow-lg shadow-blue-600/20">ЧАТ</button>
                            </div>
                        `;
                    });
                });
            }

            if(activeTab === 'profile') {
                cont.innerHTML = `
                    <div class="p-10 flex flex-col items-center">
                        <div class="relative mb-6">
                            <img src="${currentUser.avatar}" class="w-32 h-32 rounded-full border-4 border-blue-50 dark:border-zinc-800 shadow-2xl">
                        </div>
                        <h2 class="text-3xl font-black mb-1">${currentUser.nickname}</h2>
                        <p class="text-gray-400 font-bold mb-12">Hafland X User</p>
                        
                        <div class="w-full space-y-3">
                            <button onclick="localStorage.clear(); location.reload();" class="w-full bg-red-50 dark:bg-red-900/10 text-red-600 p-5 rounded-3xl font-black">ВЫЙТИ ИЗ СИСТЕМЫ</button>
                            <p class="text-center text-[10px] text-gray-300 font-bold tracking-widest mt-10">ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                        </div>
                    </div>
                `;
            }
            refreshIcons();
        }

        // Авто-вход при загрузке
        onAuthStateChanged(auth, async (user) => {
            const saved = localStorage.getItem('hx_session_nick');
            if(user && saved) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', saved));
                if(snap.exists()) {
                    enterApp(snap.data());
                } else {
                    renderAuth();
                }
            } else {
                renderAuth();
            }
        });

    </script>
</body>
</html>
