<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --main: #3388FF;
            --main-rgb: 51, 136, 255;
            --bg: #060912;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #F8FAFC;
            --text-sec: #94A3B8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        .light-theme {
            --bg: #F0F4F9;
            --glass: rgba(0, 0, 0, 0.02);
            --glass-thick: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text: #1E293B;
            --text-sec: #64748B;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            background-image: radial-gradient(circle at 0% 0%, rgba(var(--main-rgb), 0.15) 0%, transparent 40%);
        }

        .screen { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--bg); }
        .screen.active { display: flex; animation: screenIn 0.4s ease; }
        @keyframes screenIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .header {
            padding: calc(20px + var(--safe-top)) 24px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(30px); background: var(--glass-thick);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        
        .input-field {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 16px 20px; color: var(--text);
            font-size: 16px; width: 100%; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--main); background: var(--glass-thick); }

        .btn-main {
            background: var(--main); color: #fff; border: none; border-radius: 20px;
            padding: 18px; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: var(--glass-thick);
            backdrop-filter: blur(40px); border: 1px solid var(--glass-border);
            border-radius: 25px; display: flex; justify-content: space-around; z-index: 1000;
        }

        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-sec); }
        .nav-item.active { color: var(--main); }

        .card {
            margin: 10px 20px; padding: 15px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 22px;
            display: flex; align-items: center; gap: 12px;
        }

        .avatar { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; background: #222; }

        .streak-island {
            align-self: center; margin: 15px 0; padding: 10px 18px;
            background: var(--glass-thick); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 10px;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .bubble {
            max-width: 75%; padding: 14px 18px; border-radius: 22px; font-size: 15px; margin: 4px 20px;
            word-wrap: break-word; line-height: 1.4;
        }
        .bubble.my { align-self: flex-end; background: var(--main); color: white; border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--glass-thick); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        .sticker { width: 120px; height: 120px; object-fit: contain; margin: 5px 20px; }

        .toggle { width: 50px; height: 28px; background: var(--glass-thick); border-radius: 20px; position: relative; cursor: pointer; }
        .toggle.on { background: var(--main); }
        .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle.on::after { left: 25px; }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; 
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: var(--bg); border: 1px solid var(--glass-border); border-radius: 30px; width: 100%; max-width: 400px; padding: 25px; }
    </style>
</head>
<body>

    <!-- Auth Screens -->
    <div id="screen-login" class="screen active">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <div style="text-align:center; margin-bottom:50px">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:80px">
                <h1 style="font-size:32px; margin-top:15px; font-weight:900">Hafland X</h1>
            </div>
            <input type="text" id="l-nick" class="input-field" placeholder="Никнейм" style="margin-bottom:10px">
            <input type="password" id="l-pass" class="input-field" placeholder="Пароль" style="margin-bottom:20px">
            <button class="btn-main" onclick="authAction('login')">ВОЙТИ</button>
            <p style="text-align:center; margin-top:20px; color:var(--text-sec)" onclick="go('screen-reg')">Создать аккаунт</p>
        </div>
    </div>

    <div id="screen-reg" class="screen">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <h1 style="font-size:28px; font-weight:900; margin-bottom:30px">Регистрация</h1>
            <input type="text" id="r-nick" class="input-field" placeholder="Никнейм" style="margin-bottom:10px">
            <input type="password" id="r-pass" class="input-field" placeholder="Пароль" style="margin-bottom:20px">
            <div style="font-size:12px; color:var(--text-sec); margin-bottom:20px; display:flex; gap:10px">
                <input type="checkbox" id="r-agree"> <span>Принимаю правила Hafland X</span>
            </div>
            <button class="btn-main" id="reg-btn" onclick="authAction('reg')">СОЗДАТЬ</button>
            <p style="text-align:center; margin-top:20px; color:var(--text-sec)" onclick="go('screen-login')">Уже есть аккаунт?</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="screen-main" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:10px">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:30px">
                <h1 style="font-size:20px; font-weight:800">Hafland X</h1>
            </div>
            <div style="display:flex; gap:15px">
                <i data-lucide="plus-square" onclick="showGroupModal()"></i>
                <i data-lucide="sticker" onclick="pickSticker()"></i>
            </div>
        </header>

        <div id="view-chats" class="tab-view scroll-area"></div>
        <div id="view-people" class="tab-view scroll-area" style="display:none"></div>
        <div id="view-options" class="tab-view scroll-area" style="display:none"></div>
        <div id="view-profile" class="tab-view scroll-area" style="display:none"></div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="tab('chats', this)"><i data-lucide="message-circle"></i></div>
            <div class="nav-item" onclick="tab('people', this)"><i data-lucide="compass"></i></div>
            <div class="nav-item" onclick="tab('options', this)"><i data-lucide="layers"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i data-lucide="smile"></i></div>
        </nav>
    </div>

    <!-- Chat Screen -->
    <div id="screen-chat" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <i data-lucide="chevron-left" onclick="go('screen-main')"></i>
                <img id="c-ava" class="avatar" style="width:38px; height:38px">
                <div onclick="showChatInfo()">
                    <b id="c-nick">...</b>
                    <p id="c-status" style="font-size:10px; color:#22C55E">в сети</p>
                </div>
            </div>
        </header>
        <div id="chat-msgs" class="scroll-area" style="display:flex; flex-direction:column"></div>
        <div style="padding:15px 20px calc(20px + var(--safe-bottom)); background:var(--glass-thick); display:flex; gap:10px; align-items:center">
            <input type="text" id="m-input" class="input-field" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--main); width:50px; height:50px; border-radius:18px; border:none; color:white">
                <i data-lucide="send"></i>
            </button>
        </div>
    </div>

    <!-- Group Modal -->
    <div id="modal-group" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px">Создать группу</h2>
            <input type="text" id="g-name" class="input-field" placeholder="Название группы" style="margin-bottom:15px">
            <button class="btn-main" style="width:100%" onclick="createGroup()">СОЗДАТЬ</button>
            <button style="width:100%; margin-top:10px; background:none; border:none; color:var(--text-sec)" onclick="closeModals()">Отмена</button>
        </div>
    </div>

    <input type="file" id="f-ava" hidden onchange="handleAva(this)">
    <input type="file" id="f-sticker" hidden onchange="handleSticker(this)">

    <script>
        const config = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth(), db = firebase.firestore();
        let me = null, activeChat = null, chatSub = null, isGroup = false;

        const DEFAULT_AVA = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png";

        auth.onAuthStateChanged(async u => {
            if(u) {
                const doc = await db.collection('users').doc(u.uid).get();
                if(doc.exists) { me = {id: u.uid, ...doc.data()}; startApp(); }
                else go('screen-reg');
            } else go('screen-login');
        });

        async function authAction(type) {
            const n = document.getElementById(type==='reg'?'r-nick':'l-nick').value.trim();
            const p = document.getElementById(type==='reg'?'r-pass':'l-pass').value;
            if(!n || !p) return;

            if(type === 'reg') {
                if(!document.getElementById('r-agree').checked) return alert("Примите правила");
                document.getElementById('reg-btn').disabled = true;
                
                // Защита от дубликатов имен
                const check = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(check.exists) {
                    alert("Это имя уже занято");
                    document.getElementById('reg-btn').disabled = false;
                    return;
                }

                const res = await auth.signInAnonymously();
                const data = { nick: n, pass: p, ava: DEFAULT_AVA, bio: '', streak: 0, lastActivity: Date.now(), theme: 'dark', incog: false };
                await db.collection('users').doc(res.user.uid).set(data);
                await db.collection('nicknames').doc(n.toLowerCase()).set({uid: res.user.uid});
                location.reload();
            } else {
                const snap = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(!snap.exists) return alert("Юзер не найден");
                const uDoc = await db.collection('users').doc(snap.data().uid).get();
                if(uDoc.data().pass === p) {
                    me = {id: snap.data().uid, ...uDoc.data()};
                    startApp();
                } else alert("Неверный пароль");
            }
        }

        function startApp() {
            go('screen-main');
            listenChats();
            updateStreak();
            lucide.createIcons();
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screen-chat' && chatSub) { chatSub(); chatSub = null; }
        }

        function tab(t, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
            document.getElementById('view-'+t).style.display = t==='profile'?'flex':'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(t === 'people') loadPeople();
            if(t === 'profile') renderProfile();
        }

        // --- STREAK LOGIC ---
        function updateStreak() {
            const now = Date.now();
            const diff = now - (me.lastActivity || now);
            const hours = diff / (1000 * 60 * 60);

            if(hours > 48) me.streak = 0; 
            db.collection('users').doc(me.id).update({lastActivity: now, streak: me.streak});
        }

        function getStreakIcon(streak, last) {
            if(streak === 0) return null;
            const hours = (Date.now() - last) / (1000 * 60 * 60);
            return hours > 24 ? "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-28_01-13-54-413.png" : "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-28_01-14-11-937.png";
        }

        // --- CHATS ---
        function listenChats() {
            db.collection('chats').where('users', 'array-contains', me.id).onSnapshot(s => {
                const v = document.getElementById('view-chats');
                v.innerHTML = `<h2 style="padding:20px">Чаты</h2>`;
                s.forEach(doc => {
                    const c = doc.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openChat(doc.id, c);
                    
                    if(c.isGroup) {
                        card.innerHTML = `<img src="${c.ava || DEFAULT_AVA}" class="avatar"><div><b>${c.name}</b><p style="font-size:12px;color:var(--text-sec)">Группа</p></div>`;
                    } else {
                        const otherId = c.users.find(u => u !== me.id);
                        db.collection('users').doc(otherId).get().then(ud => {
                            const u = ud.data();
                            card.innerHTML = `<img src="${u.ava}" class="avatar"><div><b>${u.nick}</b><p style="font-size:12px;color:var(--text-sec)">${c.lastMsg || 'Написать...'}</p></div>`;
                        });
                    }
                    v.appendChild(card);
                });
            });
        }

        async function openChat(id, data) {
            activeChat = id;
            isGroup = data.isGroup || false;
            document.getElementById('c-nick').innerText = isGroup ? data.name : "Загрузка...";
            document.getElementById('c-ava').src = data.ava || DEFAULT_AVA;
            go('screen-chat');

            chatSub = db.collection('chats').doc(id).collection('m').orderBy('t','asc').onSnapshot(s => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                let msgs = []; s.forEach(d => msgs.push(d.data()));
                
                // Streak Island
                const icon = getStreakIcon(me.streak, me.lastActivity);
                if(icon) {
                    box.innerHTML += `<div class="streak-island"><img src="${icon}" style="width:24px"> <span>Серия: ${me.streak}</span></div>`;
                }

                msgs.forEach(m => {
                    if(m.type === 'sticker') {
                        box.innerHTML += `<img src="${m.txt}" class="sticker ${m.s === me.id ? 'my' : ''}" style="align-self:${m.s===me.id?'flex-end':'flex-start'}">`;
                    } else {
                        box.innerHTML += `<div class="bubble ${m.s === me.id ? 'my' : 'other'}">${m.txt}</div>`;
                    }
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendMsg(txt = null, type = 'text') {
            const inp = document.getElementById('m-input');
            const val = txt || inp.value.trim();
            if(!val) return;
            if(!txt) inp.value = "";

            await db.collection('chats').doc(activeChat).collection('m').add({
                s: me.id, txt: val, t: Date.now(), type: type
            });
            db.collection('chats').doc(activeChat).update({lastMsg: type==='sticker'?'[Стикер]':val, lastT: Date.now()});
        }

        // --- GROUPS ---
        function showGroupModal() { document.getElementById('modal-group').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        async function createGroup() {
            const name = document.getElementById('g-name').value.trim();
            if(!name) return;
            const ref = await db.collection('chats').add({
                name: name, isGroup: true, owner: me.id, users: [me.id], admins: [me.id], ava: DEFAULT_AVA, lastT: Date.now()
            });
            closeModals();
            openChat(ref.id, {name, isGroup: true, ava: DEFAULT_AVA});
        }

        // --- STICKERS ---
        function pickSticker() { document.getElementById('f-sticker').click(); }
        function handleSticker(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                if(activeChat) sendMsg(e.target.result, 'sticker');
                else alert("Сначала откройте чат");
            };
            reader.readAsDataURL(file);
        }

        // --- OTHERS ---
        async function loadPeople() {
            const v = document.getElementById('view-people');
            v.innerHTML = `<h2 style="padding:20px">Люди</h2>`;
            const snap = await db.collection('users').limit(50).get();
            snap.forEach(doc => {
                if(doc.id === me.id || doc.data().incog) return;
                const u = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => {
                    const chatId = me.id < doc.id ? me.id+'_'+doc.id : doc.id+'_'+me.id;
                    openChat(chatId, {users: [me.id, doc.id], ava: u.ava, name: u.nick});
                };
                card.innerHTML = `<img src="${u.ava}" class="avatar"><div><b>${u.nick}</b><p style="font-size:12px;color:var(--text-sec)">${u.bio || 'Пользователь Hafland'}</p></div>`;
                v.appendChild(card);
            });
        }

        function renderProfile() {
            const v = document.getElementById('view-profile');
            v.style.padding = "40px 20px";
            v.innerHTML = `
                <div style="text-align:center">
                    <img src="${me.ava}" class="avatar" style="width:100px; height:100px; border-radius:30px" onclick="document.getElementById('f-ava').click()">
                    <h2 style="margin-top:15px">${me.nick}</h2>
                    <p style="color:var(--text-sec)">Серия: ${me.streak} 🔥</p>
                    <textarea class="input-field" style="margin-top:20px; height:100px" id="p-bio">${me.bio}</textarea>
                    <button class="btn-main" style="width:100%; margin-top:15px" onclick="saveProfile()">СОХРАНИТЬ</button>
                </div>
            `;
        }

        async function saveProfile() {
            const bio = document.getElementById('p-bio').value;
            await db.collection('users').doc(me.id).update({bio});
            me.bio = bio;
            alert("Профиль сохранен");
        }

        function handleAva(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async e => {
                me.ava = e.target.result;
                await db.collection('users').doc(me.id).update({ava: me.ava});
                renderProfile();
            };
            reader.readAsDataURL(file);
        }

        lucide.createIcons();
    </script>
</body>
</html>
