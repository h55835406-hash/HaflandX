<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --main: #3388FF; --bg: #000000; --panel: #1A1A2A; --text: #ffffff; 
            --text-sec: #aaaaaa; --trans: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.light { --bg: #ffffff; --panel: #f0f0f0; --text: #000000; --text-sec: #666666; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); transition: var(--trans); overflow: hidden; height: 100vh; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; background: var(--bg); }
        .active { display: flex; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-box { display: flex; align-items: center; gap: 8px; color: var(--main); font-weight: 800; font-size: 24px; }
        .logo-box img { height: 28px; }
        .content { padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 100px; }
        input, textarea { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: none; background: var(--panel); color: var(--text); outline: none; font-size: 16px; }
        .btn { background: var(--main); color: #fff; padding: 16px; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:active { transform: scale(0.96); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--panel); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { font-size: 24px; opacity: 0.4; transition: var(--trans); cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--main); transform: translateY(-5px); }
        .msg-box { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.4; }
        .msg.my { align-self: flex-end; background: var(--main); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--panel); border-bottom-left-radius: 4px; }
        .user-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--panel); border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        .ava { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #333; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--main); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div id="screen-reg" class="screen active">
    <div class="header"><div class="logo-box">Hafland X <img src="Picsart_26-02-27_19-28-17-781.png"></div></div>
    <div class="content">
        <input type="text" id="reg-n" placeholder="Никнейм">
        <input type="password" id="reg-p" placeholder="Пароль">
        <label style="font-size: 13px; display: flex; gap: 8px;"><input type="checkbox" id="reg-a"> Я согласен с правилами площадки</label>
        <button class="btn" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>
</div>

<div id="screen-main" class="screen">
    <div class="header"><div id="title">Чаты</div><div id="streak-top" style="color: #ff9800; font-weight: bold; font-size: 14px;"></div></div>
    <div class="content" id="main-cont"></div>
    <div class="nav">
        <div class="nav-item active" onclick="setTab('chats', this)">💬</div>
        <div class="nav-item" onclick="setTab('users', this)">👥</div>
        <div class="nav-item" onclick="setTab('settings', this)">⚙️</div>
        <div class="nav-item" onclick="setTab('profile', this)">👤</div>
    </div>
</div>

<div id="screen-chat" class="screen">
    <div class="header"><span onclick="showScreen('screen-main')">←</span> <b id="chat-target">Чат</b> <div></div></div>
    <div class="content" id="chat-msgs"></div>
    <div style="padding: 10px; background: var(--panel); display: flex; gap: 10px; align-items: center;">
        <input type="text" id="msg-input" placeholder="Сообщение..." style="margin: 0;">
        <button onclick="send()" style="background: none; border: none; font-size: 28px; color: var(--main); cursor: pointer;">✈️</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCojfrDEtkSpSSW4rRSKRMjYkOnoC3_fz4",
  authDomain: "haflandmessenger.firebaseapp.com",
  projectId: "haflandmessenger",
  storageBucket: "haflandmessenger.firebasestorage.app",
  messagingSenderId: "976100365840",
  appId: "1:976100365840:web:9a4e5000c2dc582d669c95",
  measurementId: "G-G7XG9LFTW1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();
let me = null, activeChatId = null, unsub = null;

auth.onAuthStateChanged(u => {
    if(u) {
        db.collection('users').doc(u.uid).get().then(d => {
            if(d.exists) { me = d.data(); me.id = u.uid; showScreen('screen-main'); setTab('chats'); updateStreak(); }
            else { showScreen('screen-reg'); }
        });
    }
});

async function register() {
    const n = document.getElementById('reg-n').value.trim(), p = document.getElementById('reg-p').value, a = document.getElementById('reg-a').checked;
    if(!n || !p || !a) return alert("Заполни все поля");
    const check = await db.collection('nicknames').doc(n.toLowerCase()).get();
    if(check.exists) return alert("Ник занят");
    auth.signInAnonymously().then(async r => {
        const userData = { nick: n, pass: p, inc: false, streak: 0, sName: "Огонек", bio: "", ava: "", last: Date.now(), updateDate: 0 };
        await db.collection('users').doc(r.user.uid).set(userData);
        await db.collection('nicknames').doc(n.toLowerCase()).set({uid: r.user.uid});
        location.reload();
    });
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-main' && unsub) unsub();
}

async function setTab(t, el) {
    if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
    const cont = document.getElementById('main-cont'), title = document.getElementById('title');
    cont.innerHTML = ""; title.innerText = t === 'chats' ? "Чаты" : t === 'users' ? "Контакты" : t === 'settings' ? "Настройки" : "Профиль";
    if(t === 'users') {
        const snap = await db.collection('users').get();
        snap.forEach(doc => {
            const u = doc.data();
            if(doc.id !== me.id && !u.inc) {
                cont.innerHTML += `<div class="user-card" onclick="openChat('${doc.id}','${u.nick}')">
                    <img src="${u.ava || 'https://via.placeholder.com/50'}" class="ava">
                    <div><b>${u.nick}</b><br><small style="color:orange">🔥 ${u.streak}</small></div>
                </div>`;
            }
        });
    }
    if(t === 'settings') {
        cont.innerHTML = `<div class="row"><span>Инкогнито</span><label class="switch"><input type="checkbox" ${me.inc?'checked':''} onchange="db.collection('users').doc(me.id).update({inc:this.checked})"><span class="slider"></span></label></div>
            <div class="row"><span>Светлая тема</span><label class="switch"><input type="checkbox" onchange="document.body.classList.toggle('light')"><span class="slider"></span></label></div>
            <span>Имя огонька</span><input type="text" value="${me.sName}" onchange="db.collection('users').doc(me.id).update({sName:this.value})">`;
    }
    if(t === 'profile') {
        cont.innerHTML = `<div style="text-align:center"><img src="${me.ava || 'https://via.placeholder.com/100'}" id="p-ava" class="ava" style="width:100px; height:100px;" onclick="document.getElementById('f').click()"></div>
            <input type="file" id="f" hidden onchange="uploadAva(this)">
            <input type="text" id="p-n" value="${me.nick}" placeholder="Ник">
            <input type="password" id="p-p" placeholder="Новый пароль">
            <textarea id="p-b" placeholder="Описание">${me.bio}</textarea>
            <button class="btn" onclick="saveP()">СОХРАНИТЬ (раз в 7 дней)</button>
            <button class="btn" style="background:#444" onclick="auth.signOut().then(()=>location.reload())">ВЫЙТИ</button>`;
    }
}

async function uploadAva(input) {
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const base64 = e.target.result;
        db.collection('users').doc(me.id).update({ava: base64});
        document.getElementById('p-ava').src = base64;
    };
    reader.readAsDataURL(file);
}

async function saveP() {
    const now = Date.now();
    if(now - me.updateDate < 7*24*60*60*1000) return alert("Еще не прошло 7 дней");
    const n = document.getElementById('p-n').value, p = document.getElementById('p-p').value, b = document.getElementById('p-b').value;
    await db.collection('users').doc(me.id).update({nick: n, bio: b, updateDate: now});
    if(p) await db.collection('users').doc(me.id).update({pass: p});
    alert("Обновлено!");
}

function openChat(id, name) {
    activeChatId = me.id < id ? me.id+'_'+id : id+'_'+me.id;
    document.getElementById('chat-target').innerText = name;
    showScreen('screen-chat');
    const mDiv = document.getElementById('chat-msgs');
    unsub = db.collection('chats').doc(activeChatId).collection('m').orderBy('t').onSnapshot(s => {
        mDiv.innerHTML = "";
        s.forEach(d => {
            const m = d.data();
            mDiv.innerHTML += `<div class="msg ${m.s === me.id ? 'my' : 'other'}">${m.txt}</div>`;
        });
        mDiv.scrollTop = mDiv.scrollHeight;
    });
}

function send() {
    const inp = document.getElementById('msg-input'), txt = inp.value.trim();
    if(!txt) return;
    db.collection('chats').doc(activeChatId).collection('m').add({ s: me.id, txt: txt, t: Date.now() });
    inp.value = "";
}

function updateStreak() {
    const now = Date.now(), diff = now - me.last;
    if(diff > 24*60*60*1000 && diff < 48*60*60*1000) {
        db.collection('users').doc(me.id).update({streak: me.streak + 1, last: now});
    } else if (diff > 48*60*60*1000) {
        db.collection('users').doc(me.id).update({streak: 0, last: now});
    }
    document.getElementById('streak-top').innerHTML = `🔥 ${me.streak} ${me.sName}`;
}
</script>
</body>
</html>
