<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hafland X</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
<style>
  :root {
    --bg: #090a0f; --panel: #161a2b; --accent: #2b66ff;
    --text: #ffffff; --text-muted: #8a91a8; --border: #23283e;
    --nav-bg: #121522; --danger: #ff4444;
  }
  [data-theme="light"] {
    --bg: #f4f6f9; --panel: #ffffff; --accent: #2b66ff;
    --text: #1a1d29; --text-muted: #6b7280; --border: #e5e7eb;
    --nav-bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
  body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  
  input, textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 16px; margin-bottom: 16px; outline: none; font-size: 16px; }
  button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
  
  .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: translateY(10px); z-index: 1; background: var(--bg); }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); z-index: 10; }
  
  .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .header-brand { font-size: 24px; font-weight: 700; color: var(--accent); }
  
  .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  
  .user-card { display: flex; align-items: center; gap: 16px; padding: 14px; background: var(--panel); border-radius: 18px; margin-bottom: 10px; position: relative; }
  .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; }
  .user-name { font-weight: 600; }
  
  .dot-menu-btn { padding: 8px; color: var(--text-muted); cursor: pointer; }
  .context-menu { position: absolute; right: 10px; top: 50px; background: var(--nav-bg); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; display: none; min-width: 150px; }
  .context-menu.show { display: block; }
  .menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; }
  .menu-item:hover { background: var(--panel); }

  .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 24px; }
  .nav-item { color: var(--text-muted); text-align: center; font-size: 12px; cursor: pointer; }
  .nav-item.active { color: var(--accent); }
  
  .chat-screen { z-index: 200; }
  .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 15px; }
  .msg.out { background: var(--accent); align-self: flex-end; }
  .msg.in { background: var(--panel); align-self: flex-start; }
  
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: var(--panel); padding: 24px; border-radius: 24px; width: 100%; max-width: 400px; }
</style>
</head>
<body onclick="closeAllMenus()">

<div id="auth-screen" class="screen active">
  <div style="padding: 40px 24px; margin: auto; width: 100%; max-width: 400px;">
    <h1 style="color: var(--accent); font-size: 40px;">Hafland X</h1>
    <div id="reg-form">
      <input type="text" id="reg-nick" placeholder="Никнейм">
      <input type="password" id="reg-pass" placeholder="Пароль">
      <button onclick="handleAuth('register')">РЕГИСТРАЦИЯ</button>
      <p onclick="toggleAuth()" style="text-align:center; margin-top:20px; color:var(--accent)">Войти</p>
    </div>
    <div id="log-form" style="display:none">
      <input type="text" id="log-nick" placeholder="Никнейм">
      <input type="password" id="log-pass" placeholder="Пароль">
      <button onclick="handleAuth('login')">ВОЙТИ</button>
      <p onclick="toggleAuth()" style="text-align:center; margin-top:20px; color:var(--accent)">Создать аккаунт</p>
    </div>
  </div>
</div>

<div id="main-screen" class="screen">
  <div class="header">
    <div class="header-brand">Hafland X</div>
    <span class="material-symbols-outlined" onclick="switchTab('settings')">more_vert</span>
  </div>
  <div class="content">
    <div id="tab-chats" class="tab-content active">
      <div class="user-card" onclick="switchTab('archive')"><div class="avatar"><span class="material-symbols-outlined">archive</span></div><div class="user-info">Архив</div></div>
      <div id="chats-list"></div>
    </div>
    <div id="tab-archive" class="tab-content">
      <h3 onclick="switchTab('chats')"><span class="material-symbols-outlined">arrow_back</span> Архив</h3>
      <div id="archive-list"></div>
    </div>
    <div id="tab-contacts" class="tab-content">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>Контакты</h3>
        <span class="material-symbols-outlined" onclick="openModal('group-modal')" style="color:var(--accent)">group_add</span>
      </div>
      <div id="contacts-list"></div>
    </div>
    <div id="tab-profile" class="tab-content">
      <div style="text-align:center; margin-bottom:20px;">
        <div class="avatar" style="width:100px; height:100px; margin:0 auto;" onclick="document.getElementById('avatar-input').click()">
          <img id="my-avatar" src="" style="display:none">
          <span id="my-icon" class="material-symbols-outlined" style="font-size:50px">person</span>
        </div>
        <input type="file" id="avatar-input" hidden accept="image/*" onchange="uploadAvat(event)">
        <h2 id="my-nick-disp">...</h2>
      </div>
      <input type="text" id="upd-nick" placeholder="Новый ник">
      <input type="password" id="upd-pass" placeholder="Новый пароль">
      <button onclick="updateProfile()">Сохранить данные</button>
      <button onclick="logout()" style="background:var(--danger); margin-top:10px;">Выйти</button>
    </div>
    <div id="tab-settings" class="tab-content">
       <h3>Настройки</h3>
       <div class="user-card" onclick="toggleTheme()"><div class="user-info">Сменить тему</div></div>
       <div id="blocked-list-area">
         <h4>Заблокированные</h4>
         <div id="blocked-list"></div>
       </div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('chats', this)"><span class="material-symbols-outlined">chat</span><p>Чаты</p></div>
    <div class="nav-item" onclick="switchTab('contacts', this)"><span class="material-symbols-outlined">group</span><p>Люди</p></div>
    <div class="nav-item" onclick="switchTab('profile', this)"><span class="material-symbols-outlined">person</span><p>Профиль</p></div>
  </div>
</div>

<div id="chat-screen" class="screen chat-screen">
  <div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
      <span class="material-symbols-outlined" onclick="closeChat()">arrow_back</span>
      <div id="chat-title" style="font-weight:700">Чат</div>
    </div>
  </div>
  <div class="messages" id="msgs"></div>
  <div style="padding:15px; display:flex; gap:10px; background:var(--panel);">
    <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0">
    <span class="material-symbols-outlined" onclick="sendMsg()" style="color:var(--accent); font-size:35px">send</span>
  </div>
</div>

<div id="group-modal" class="modal">
  <div class="modal-box">
    <h3>Создать группу</h3>
    <input type="text" id="grp-name" placeholder="Название">
    <button onclick="createGrp()">Создать</button>
    <button onclick="closeModal('group-modal')" style="background:none">Отмена</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, query, where, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const conf = { apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k", authDomain: "hafland-x-66cdc.firebaseapp.com", projectId: "hafland-x-66cdc", storageBucket: "hafland-x-66cdc.firebasestorage.app", messagingSenderId: "1007892951941", appId: "1:1007892951941:web:692984898e47747307caec" };
  const app = initializeApp(conf);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let me = null, activeChat = null, isGrp = false;

  window.toggleAuth = () => {
    const r = document.getElementById('reg-form'), l = document.getElementById('log-form');
    r.style.display = r.style.display === 'none' ? 'block' : 'none';
    l.style.display = l.style.display === 'none' ? 'block' : 'none';
  };

  window.handleAuth = async (type) => {
    const n = document.getElementById(type + '-nick').value.trim();
    const p = document.getElementById(type + '-pass').value;
    if(!n || !p) return alert('Заполни поля');
    try {
      if(type === 'register') {
        const check = await getDocs(query(collection(db, "users"), where("nickname", "==", n)));
        if(!check.empty) return alert('Ник занят');
        const res = await signInAnonymously(auth);
        await setDoc(doc(db, "users", res.user.uid), { nickname: n, password: p, blocked: [], avatar: null });
      } else {
        const q = await getDocs(query(collection(db, "users"), where("nickname", "==", n), where("password", "==", p)));
        if(q.empty) return alert('Ошибка');
        await signInAnonymously(auth);
      }
      location.reload();
    } catch(e) { alert(e.message); }
  };

  onAuthStateChanged(auth, async (u) => {
    if(u) {
      const s = await getDoc(doc(db, "users", u.uid));
      if(s.exists()) {
        me = { id: u.uid, ...s.data() };
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        loadData();
      }
    }
  });

  function loadData() {
    document.getElementById('my-nick-disp').innerText = me.nickname;
    if(me.avatar) { document.getElementById('my-avatar').src = me.avatar; document.getElementById('my-avatar').style.display='block'; document.getElementById('my-icon').style.display='none'; }
    
    onSnapshot(collection(db, "users"), (s) => {
      const list = document.getElementById('contacts-list'); list.innerHTML = '';
      const blist = document.getElementById('blocked-list'); blist.innerHTML = '';
      s.forEach(d => {
        if(d.id !== me.id) {
          if(me.blocked?.includes(d.id)) {
            blist.innerHTML += `<div class="user-card"><div class="user-info">${d.data().nickname}</div><button onclick="unblock('${d.id}')" style="width:auto; padding:5px 10px">Разблок</button></div>`;
          } else {
            list.appendChild(renderCard(d.id, d.data().nickname, 'contact', d.data().avatar));
          }
        }
      });
    });

    onSnapshot(collection(db, `chats/${me.id}/active`), (s) => {
      const cl = document.getElementById('chats-list'), al = document.getElementById('archive-list');
      cl.innerHTML = ''; al.innerHTML = '';
      s.forEach(d => {
        const card = renderCard(d.id, d.data().title, d.id.startsWith('grp_') ? 'group' : 'chat', null, d.data().archived);
        if(d.data().archived) al.appendChild(card); else cl.appendChild(card);
      });
    });
  }

  function renderCard(id, title, type, ava, archived = false) {
    const div = document.createElement('div');
    div.className = 'user-card';
    div.innerHTML = `
      <div class="avatar">${ava ? `<img src="${ava}">` : `<span class="material-symbols-outlined">${type==='group'?'groups':'person'}</span>`}</div>
      <div class="user-info" onclick="openChat('${id}', '${title}', ${type==='group'})">
        <div class="user-name">${title}</div>
      </div>
      <span class="material-symbols-outlined dot-menu-btn" onclick="toggleMenu(event, '${id}')">more_vert</span>
      <div id="menu-${id}" class="context-menu">
        ${archived ? `<div class="menu-item" onclick="moveArchive('${id}', false)"><span class="material-symbols-outlined">unarchive</span> Разархивировать</div>` 
                   : `<div class="menu-item" onclick="moveArchive('${id}', true)"><span class="material-symbols-outlined">archive</span> В архив</div>`}
        <div class="menu-item" style="color:var(--danger)" onclick="blockUser('${id}')"><span class="material-symbols-outlined">block</span> Блок</div>
      </div>
    `;
    return div;
  }

  window.toggleMenu = (e, id) => { e.stopPropagation(); closeAllMenus(); document.getElementById('menu-'+id).classList.add('show'); };
  window.closeAllMenus = () => document.querySelectorAll('.context-menu').forEach(m => m.classList.remove('show'));
  
  window.moveArchive = async (id, state) => { await updateDoc(doc(db, `chats/${me.id}/active`, id), { archived: state }); };
  window.blockUser = async (id) => { const b = me.blocked || []; b.push(id); await updateDoc(doc(db, "users", me.id), { blocked: b }); location.reload(); };
  window.unblock = async (id) => { const b = me.blocked.filter(x => x !== id); await updateDoc(doc(db, "users", me.id), { blocked: b }); location.reload(); };

  window.createGrp = async () => {
    const n = document.getElementById('grp-name').value; if(!n) return;
    const gid = 'grp_' + Date.now();
    await setDoc(doc(db, `chats/${me.id}/active`, gid), { title: n, archived: false });
    closeModal('group-modal');
  };

  window.openChat = (id, title, grp) => {
    activeChat = id; isGrp = grp;
    document.getElementById('chat-title').innerText = title;
    document.getElementById('chat-screen').classList.add('active');
    const cid = isGrp ? id : (me.id < id ? `${me.id}_${id}` : `${id}_${me.id}`);
    onSnapshot(query(collection(db, "msgs", cid, "list"), orderBy("ts")), (s) => {
      const mbox = document.getElementById('msgs'); mbox.innerHTML = '';
      s.forEach(d => { mbox.innerHTML += `<div class="msg ${d.data().s === me.id ? 'out' : 'in'}">${isGrp?`<b>${d.data().n}:</b> `:''}${d.data().t}</div>`; });
      mbox.scrollTop = mbox.scrollHeight;
    });
  };

  window.sendMsg = async () => {
    const i = document.getElementById('msg-input'), t = i.value.trim(); if(!t) return;
    const cid = isGrp ? activeChat : (me.id < activeChat ? `${me.id}_${activeChat}` : `${activeChat}_${me.id}`);
    await addDoc(collection(db, "msgs", cid, "list"), { s: me.id, n: me.nickname, t, ts: serverTimestamp() });
    i.value = '';
    await setDoc(doc(db, `chats/${me.id}/active`, activeChat), { title: document.getElementById('chat-title').innerText, archived: false }, {merge:true});
    if(!isGrp) await setDoc(doc(db, `chats/${activeChat}/active`, me.id), { title: me.nickname, archived: false }, {merge:true});
  };

  window.uploadAvat = (e) => {
    const f = e.target.files[0]; const reader = new FileReader();
    reader.onload = async () => { 
      const base64 = reader.result;
      await updateDoc(doc(db, "users", me.id), { avatar: base64 });
      document.getElementById('my-avatar').src = base64;
    };
    reader.readAsDataURL(f);
  };

  window.updateProfile = async () => {
    const n = document.getElementById('upd-nick').value || me.nickname;
    const p = document.getElementById('upd-pass').value || me.password;
    await updateDoc(doc(db, "users", me.id), { nickname: n, password: p });
    alert('Обновлено'); location.reload();
  };

  window.switchTab = (t, el) => {
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
  };
  window.closeChat = () => document.getElementById('chat-screen').classList.remove('active');
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.logout = () => { auth.signOut(); location.reload(); };
  window.toggleTheme = () => { const t = document.documentElement.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme', t === 'light' ? 'dark' : 'light'); };
</script>
</body>
</html>
