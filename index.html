<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hafland X</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
<style>
  :root { --bg: #090a0f; --panel: #161a2b; --accent: #2b66ff; --text: #ffffff; --text-muted: #8a91a8; --border: #23283e; --nav-bg: #121522; --danger: #ff4444; }
  [data-theme="light"] { --bg: #f4f6f9; --panel: #ffffff; --accent: #2b66ff; --text: #1a1d29; --text-muted: #6b7280; --border: #e5e7eb; --nav-bg: #ffffff; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
  body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  input, textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 16px; margin-bottom: 12px; outline: none; }
  button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 16px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; pointer-events: none; z-index: 1; background: var(--bg); }
  .screen.active { opacity: 1; pointer-events: all; z-index: 10; }
  .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .user-card { display: flex; align-items: center; gap: 14px; padding: 12px; background: var(--panel); border-radius: 18px; margin-bottom: 10px; position: relative; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; overflow: hidden; }
  .user-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dot-menu-btn { padding: 8px; color: var(--text-muted); cursor: pointer; }
  .context-menu { position: absolute; right: 10px; top: 45px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 1000; display: none; min-width: 180px; overflow: hidden; }
  .context-menu.show { display: block; }
  .menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--border); }
  .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 20px; z-index: 100; }
  .nav-item { color: var(--text-muted); text-align: center; font-size: 11px; cursor: pointer; opacity: 0.7; }
  .nav-item.active { color: var(--accent); opacity: 1; }
  .chat-screen { z-index: 200; }
  .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; }
  .msg.out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.in { background: var(--panel); align-self: flex-start; border-bottom-left-radius: 4px; }
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: var(--panel); padding: 24px; border-radius: 24px; width: 100%; max-width: 380px; }
  #streak-island { position: absolute; top: 100px; right: 20px; background: rgba(22, 26, 43, 0.85); backdrop-filter: blur(10px); padding: 10px 14px; border-radius: 24px; border: 1px solid var(--border); display: none; flex-direction: column; align-items: center; z-index: 300; cursor: move; box-shadow: 0 4px 15px rgba(0,0,0,0.3); user-select: none; }
  .streak-img { width: 45px; height: 45px; object-fit: contain; }
  .streak-val { font-weight: 700; font-size: 18px; color: #fff; line-height: 1; }
  .streak-name { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .streak-fix-btn { background: #44bb44; padding: 4px 8px; border-radius: 8px; font-size: 10px; margin-top: 5px; color: #fff; cursor: pointer; }
  #streak-notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #ff9800; color: #fff; padding: 12px 20px; border-radius: 20px; z-index: 2000; font-weight: 600; font-size: 14px; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
  #streak-notif.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body onclick="closeAllMenus()">
<div id="streak-notif">Твоя серия мерзнет!</div>

<div id="auth-screen" class="screen">
  <div style="padding: 40px 24px; margin: auto; width: 100%; max-width: 400px;">
    <h1 style="color:var(--accent); font-size:42px; font-weight:800; margin-bottom:30px;">Hafland X</h1>
    <div id="reg-form">
      <input type="text" id="reg-nick" placeholder="Никнейм">
      <input type="password" id="reg-pass" placeholder="Пароль">
      <button onclick="handleAuth('register')">РЕГИСТРАЦИЯ</button>
      <p onclick="toggleAuth()" style="text-align:center; margin-top:20px; color:var(--accent); cursor:pointer">Вход</p>
    </div>
    <div id="log-form" style="display:none">
      <input type="text" id="log-nick" placeholder="Никнейм">
      <input type="password" id="log-pass" placeholder="Пароль">
      <button onclick="handleAuth('login')">ВОЙТИ</button>
      <p onclick="toggleAuth()" style="text-align:center; margin-top:20px; color:var(--accent); cursor:pointer">Создать аккаунт</p>
    </div>
  </div>
</div>

<div id="main-screen" class="screen">
  <div class="header"><div style="font-size:22px; font-weight:700; color:var(--accent)">Hafland X</div><span class="material-symbols-outlined" onclick="switchTab('settings')" style="cursor:pointer">settings</span></div>
  <div class="content">
    <div id="tab-chats" class="tab-content active"><div id="chats-list"></div></div>
    <div id="tab-contacts" class="tab-content"><h3>Люди</h3><div id="contacts-list"></div></div>
    <div id="tab-profile" class="tab-content"><div style="text-align:center"><div class="avatar" style="width:110px; height:110px; margin:0 auto" onclick="document.getElementById('avatar-in').click()"><img id="my-ava" style="display:none"><span id="my-ico" class="material-symbols-outlined" style="font-size:55px">person</span></div><input type="file" id="avatar-in" hidden onchange="upAvat(event)"><h2 id="my-nick-txt">...</h2><button onclick="logout()" style="background:var(--danger)">Выйти</button></div></div>
    <div id="tab-settings" class="tab-content"><h3>Настройки</h3><button onclick="toggleTheme()">Переключить тему</button></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('chats', this)"><span class="material-symbols-outlined">chat_bubble</span><p>Чаты</p></div>
    <div class="nav-item" onclick="switchTab('contacts', this)"><span class="material-symbols-outlined">explore</span><p>Люди</p></div>
    <div class="nav-item" onclick="switchTab('profile', this)"><span class="material-symbols-outlined">account_circle</span><p>Профиль</p></div>
  </div>
</div>

<div id="chat-screen" class="screen chat-screen">
  <div id="streak-island"><img id="streak-icon" class="streak-img" src=""><div id="streak-count" class="streak-val">0</div><div id="streak-label" class="streak-name" onclick="renameStreak()">ОГОНЕК</div><div id="streak-fix" class="streak-fix-btn" style="display:none" onclick="fixStreak()">Спасти</div></div>
  <div class="header">
    <div style="display:flex; align-items:center; gap:12px;"><span class="material-symbols-outlined" onclick="closeChat()">arrow_back</span><div id="chat-title">...</div></div>
    <span id="grp-set-btn" class="material-symbols-outlined" style="display:none" onclick="openModal('grp-manage-modal')">settings_suggest</span>
  </div>
  <div class="messages" id="chat-msgs"></div>
  <div style="padding:15px; display:flex; gap:12px; background:var(--panel)"><input type="text" id="chat-in" placeholder="Сообщение..."><span class="material-symbols-outlined" onclick="send()" style="color:var(--accent); font-size:36px">send</span></div>
</div>

<div id="grp-manage-modal" class="modal"><div class="modal-box"><h3>Группа</h3><input type="text" id="edit-g-name" placeholder="Название"><button onclick="document.getElementById('g-ava-in').click()">Сменить аву</button><input type="file" id="g-ava-in" hidden onchange="upGrpAva(event)"><button onclick="saveGrpEdits()">Сохранить</button><button onclick="closeModal('grp-manage-modal')">Закрыть</button></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, collection, onSnapshot, query, where, orderBy, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const cf = { apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k", authDomain: "hafland-x-66cdc.firebaseapp.com", projectId: "hafland-x-66cdc", storageBucket: "hafland-x-66cdc.firebasestorage.app", messagingSenderId: "1007892951941", appId: "1:1007892951941:web:692984898e47747307caec" };
  const app = initializeApp(cf); const auth = getAuth(app); const db = getFirestore(app);
  let me = null, curChatId = null, isG = false, chatUnsub = null;

  const IMG_HOT = "https://cdn.jsdelivr.net/gh/h55835406-hash/HaflandX@main/Picsart_26-02-28_01-14-11-937.png";
  const IMG_COLD = "https://cdn.jsdelivr.net/gh/h55835406-hash/HaflandX@main/Picsart_26-02-28_01-13-54-413.png";

  setPersistence(auth, browserLocalPersistence);
  onAuthStateChanged(auth, async (u) => {
    if(u) {
      const s = await getDoc(doc(db,"users",u.uid));
      if(s.exists()) { me = { id:u.uid, ...s.data() }; document.getElementById('auth-screen').classList.remove('active'); document.getElementById('main-screen').classList.add('active'); loadApp(); }
    } else document.getElementById('auth-screen').classList.add('active');
  });

  function loadApp() {
    document.getElementById('my-nick-txt').innerText = me.nickname;
    if(me.avatar) { document.getElementById('my-ava').src = me.avatar; document.getElementById('my-ava').style.display='block'; document.getElementById('my-ico').style.display='none'; }
    onSnapshot(collection(db,"users"), (s) => {
      const l = document.getElementById('contacts-list'); l.innerHTML = '';
      s.forEach(d => { if(d.id!==me.id) l.appendChild(card(d.id, d.data().nickname, 'u', d.data().avatar)); });
    });
    onSnapshot(collection(db,`chats/${me.id}/active`), (s) => {
      const cl = document.getElementById('chats-list'); cl.innerHTML = '';
      s.forEach(d => cl.appendChild(card(d.id, d.data().title, d.id.startsWith('grp_')?'g':'u', d.data().avatar)));
    });
  }

  function card(id, name, type, ava) {
    const d = document.createElement('div'); d.className = 'user-card';
    const isB = me.blocked?.includes(id);
    d.innerHTML = `
      <div class="avatar">${ava ? `<img src="${ava}">` : `<span class="material-symbols-outlined">${type==='g'?'groups':'person'}</span>`}</div>
      <div class="user-info" onclick="openChat('${id}','${name}',${type==='g'})"><div class="user-name">${name} ${isB?'(БЛОК)':''}</div></div>
      <span class="material-symbols-outlined dot-menu-btn" onclick="tglM(event,'${id}')">more_vert</span>
      <div id="m-${id}" class="context-menu">
        ${type==='u' ? `<div class="menu-item" onclick="tglBlk('${id}')">${isB?'Разблок':'Блок'}</div>` : ''}
        <div class="menu-item" style="color:red" onclick="delChat('${id}')">Удалить</div>
      </div>
    `; return d;
  }

  window.tglBlk = async (id) => { let b = me.blocked||[]; b = b.includes(id)?b.filter(x=>x!==id):[...b,id]; await updateDoc(doc(db,"users",me.id),{blocked:b}); me.blocked=b; loadApp(); };
  window.upGrpAva = (e) => { const f=e.target.files[0]; const r=new FileReader(); r.onload=async ()=>{ await updateDoc(doc(db,"groups",curChatId),{avatar:r.result}); await updateDoc(doc(db,`chats/${me.id}/active`,curChatId),{avatar:r.result}); }; r.readAsDataURL(f); };
  window.openChat = async (id, name, g) => {
    curChatId = id; isG = g; document.getElementById('chat-title').innerText = name;
    document.getElementById('chat-screen').classList.add('active');
    document.getElementById('grp-set-btn').style.display = g?'block':'none';
    if(chatUnsub) chatUnsub();
    chatUnsub = onSnapshot(query(collection(db,"msgs", (isG?id:(me.id<id?`${me.id}_${id}`:`${id}_${me.id}`)), "list"), orderBy("ts")), (s) => {
      const mb = document.getElementById('chat-msgs'); mb.innerHTML = '';
      s.forEach(d => { mb.innerHTML += `<div class="msg ${d.data().s===me.id?'out':'in'}">${d.data().t}</div>`; });
      mb.scrollTop = mb.scrollHeight;
    });
    if(!isG) onSnapshot(doc(db,`chats/${me.id}/active`,id), (s) => { if(s.exists()) updateStreakUI(s.data()); });
  };

  function updateStreakUI(data) {
    const diff = (new Date() - (data.lastTs?.toDate()||new Date())) / (1000*60*60);
    document.getElementById('streak-island').style.display = 'flex';
    document.getElementById('streak-count').innerText = data.streak||0;
    document.getElementById('streak-label').innerText = data.streakName||"ОГОНЕК";
    if(diff>48){ document.getElementById('streak-icon').src=IMG_COLD; if(data.streak>0) resetStreak(); }
    else if(diff>24){ document.getElementById('streak-icon').src=IMG_COLD; document.getElementById('streak-fix').style.display='block'; document.getElementById('streak-notif').classList.add('show'); }
    else { document.getElementById('streak-icon').src=IMG_HOT; document.getElementById('streak-fix').style.display='none'; document.getElementById('streak-notif').classList.remove('show'); }
  }

  window.send = async () => {
    const i = document.getElementById('chat-in'), t = i.value.trim(); if(!t) return;
    const cid = isG ? curChatId : (me.id < curChatId ? `${me.id}_${curChatId}` : `${curChatId}_${me.id}`);
    await addDoc(collection(db,"msgs",cid,"list"), { s:me.id, t, ts:serverTimestamp() }); i.value = '';
    if(!isG) {
      const snap = await getDoc(doc(db,`chats/${me.id}/active`,curChatId));
      let s = snap.exists() ? (snap.data().streak||0) : 0;
      const last = snap.exists()&&snap.data().lastTs?snap.data().lastTs.toDate():null;
      if(!last || (new Date()-last)/(1000*60*60)<24) s++;
      const up = { lastTs:serverTimestamp(), streak:s, title:document.getElementById('chat-title').innerText };
      await setDoc(doc(db,`chats/${me.id}/active`,curChatId), up, {merge:true});
      await setDoc(doc(db,`chats/${curChatId}/active`,me.id), {streak:s, lastTs:serverTimestamp(), title:me.nickname}, {merge:true});
    }
  };

  const isl = document.getElementById('streak-island'); let ox, oy;
  isl.ontouchstart = (e) => { ox = e.touches[0].clientX - isl.offsetLeft; oy = e.touches[0].clientY - isl.offsetTop; };
  isl.ontouchmove = (e) => { isl.style.left = (e.touches[0].clientX - ox) + 'px'; isl.style.top = (e.touches[0].clientY - oy) + 'px'; isl.style.right = 'auto'; };
  window.toggleTheme = () => { const t=document.documentElement.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme',t==='light'?'dark':'light'); };
  window.switchTab = (t,el) => { document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); if(el){ document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); } };
  window.closeChat = () => { document.getElementById('chat-screen').classList.remove('active'); document.getElementById('streak-notif').classList.remove('show'); };
  window.handleAuth = async (t) => {
    const n = document.getElementById(t+'-nick').value, p = document.getElementById(t+'-pass').value;
    const r = await signInAnonymously(auth);
    if(t==='register') await setDoc(doc(db,"users",r.user.uid), { nickname:n, password:p, blocked:[] });
    location.reload();
  };
  window.tglM = (e,id) => { e.stopPropagation(); document.querySelectorAll('.context-menu').forEach(m=>m.classList.remove('show')); document.getElementById('m-'+id).classList.add('show'); };
  window.closeAllMenus = () => document.querySelectorAll('.context-menu').forEach(m=>m.classList.remove('show'));
  window.openModal = (id) => document.getElementById(id).style.display='flex';
  window.closeModal = (id) => document.getElementById(id).style.display='none';
  window.logout = () => { auth.signOut(); location.reload(); };
</script>
</body>
</html>
