<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #2563eb;
            --input: #11141d;
            --card: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.05);
            --bubble-me: #2563eb;
            --bubble-them: #1a1d26;
        }

        .light-theme {
            --bg: #f3f4f6;
            --text: #111827;
            --accent: #2563eb;
            --input: #ffffff;
            --card: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.05);
            --bubble-me: #2563eb;
            --bubble-them: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden;
        }

        /* Auth */
        .auth-input {
            width: 100%;
            background-color: var(--input);
            border: 1px solid var(--border);
            padding: 18px 22px;
            border-radius: 20px;
            outline: none;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 12px;
            transition: border 0.2s;
        }
        .auth-input:focus { border-color: var(--accent); }

        .blue-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        .blue-btn:active { opacity: 0.8; }

        /* Nav */
        .nav-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            display: flex;
            padding: 8px;
            border: 1px solid var(--border);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            color: #6b7280;
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
            border-radius: 20px;
        }

        .nav-btn.active { color: var(--accent); background: rgba(37, 99, 235, 0.05); }
        .nav-btn i { width: 20px; height: 20px; margin-bottom: 2px; }

        /* Switches */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Chat Bubbles */
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .bubble.me { background: var(--bubble-me); color: white; border-bottom-right-radius: 4px; }
        .bubble.them { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        .screen-content { height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; border: 2px solid var(--bg); }
    </style>
</head>
<body>

<div id="app-root">
    <div id="screen" class="screen-content no-scrollbar"></div>

    <nav id="nav-bar" class="nav-container hidden">
        <button onclick="window.goTab('chats')" id="tab-chats" class="nav-btn active"><i data-lucide="message-circle"></i><span>Чаты</span></button>
        <button onclick="window.goTab('search')" id="tab-search" class="nav-btn"><i data-lucide="search"></i><span>Поиск</span></button>
        <button onclick="window.goTab('settings')" id="tab-settings" class="nav-btn"><i data-lucide="settings"></i><span>Настройки</span></button>
        <button onclick="window.goTab('profile')" id="tab-profile" class="nav-btn"><i data-lucide="user"></i><span>Профиль</span></button>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const fbConfig = {
        apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
        authDomain: "hafland-x-66cdc.firebaseapp.com",
        projectId: "hafland-x-66cdc",
        storageBucket: "hafland-x-66cdc.firebasestorage.app",
        messagingSenderId: "1007892951941",
        appId: "1:1007892951941:web:692984898e47747307caec"
    };

    const app = initializeApp(fbConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const APP_ID = "hx_v4_final";

    let me = null;
    let isReg = false;
    let activeUnsub = null;

    const applyTheme = (t) => {
        if(t === 'light') document.body.classList.add('light-theme');
        else document.body.classList.remove('light-theme');
        localStorage.setItem('hx_t', t);
    };
    applyTheme(localStorage.getItem('hx_t') || 'dark');

    const showLogin = () => {
        document.getElementById('nav-bar').classList.add('hidden');
        const scr = document.getElementById('screen');
        scr.innerHTML = `
            <div class="p-8 pt-24 max-w-sm mx-auto">
                <h1 class="text-5xl font-extrabold text-blue-600 mb-2 italic tracking-tighter">Hafland X</h1>
                <p class="text-zinc-500 font-bold text-xs mb-12">version 4.0 by Hafa Studio</p>
                
                <input id="auth-n" type="text" placeholder="Никнейм" class="auth-input">
                <input id="auth-p" type="password" placeholder="Пароль" class="auth-input">
                
                ${isReg ? `
                <div class="flex gap-4 mb-8 p-5 bg-zinc-900/30 rounded-2xl border border-white/5">
                    <input type="checkbox" id="agree" class="w-5 h-5 mt-1 accent-blue-600">
                    <label for="agree" class="text-[11px] text-zinc-500 leading-relaxed font-medium">Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент и содержание ваших сообщений внутри платформы.</label>
                </div>` : ''}

                <button onclick="window.doAuth()" class="blue-btn mb-6">${isReg ? 'Зарегистрироваться' : 'Войти'}</button>
                <button onclick="window.toggleM()" class="w-full text-blue-600 font-bold text-xs uppercase tracking-widest">
                    ${isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать'}
                </button>
            </div>`;
    };

    window.toggleM = () => { isReg = !isReg; showLogin(); };

    window.doAuth = async () => {
        const n = document.getElementById('auth-n').value.trim().toLowerCase();
        const p = document.getElementById('auth-p').value;
        if(!n || !p) return;
        if(isReg && !document.getElementById('agree').checked) return;

        try {
            await signInAnonymously(auth);
            const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', n);
            const snap = await getDoc(ref);
            if(isReg) {
                if(snap.exists()) throw "busy";
                const d = { nick: n, pass: p, bio: 'Использую Hafland X', avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${n}`, hidden: false, ts: Date.now() };
                await setDoc(ref, d); me = d;
            } else {
                if(!snap.exists() || snap.data().pass !== p) throw "err";
                me = snap.data();
            }
            localStorage.setItem('hx_s', n);
            window.goTab('chats');
        } catch(e) { alert("Ошибка авторизации: неверный пароль или ник занят"); }
    };

    window.goTab = (t) => {
        document.getElementById('nav-bar').classList.remove('hidden');
        if(activeUnsub) activeUnsub();
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        render(t);
        lucide.createIcons();
    };

    const render = (t) => {
        const scr = document.getElementById('screen');
        if(t === 'chats') {
            scr.innerHTML = `<div class="p-6 pt-12"><h2 class="text-3xl font-bold mb-8">Чаты</h2><div id="c-list" class="space-y-1"></div></div>`;
            loadChats();
        } else if(t === 'search') {
            scr.innerHTML = `<div class="p-6 pt-12"><h2 class="text-3xl font-bold mb-8">Поиск</h2><div id="u-list" class="space-y-2"></div></div>`;
            loadUsers();
        } else if(t === 'settings') {
            const isL = localStorage.getItem('hx_t') === 'light';
            scr.innerHTML = `
                <div class="p-6 pt-12">
                    <h2 class="text-3xl font-bold mb-8">Настройки</h2>
                    <div class="space-y-3">
                        <div class="p-5 bg-zinc-900/10 border border-white/5 rounded-3xl flex justify-between items-center">
                            <span class="font-semibold text-sm">Светлая тема</span>
                            <label class="switch"><input type="checkbox" ${isL?'checked':''} onchange="window.setT(this.checked)"><span class="slider"></span></label>
                        </div>
                        <div class="p-5 bg-zinc-900/10 border border-white/5 rounded-3xl flex justify-between items-center">
                            <span class="font-semibold text-sm">Инкогнито</span>
                            <label class="switch"><input type="checkbox" ${me.hidden?'checked':''} onchange="window.setH(this.checked)"><span class="slider"></span></label>
                        </div>
                        <div class="p-5 bg-zinc-900/10 border border-white/5 rounded-3xl space-y-3">
                            <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">О себе (Bio)</span>
                            <div class="flex gap-2">
                                <input id="bio-i" value="${me.bio}" class="flex-1 bg-transparent border-b border-white/10 py-1 outline-none text-sm">
                                <button onclick="window.saveBio()" class="text-blue-500 font-bold text-xs">OK</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        } else if(t === 'profile') {
            scr.innerHTML = `
                <div class="p-12 flex flex-col items-center">
                    <div class="relative mb-6">
                        <img src="${me.avatar}" class="w-28 h-28 rounded-full bg-zinc-900 border-2 border-blue-600/20">
                        <div class="absolute bottom-2 right-2 status-dot"></div>
                    </div>
                    <h3 class="text-3xl font-bold">${me.nick}</h3>
                    <p class="text-blue-500 text-xs font-bold uppercase mt-2 tracking-widest">${me.bio}</p>
                    <button onclick="localStorage.clear(); location.reload();" class="mt-24 text-red-500 font-bold text-[10px] uppercase tracking-widest opacity-60 hover:opacity-100 transition-opacity">Выход из акаунта</button>
                </div>`;
        }
    };

    window.saveBio = async () => {
        const b = document.getElementById('bio-i').value;
        me.bio = b;
        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', me.nick), { bio: b });
    };

    window.setT = (l) => applyTheme(l?'light':'dark');
    window.setH = async (h) => {
        me.hidden = h;
        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', me.nick), { hidden: h });
    };

    const loadUsers = () => {
        activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), (s) => {
            const l = document.getElementById('u-list'); if(!l) return;
            l.innerHTML = '';
            s.docs.forEach(d => {
                const u = d.data(); if(u.nick === me.nick || u.hidden) return;
                l.innerHTML += `
                    <div onclick="window.openChat('${u.nick}')" class="flex items-center gap-4 p-4 bg-zinc-900/5 rounded-2xl hover:bg-zinc-900/10 transition-colors">
                        <img src="${u.avatar}" class="w-12 h-12 rounded-full bg-zinc-900">
                        <div class="flex-1">
                            <p class="font-bold text-lg">${u.nick}</p>
                            <p class="text-zinc-500 text-xs truncate">${u.bio}</p>
                        </div>
                        <i data-lucide="chevron-right" class="text-zinc-600 w-4 h-4"></i>
                    </div>`;
            });
            lucide.createIcons();
        });
    };

    const loadChats = () => {
        activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
            const l = document.getElementById('c-list'); if(!l) return;
            const ms = new Map();
            s.docs.forEach(doc => {
                const m = doc.data();
                if(m.f === me.nick || m.t === me.nick) {
                    const o = m.f === me.nick ? m.t : m.f;
                    if(!ms.has(o) || ms.get(o).ts < m.ts) ms.set(o, m);
                }
            });
            l.innerHTML = ms.size === 0 ? '<div class="flex flex-col items-center py-20 opacity-20"><i data-lucide="message-square" class="w-12 h-12 mb-2"></i><p class="text-sm font-bold italic">Пусто</p></div>' : '';
            [...ms.entries()].sort((a,b)=>b[1].ts - a[1].ts).forEach(([n, m]) => {
                l.innerHTML += `
                    <div onclick="window.openChat('${n}')" class="flex items-center gap-4 p-4 border-b border-white/5 active:bg-blue-600/5 transition-all">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${n}" class="w-14 h-14 rounded-full bg-zinc-900">
                        <div class="flex-1 overflow-hidden">
                            <div class="flex justify-between items-center mb-1"><span class="font-bold text-lg">${n}</span><span class="text-[9px] opacity-40">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>
                            <p class="text-zinc-500 text-sm truncate">${m.img?'[Медиа]':m.txt}</p>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        });
    };

    window.openChat = (other) => {
        document.getElementById('nav-bar').classList.add('hidden');
        const scr = document.getElementById('screen');
        scr.innerHTML = `
            <div class="flex flex-col h-screen">
                <header class="p-4 pt-8 flex items-center gap-4 border-b border-white/5 bg-black/50 backdrop-blur-md">
                    <button onclick="window.goTab('chats')"><i data-lucide="arrow-left"></i></button>
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="w-10 h-10 rounded-full bg-zinc-900">
                    <div>
                        <p class="font-bold text-lg leading-tight">${other}</p>
                        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Hafland Connect</p>
                    </div>
                </header>
                <div id="flow" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-32"></div>
                <footer class="p-4 fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gradient-to-t from-black via-black/90 to-transparent">
                    <div class="flex gap-2 items-center">
                        <button onclick="window.sendMedia('${other}')" class="p-4 bg-zinc-900/80 rounded-2xl text-zinc-400"><i data-lucide="paperclip"></i></button>
                        <div class="flex-1 relative">
                            <input id="msg-i" type="text" placeholder="Написать..." class="w-full bg-zinc-900/80 p-4 rounded-2xl outline-none border border-white/5 pr-12">
                        </div>
                        <button onclick="window.send('${other}')" class="bg-blue-600 p-4 rounded-2xl text-white shadow-lg shadow-blue-600/20"><i data-lucide="arrow-up"></i></button>
                    </div>
                </footer>
            </div>`;
        lucide.createIcons();
        
        activeUnsub = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
            const f = document.getElementById('flow'); if(!f) return;
            const ms = s.docs.map(d=>({id:d.id,...d.data()}))
                .filter(m => (m.f===me.nick && m.t===other) || (m.f===other && m.t===user?.uid || m.f===other && m.t===me.nick))
                .sort((a,b)=>a.ts - b.ts);
            f.innerHTML = '';
            ms.forEach(m => {
                const isMe = m.f === me.nick;
                f.innerHTML += `
                    <div class="flex ${isMe?'justify-end':'justify-start'}">
                        <div class="bubble ${isMe?'me':'them'}">
                            ${m.img ? `<img src="${m.img}" class="rounded-xl mb-2 max-w-full border border-white/5" onerror="this.src='https://placehold.co/400x300?text=Error+Loading+Image'">` : ''}
                            <p>${m.txt || ''}</p>
                            <span class="block text-[8px] opacity-50 mt-1 text-right">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
                        </div>
                    </div>`;
            });
            f.scrollTop = f.scrollHeight;
        });
    };

    window.send = async (to) => {
        const i = document.getElementById('msg-i'); if(!i.value.trim()) return;
        const v = i.value; i.value = '';
        await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: me.nick, t: to, txt: v, ts: Date.now() });
    };

    window.sendMedia = async (to) => {
        const url = prompt("Введите прямую ссылку на фото или медиа:");
        if(!url) return;
        await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: me.nick, t: to, img: url, ts: Date.now() });
    };

    onAuthStateChanged(auth, async (u) => {
        const s = localStorage.getItem('hx_s');
        if(u && s) {
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', s));
            if(snap.exists()) { me = snap.data(); window.goTab('chats'); return; }
        }
        showLogin();
    });
</script>
</body>
</html>
