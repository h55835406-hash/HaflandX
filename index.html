<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafland X</title>
    <style>
        /* FIREBASE RULES:
        {
          "rules": {
            ".read": "auth != null",
            ".write": "auth != null"
          }
        }
        */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0e1621; color: #fff; height: 100vh; display: flex; overflow: hidden; }
        
        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #17212b; padding: 25px; border-radius: 10px; width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .modal h2 { text-align: center; color: #fff; font-size: 20px; }
        .modal input, .modal select { width: 100%; padding: 10px; background: #242f3d; border: 1px solid #17212b; color: #fff; border-radius: 5px; outline: none; }
        .modal button { padding: 10px; border: none; border-radius: 5px; background: #2b5278; color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .modal button:hover { background: #33628e; }
        .error-msg { color: #ff595a; font-size: 14px; text-align: center; display: none; }
        .hidden { display: none !important; }

        /* Main Layout */
        #app { display: flex; width: 100%; height: 100%; }
        .left-panel { width: 300px; background: #17212b; display: flex; flex-direction: column; border-right: 1px solid #0e1621; }
        .left-header { padding: 10px 15px; display: flex; gap: 10px; align-items: center; }
        .burger { font-size: 24px; cursor: pointer; color: #7f91a4; }
        .search-box { flex: 1; background: #242f3d; padding: 8px 12px; border-radius: 20px; border: none; color: #fff; outline: none; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; background: #2b5278; cursor: pointer; }

        .right-panel { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        .chat-header { height: 55px; background: #17212b; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-weight: bold; font-size: 18px; border-bottom: 1px solid #0e1621; }
        .gear { font-size: 20px; cursor: pointer; color: #7f91a4; transition: 0.2s; }
        .gear:hover { color: #fff; }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 60%; padding: 8px 12px; border-radius: 12px; position: relative; word-wrap: break-word; font-size: 15px; display: flex; flex-direction: column; }
        .msg.me { background: #2b5278; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg.other { background: #182533; align-self: flex-start; border-bottom-left-radius: 0; }
        .msg.me::after { content: ''; position: absolute; bottom: 0; right: -8px; border-width: 8px 0 0 8px; border-style: solid; border-color: transparent transparent transparent #2b5278; }
        .msg.other::after { content: ''; position: absolute; bottom: 0; left: -8px; border-width: 8px 8px 0 0; border-style: solid; border-color: transparent #182533 transparent transparent; }
        .msg-name { font-size: 12px; color: #7f91a4; margin-bottom: 3px; font-weight: bold; }
        .msg-time { font-size: 11px; color: #7f91a4; align-self: flex-end; margin-top: 4px; }

        .input-area { background: #17212b; padding: 15px 20px; display: flex; gap: 15px; align-items: center; }
        .clip { font-size: 20px; color: #7f91a4; cursor: pointer; }
        .msg-input { flex: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: #2b5278; border: none; color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: #33628e; }
        .send-btn svg { width: 20px; height: 20px; fill: white; transform: translateX(-2px); }
    </style>
</head>
<body>

    <div id="login-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="l-title">Hafland X</h2>
            <input type="text" id="nick-input" placeholder="Ник" autocomplete="off">
            <input type="password" id="pass-input" placeholder="Пароль">
            <div id="login-error" class="error-msg">Неверный пароль</div>
            <button id="login-btn">Войти</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="s-title">Настройки</h2>
            <select id="lang-select">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
            <button id="logout-btn">Выход</button>
            <button id="close-settings" style="background: #242f3d;">Закрыть</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="left-panel">
            <div class="left-header">
                <div class="burger">☰</div>
                <input type="text" id="search-input" class="search-box" placeholder="Поиск">
            </div>
            <div class="chat-list">
                <div class="chat-item">Global Chat</div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="chat-header">
                <span>Hafland X</span>
                <div class="gear" id="open-settings">⚙</div>
            </div>
            <div class="messages" id="messages-container"></div>
            <div class="input-area">
                <div class="clip">📎</div>
                <input type="text" id="msg-input" class="msg-input" placeholder="Сообщение..." autocomplete="off">
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, set, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const dict = {
            ru: { nick: "Ник", pass: "Пароль", enter: "Войти", errPass: "Неверный пароль", search: "Поиск", set: "Настройки", logout: "Выход", close: "Закрыть", msg: "Сообщение..." },
            en: { nick: "Nickname", pass: "Password", enter: "Enter", errPass: "Wrong password", search: "Search", set: "Settings", logout: "Logout", close: "Close", msg: "Message..." },
            de: { nick: "Spitzname", pass: "Passwort", enter: "Eintreten", errPass: "Falsches Passwort", search: "Suche", set: "Einstellungen", logout: "Abmelden", close: "Schließen", msg: "Nachricht..." }
        };

        let currentLang = 'ru';
        let currentUser = localStorage.getItem('hafland_user') || null;

        const updateI18n = () => {
            const t = dict[currentLang];
            document.getElementById('nick-input').placeholder = t.nick;
            document.getElementById('pass-input').placeholder = t.pass;
            document.getElementById('login-btn').innerText = t.enter;
            document.getElementById('login-error').innerText = t.errPass;
            document.getElementById('search-input').placeholder = t.search;
            document.getElementById('s-title').innerText = t.set;
            document.getElementById('logout-btn').innerText = t.logout;
            document.getElementById('close-settings').innerText = t.close;
            document.getElementById('msg-input').placeholder = t.msg;
        };

        const showApp = () => {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadMessages();
        };

        document.getElementById('lang-select').addEventListener('change', (e) => {
            currentLang = e.target.value;
            updateI18n();
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const nick = document.getElementById('nick-input').value.trim();
            const pass = document.getElementById('pass-input').value;
            const errBox = document.getElementById('login-error');
            
            if(!nick || !pass) return;

            try {
                const userCred = await signInAnonymously(auth);
                const uid = userCred.user.uid;
                const userRef = ref(db, 'users/' + nick);
                const snap = await get(userRef);

                if (snap.exists()) {
                    if (snap.val().password !== pass) {
                        errBox.style.display = 'block';
                        return;
                    }
                } else {
                    await set(userRef, { password: pass, uid: uid });
                }
                
                errBox.style.display = 'none';
                localStorage.setItem('hafland_user', nick);
                currentUser = nick;
                showApp();
            } catch (e) { console.error(e); }
        });

        document.getElementById('open-settings').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.remove('hidden');
        });

        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.add('hidden');
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('hafland_user');
            location.reload();
        });

        const msgsContainer = document.getElementById('messages-container');
        
        const sendMessage = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !currentUser) return;
            
            await push(ref(db, 'messages'), {
                name: currentUser,
                text: text,
                time: Date.now()
            });
            input.value = '';
        };

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        const loadMessages = () => {
            msgsContainer.innerHTML = '';
            onChildAdded(ref(db, 'messages'), (data) => {
                const msg = data.val();
                const div = document.createElement('div');
                div.className = `msg ${msg.name === currentUser ? 'me' : 'other'}`;
                
                const d = new Date(msg.time);
                const timeStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
                
                div.innerHTML = `
                    ${msg.name !== currentUser ? `<div class="msg-name">${msg.name}</div>` : ''}
                    <div>${msg.text}</div>
                    <div class="msg-time">${timeStr}</div>
                `;
                msgsContainer.appendChild(div);
                msgsContainer.scrollTop = msgsContainer.scrollHeight;
            });
        };

        signInAnonymously(auth).then(() => {
            if(currentUser) showApp();
        });

        updateI18n();
    </script>
</body>
</html>
