<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: rgba(23, 23, 23, 0.9);
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: #0f172a;
        }

        .light-theme {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        #app-root { height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* Навигация как на скриншоте */
        .nav-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            padding: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            color: #64748b;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-btn.active { color: #3b82f6; }
        
        .nav-indicator {
            position: absolute;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .nav-btn i { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-btn span { font-size: 11px; font-weight: 600; }

        .screen-content { flex: 1; overflow-y: auto; padding-bottom: 110px; }

        .auth-input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 16px 20px;
            border-radius: 18px;
            width: 100%;
            outline: none;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .auth-input:focus { border-color: #3b82f6; }

        .loader-spin {
            width: 24px; height: 24px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark-theme">

    <div id="app-root">
        <div id="screen" class="screen-content no-scrollbar">
            <!-- Здесь появится контент или экран входа -->
        </div>

        <div id="nav-bar" class="nav-container hidden">
            <div id="indicator" class="nav-indicator"></div>
            <button onclick="window.goTab('chats', 0)" id="tab-chats" class="nav-btn active">
                <i data-lucide="message-square"></i>
                <span>Чаты</span>
            </button>
            <button onclick="window.goTab('contacts', 1)" id="tab-contacts" class="nav-btn">
                <i data-lucide="users"></i>
                <span>Контакты</span>
            </button>
            <button onclick="window.goTab('settings', 2)" id="tab-settings" class="nav-btn">
                <i data-lucide="settings"></i>
                <span>Настройки</span>
            </button>
            <button onclick="window.goTab('profile', 3)" id="tab-profile" class="nav-btn">
                <i data-lucide="user"></i>
                <span>Профиль</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, arrayUnion, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "hx_v25_stable";

        let user = null;
        let activeTab = 'chats';
        let isReg = false;

        const updateIcons = () => lucide.createIcons();

        // Тема
        const setUITheme = (mode) => {
            document.body.className = mode === 'light' ? 'light-theme' : 'dark-theme';
            localStorage.setItem('hx_theme', mode);
        };
        setUITheme(localStorage.getItem('hx_theme') || 'dark');

        // Рендер экрана входа
        const showLogin = () => {
            document.getElementById('nav-bar').classList.add('hidden');
            document.getElementById('screen').innerHTML = `
                <div class="p-8 pt-20 max-w-sm mx-auto">
                    <h1 class="text-5xl font-black text-blue-600 tracking-tighter mb-2">Hafland X</h1>
                    <p class="text-zinc-500 font-bold mb-10">Версия 2.5 Stable</p>
                    
                    <div class="space-y-4">
                        <input id="auth-nick" type="text" placeholder="Никнейм" class="auth-input">
                        <input id="auth-pass" type="password" placeholder="Пароль" class="auth-input">
                        
                        ${isReg ? `
                        <div class="flex gap-3 p-4 bg-blue-500/5 rounded-2xl border border-blue-500/10">
                            <input type="checkbox" id="agree" class="w-5 h-5 accent-blue-600">
                            <label for="agree" class="text-[11px] text-zinc-400">Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент.</label>
                        </div>` : ''}

                        <button id="auth-btn" onclick="window.doAuth()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-white active:scale-95 transition-all shadow-lg shadow-blue-600/20">
                            ${isReg ? 'ЗАРЕГИСТРИРОВАТЬСЯ' : 'ВОЙТИ'}
                        </button>

                        <button onclick="window.toggleMode()" class="w-full text-blue-500 font-bold text-sm">
                            ${isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Создать'}
                        </button>
                    </div>
                </div>
            `;
        };

        window.toggleMode = () => { isReg = !isReg; showLogin(); };

        window.doAuth = async () => {
            const nick = document.getElementById('auth-nick').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value;
            const btn = document.getElementById('auth-btn');

            if (!nick || !pass) return;
            if (isReg && !document.getElementById('agree').checked) return;

            btn.disabled = true;
            btn.innerHTML = `<div class="loader-spin mx-auto"></div>`;

            try {
                // Сначала анонимный вход для доступа к БД
                const cred = await signInAnonymously(auth);
                const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', nick);
                const snap = await getDoc(userRef);

                if (isReg) {
                    if (snap.exists()) throw new Error("Ник занят");
                    const data = { 
                        uid: cred.user.uid, 
                        nick, 
                        pass, 
                        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}`, 
                        friends: [],
                        ts: Date.now() 
                    };
                    await setDoc(userRef, data);
                    user = data;
                } else {
                    if (!snap.exists() || snap.data().pass !== pass) throw new Error("Неверные данные");
                    user = snap.data();
                }

                localStorage.setItem('hx_session', nick);
                startMessenger();
            } catch (e) {
                alert(e.message);
                btn.disabled = false;
                btn.innerText = isReg ? 'ЗАРЕГИСТРИРОВАТЬСЯ' : 'ВОЙТИ';
            }
        };

        const startMessenger = () => {
            document.getElementById('nav-bar').classList.remove('hidden');
            window.goTab('chats', 0);
        };

        window.goTab = (tab, idx) => {
            activeTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // Анимация индикатора
            const btn = document.getElementById('tab-' + tab);
            const ind = document.getElementById('indicator');
            ind.style.width = btn.offsetWidth + 'px';
            ind.style.height = btn.offsetHeight + 'px';
            ind.style.left = btn.offsetLeft + 'px';
            ind.style.top = btn.offsetTop + 'px';

            renderScreen();
            updateIcons();
        };

        const renderScreen = () => {
            const scr = document.getElementById('screen');
            if (activeTab === 'chats') {
                scr.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6">Чаты</h2><div id="chats-list" class="space-y-4"></div></div>`;
                loadChats();
            }
            if (activeTab === 'contacts') {
                scr.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-4">Поиск</h2><div id="search-list" class="space-y-3"></div></div>`;
                loadSearch();
            }
            if (activeTab === 'settings') {
                scr.innerHTML = `
                    <div class="p-6">
                        <h2 class="text-3xl font-black mb-8">Настройки</h2>
                        <div class="space-y-4">
                            <div class="p-5 bg-zinc-900/50 rounded-3xl border border-white/5 flex justify-between items-center">
                                <span class="font-bold">Темная тема</span>
                                <button onclick="window.toggleTheme()" class="w-12 h-6 bg-blue-600 rounded-full relative">
                                    <div class="absolute w-4 h-4 bg-white rounded-full top-1 left-1"></div>
                                </button>
                            </div>
                        </div>
                    </div>`;
            }
            if (activeTab === 'profile') {
                scr.innerHTML = `
                    <div class="p-10 flex flex-col items-center">
                        <img src="${user.avatar}" class="w-32 h-32 rounded-full border-4 border-blue-500/20 mb-6 bg-zinc-800">
                        <h2 class="text-4xl font-black mb-1">${user.nick}</h2>
                        <p class="text-blue-500 font-bold text-xs uppercase tracking-widest mb-12">Hafland User</p>
                        <button onclick="localStorage.clear(); location.reload();" class="w-full p-5 bg-red-500/10 text-red-500 font-black rounded-3xl">ВЫЙТИ ИЗ СИСТЕМЫ</button>
                    </div>`;
            }
        };

        window.toggleTheme = () => {
            const current = localStorage.getItem('hx_theme') || 'dark';
            setUITheme(current === 'dark' ? 'light' : 'dark');
            renderScreen();
        };

        const loadSearch = () => {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), (s) => {
                const list = document.getElementById('search-list');
                if (!list) return;
                list.innerHTML = '';
                s.docs.forEach(d => {
                    const u = d.data();
                    if (u.nick === user.nick) return;
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-zinc-900/30 rounded-3xl border border-white/5">
                            <div class="flex items-center gap-3">
                                <img src="${u.avatar}" class="w-12 h-12 rounded-full">
                                <span class="font-bold text-lg">${u.nick}</span>
                            </div>
                            <button onclick="window.openPrivate('${u.nick}')" class="bg-blue-600 p-3 rounded-2xl text-white"><i data-lucide="message-circle" class="w-5 h-5"></i></button>
                        </div>`;
                });
                updateIcons();
            });
        };

        const loadChats = () => {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const list = document.getElementById('chats-list');
                if (!list) return;
                const sessions = new Map();
                s.docs.forEach(doc => {
                    const m = doc.data();
                    if (m.from === user.nick || m.to === user.nick) {
                        const other = m.from === user.nick ? m.to : m.from;
                        if (!sessions.has(other) || sessions.get(other).ts < m.ts) sessions.set(other, m);
                    }
                });
                
                list.innerHTML = sessions.size === 0 ? `<p class="text-zinc-500 font-medium text-center py-20">У вас пока нет переписок</p>` : '';
                [...sessions.entries()].sort((a,b) => b[1].ts - a[1].ts).forEach(([name, m]) => {
                    list.innerHTML += `
                        <div onclick="window.openPrivate('${name}')" class="flex items-center gap-4 p-4 border-b border-white/5 active:bg-white/5 transition-all">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" class="w-14 h-14 rounded-full bg-zinc-800">
                            <div class="flex-1 overflow-hidden">
                                <div class="flex justify-between items-center mb-0.5">
                                    <span class="font-bold text-lg">${name}</span>
                                    <span class="text-[10px] text-zinc-500">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <p class="text-zinc-500 text-sm truncate">${m.text}</p>
                            </div>
                        </div>`;
                });
            });
        };

        window.openPrivate = (other) => {
            document.getElementById('nav-bar').classList.add('hidden');
            const scr = document.getElementById('screen');
            scr.innerHTML = `
                <div class="flex flex-col h-screen">
                    <div class="p-4 flex items-center gap-4 border-b border-white/5 sticky top-0 bg-black/50 backdrop-blur-xl z-20">
                        <button onclick="window.goTab('chats', 0)" class="p-2"><i data-lucide="chevron-left"></i></button>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="w-10 h-10 rounded-full">
                        <span class="font-bold text-xl">${other}</span>
                    </div>
                    <div id="flow" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-24"></div>
                    <div class="p-4 fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/80 backdrop-blur-md flex gap-2">
                        <input id="msg-input" type="text" placeholder="Сообщение..." class="flex-1 p-4 bg-zinc-900 rounded-2xl border border-white/5 outline-none text-white">
                        <button onclick="window.sendMsg('${other}')" class="bg-blue-600 p-4 rounded-2xl text-white"><i data-lucide="send"></i></button>
                    </div>
                </div>`;
            updateIcons();

            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const flow = document.getElementById('flow');
                if (!flow) return;
                const msgs = s.docs.map(d => d.data())
                    .filter(m => (m.from === user.nick && m.to === other) || (m.from === other && m.to === user.nick))
                    .sort((a,b) => a.ts - b.ts);
                flow.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.from === user.nick;
                    flow.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="chat-bubble ${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-200'}">
                                ${m.text}
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        };

        window.sendMsg = async (to) => {
            const inp = document.getElementById('msg-input');
            const txt = inp.value.trim();
            if (!txt) return;
            inp.value = '';
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), {
                from: user.nick, to, text: txt, ts: Date.now()
            });
        };

        // Старт системы
        onAuthStateChanged(auth, async (fbUser) => {
            const saved = localStorage.getItem('hx_session');
            if (fbUser && saved) {
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', saved));
                if (snap.exists()) {
                    user = snap.data();
                    startMessenger();
                    return;
                }
            }
            showLogin();
        });

    </script>
</body>
</html>
