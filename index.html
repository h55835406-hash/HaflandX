<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --main: #3388FF;
            --main-rgb: 51, 136, 255;
            --bg: #060912;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #F8FAFC;
            --text-sec: #94A3B8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        .light-theme {
            --bg: #F0F4F9;
            --glass: rgba(0, 0, 0, 0.02);
            --glass-thick: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text: #1E293B;
            --text-sec: #64748B;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(var(--main-rgb), 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(var(--main-rgb), 0.1) 0%, transparent 40%);
        }

        .screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            background: transparent;
            z-index: 10;
        }

        .screen.active { 
            display: flex;
            animation: screenIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes screenIn { 
            from { transform: scale(1.05); opacity: 0; filter: blur(10px); } 
            to { transform: scale(1); opacity: 1; filter: blur(0); } 
        }

        .header {
            padding: calc(20px + var(--safe-top)) 24px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(30px) saturate(180%); 
            background: var(--glass-thick);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-header { display: flex; align-items: center; gap: 12px; }
        .brand-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-header img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--main)); }

        .scroll-area { 
            flex: 1; overflow-y: auto; padding-bottom: 120px; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .input-field {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 18px 24px; color: var(--text);
            font-size: 16px; width: 100%; outline: none; 
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus { border-color: var(--main); background: var(--glass-thick); box-shadow: 0 0 0 4px rgba(var(--main-rgb), 0.1); }

        .btn-main {
            background: var(--main); color: #fff; border: none; border-radius: 22px;
            padding: 20px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 15px 30px rgba(var(--main-rgb), 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: var(--glass-thick);
            backdrop-filter: blur(40px) saturate(150%); 
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex; justify-content: space-around;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 4px; color: var(--text-sec); transition: 0.3s;
        }
        .nav-item.active { color: var(--main); }
        .nav-item i { width: 22px; height: 22px; }

        .card {
            margin: 12px 20px; padding: 18px; 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            display: flex; align-items: center; gap: 16px;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.98); background: var(--glass-thick); }

        .avatar { width: 56px; height: 56px; border-radius: 20px; object-fit: cover; background: var(--glass-thick); }

        /* Floating Streak Island */
        .streak-island {
            align-self: center;
            margin: 20px 0;
            padding: 8px 16px;
            background: var(--glass-thick);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 120, 0, 0.3);
            border-radius: 20px;
            display: flex; align-items: center; gap: 8px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 25px rgba(255, 100, 0, 0.1);
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .bubble {
            max-width: 80%; padding: 16px 20px; border-radius: 24px; font-size: 15px; margin: 6px 0;
            line-height: 1.4; position: relative;
        }
        .bubble.my { 
            align-self: flex-end; background: var(--main); color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 8px 20px rgba(var(--main-rgb), 0.2);
        }
        .bubble.other { 
            align-self: flex-start; background: var(--glass-thick); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; 
        }

        .toggle { width: 52px; height: 30px; background: var(--glass-thick); border-radius: 20px; position: relative; cursor: pointer; }
        .toggle.on { background: var(--main); }
        .toggle::after { content: ''; position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toggle.on::after { left: 26px; }

        .streak-tag {
            background: rgba(255, 100, 0, 0.15); color: #FF7800;
            padding: 6px 12px; border-radius: 14px; font-size: 13px; font-weight: 700;
            backdrop-filter: blur(5px);
        }

        #chat-msgs { padding: 20px; gap: 4px; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="screen-login" class="screen active">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <div style="text-align:center; margin-bottom:60px">
                <div style="position:relative; display:inline-block">
                    <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:100px; filter: drop-shadow(0 0 15px var(--main));">
                </div>
                <h1 style="font-size:36px; margin-top:20px; font-weight:900; letter-spacing:-1px">Hafland X</h1>
                <p style="color:var(--text-sec); font-size:15px; margin-top:8px">Прозрачность. Анонимность. Будущее.</p>
            </div>
            <div style="display:flex; flex-direction:column; gap:12px">
                <input type="text" id="l-nick" class="input-field" placeholder="Никнейм">
                <input type="password" id="l-pass" class="input-field" placeholder="Пароль">
                <button class="btn-main" onclick="authAction('login')" style="margin-top:10px">ВОЙТИ В СИСТЕМУ</button>
            </div>
            <p style="text-align:center; margin-top:30px; color:var(--text-sec); font-size:14px">
                Нет аккаунта? <span style="color:var(--main); font-weight:600" onclick="go('screen-reg')">Создать сейчас</span>
            </p>
        </div>
    </div>

    <div id="screen-reg" class="screen">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <h1 style="font-size:32px; font-weight:900; margin-bottom:10px">Новый профиль</h1>
            <p style="color:var(--text-sec); margin-bottom:40px">Начните свой путь в Hafland</p>
            <div style="display:flex; flex-direction:column; gap:12px">
                <input type="text" id="r-nick" class="input-field" placeholder="Уникальный ник">
                <input type="password" id="r-pass" class="input-field" placeholder="Надежный пароль">
                <label style="display:flex; gap:12px; align-items:center; background:var(--glass); padding:15px; border-radius:20px; border:1px solid var(--glass-border)">
                    <input type="checkbox" id="r-agree" style="width:18px; height:18px; accent-color:var(--main)">
                    <span style="font-size:12px; color:var(--text-sec); line-height:1.3">Я принимаю условия анонимности и правила сообщества</span>
                </label>
                <button class="btn-main" onclick="authAction('reg')" style="margin-top:10px">ПОДТВЕРДИТЬ</button>
            </div>
            <p style="text-align:center; margin-top:30px; color:var(--text-sec)" onclick="go('screen-login')">Уже с нами? <span style="color:var(--main); font-weight:600">Войти</span></p>
        </div>
    </div>

    <!-- Main -->
    <div id="screen-main" class="screen">
        <header class="header">
            <div class="brand-header">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png">
                <h1>Hafland X</h1>
            </div>
            <div style="background:var(--glass-thick); p:10px; border-radius:15px">
                <i data-lucide="sparkles" style="width:20px; color:var(--main)"></i>
            </div>
        </header>

        <div id="view-chats" class="tab-view" style="flex:1; display:flex; flex-direction:column">
            <div class="scroll-area" id="active-chats-list"></div>
        </div>

        <div id="view-people" class="tab-view" style="flex:1; display:none; flex-direction:column">
            <div style="padding:15px 20px">
                <input type="text" class="input-field" placeholder="Поиск анонимов..." style="padding:14px 20px; font-size:14px">
            </div>
            <div class="scroll-area" id="people-list"></div>
        </div>

        <div id="view-options" class="tab-view" style="flex:1; display:none; flex-direction:column; padding-top:20px">
            <div class="card" style="justify-content:space-between">
                <div><b>Режим инкогнито</b><p style="font-size:11px; color:var(--text-sec)">Скрыть профиль из поиска</p></div>
                <div id="tog-incog" class="toggle" onclick="setOpt('incog')"></div>
            </div>
            <div class="card" style="justify-content:space-between">
                <div><b>Светлая тема</b><p style="font-size:11px; color:var(--text-sec)">Для дневного использования</p></div>
                <div id="tog-theme" class="toggle" onclick="setOpt('theme')"></div>
            </div>
            <div class="card" style="justify-content:space-between" onclick="renameFire()">
                <div><b>Кастомный счётчик</b><p id="st-val" style="color:var(--main); font-size:13px">Огонек</p></div>
                <i data-lucide="chevron-right" style="width:18px; color:var(--text-sec)"></i>
            </div>
        </div>

        <div id="view-profile" class="tab-view" style="flex:1; display:none; flex-direction:column; align-items:center; padding-top:40px">
            <div style="position:relative">
                <div style="padding:8px; background:linear-gradient(135deg, var(--main), #FF00E5); border-radius:48px; box-shadow: 0 15px 35px rgba(var(--main-rgb), 0.3)">
                    <img id="p-ava" class="avatar" style="width:130px; height:130px; border-radius:40px; border:4px solid var(--bg)">
                </div>
                <div onclick="pickAva()" style="position:absolute; bottom:0; right:0; background:var(--main); width:44px; height:44px; border-radius:18px; border:4px solid var(--bg); display:flex; align-items:center; justify-content:center; box-shadow: 0 5px 15px rgba(0,0,0,0.2)">
                    <i data-lucide="plus" style="width:20px; color:white"></i>
                </div>
            </div>
            <h2 id="p-nick" style="margin-top:20px; font-size:26px; font-weight:800">...</h2>
            <div class="streak-tag" style="margin-top:12px">🔥 <span id="p-streak">0</span></div>
            
            <div style="width:100%; padding:0 24px; margin-top:35px">
                <p style="font-size:12px; font-weight:700; color:var(--text-sec); margin-left:15px; margin-bottom:8px">О СЕБЕ</p>
                <textarea id="p-bio" class="input-field" style="height:120px; resize:none" placeholder="Расскажите о себе всему миру..." onblur="updateMe()"></textarea>
            </div>
            
            <button onclick="logout()" style="color:#FF4B4B; background:rgba(255,75,75,0.05); padding:15px 30px; border-radius:18px; border:none; margin-top:40px; font-weight:700; font-size:14px">ВЫЙТИ ИЗ СИСТЕМЫ</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="tab('chats', this)"><i data-lucide="message-circle"></i></div>
            <div class="nav-item" onclick="tab('people', this)"><i data-lucide="compass"></i></div>
            <div class="nav-item" onclick="tab('options', this)"><i data-lucide="layers"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i data-lucide="smile"></i></div>
        </nav>
    </div>

    <!-- Chat -->
    <div id="screen-chat" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:16px">
                <div onclick="go('screen-main')" style="background:var(--glass); width:40px; height:40px; border-radius:14px; display:flex; align-items:center; justify-content:center">
                    <i data-lucide="chevron-left" style="width:24px"></i>
                </div>
                <img id="c-ava" class="avatar" style="width:44px; height:44px; border-radius:15px">
                <div>
                    <b id="c-nick" style="font-size:17px">...</b>
                    <p style="font-size:11px; color:#22C55E; display:flex; align-items:center; gap:4px">
                        <span style="width:6px; height:6px; background:#22C55E; border-radius:50%"></span> в сети
                    </p>
                </div>
            </div>
        </header>
        <div id="chat-msgs" class="scroll-area"></div>
        
        <div style="padding:20px 24px calc(25px + var(--safe-bottom)); background:var(--glass-thick); backdrop-filter: blur(40px); display:flex; gap:12px; align-items:center; border-top:1px solid var(--glass-border)">
            <input type="text" id="m-input" class="input-field" placeholder="Ваше сообщение..." style="margin:0; border-radius:25px" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--main); width:56px; height:56px; border-radius:22px; border:none; color:white; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 20px rgba(var(--main-rgb), 0.3)">
                <i data-lucide="send-horizontal" style="width:24px"></i>
            </button>
        </div>
    </div>

    <input type="file" id="f-pick" hidden onchange="upAva(this)">

    <script>
        const cfg = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();
        let me = null, activeChat = null, chatSub = null, currentOther = null;

        auth.onAuthStateChanged(async u => {
            if(u) {
                const d = await db.collection('users').doc(u.uid).get();
                if(d.exists) { 
                    me = {id: u.uid, ...d.data()}; 
                    sync(); 
                    go('screen-main'); 
                    listenChats();
                } else go('screen-reg');
            } else go('screen-login');
        });

        async function authAction(type) {
            const n = document.getElementById(type==='reg'?'r-nick':'l-nick').value.trim();
            const p = document.getElementById(type==='reg'?'r-pass':'l-pass').value;
            if(!n || !p) return;

            if(type === 'reg') {
                if(!document.getElementById('r-agree').checked) return;
                const check = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(check.exists) return alert("Этот ник уже занят");
                
                try {
                    const res = await auth.signInAnonymously();
                    const kitty = `https://cataas.com/cat?${Math.random()}`;
                    const data = { nick: n, pass: p, incog: false, streak: 0, stName: 'Огонек', bio: '', ava: kitty, theme: 'dark' };
                    await db.collection('users').doc(res.user.uid).set(data);
                    await db.collection('nicknames').doc(n.toLowerCase()).set({uid: res.user.uid});
                    location.reload();
                } catch(e) { alert("Ошибка сети"); }
            } else {
                const snap = await db.collection('nicknames').doc(n.toLowerCase()).get();
                if(!snap.exists) return alert("Пользователь не найден");
                const uDoc = await db.collection('users').doc(snap.data().uid).get();
                if(uDoc.data().pass === p) {
                    me = {id: snap.data().uid, ...uDoc.data()};
                    sync(); go('screen-main'); listenChats();
                } else alert("Неверный пароль");
            }
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screen-chat' && chatSub) { chatSub(); chatSub = null; }
            lucide.createIcons();
        }

        function sync() {
            document.getElementById('p-nick').innerText = me.nick;
            document.getElementById('p-streak').innerText = me.streak;
            document.getElementById('p-bio').value = me.bio;
            document.getElementById('st-val').innerText = me.stName;
            document.getElementById('p-ava').src = me.ava;
            document.getElementById('tog-incog').classList.toggle('on', me.incog);
            const isLight = me.theme === 'light';
            document.body.className = isLight ? 'light-theme' : 'dark-theme';
            document.getElementById('tog-theme').classList.toggle('on', isLight);
            lucide.createIcons();
        }

        function tab(t, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
            document.getElementById('view-'+t).style.display = 'flex';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(t === 'people') loadPeople();
            lucide.createIcons();
        }

        async function loadPeople() {
            const list = document.getElementById('people-list'); list.innerHTML = "";
            const snap = await db.collection('users').limit(20).get();
            snap.forEach(d => {
                const u = d.data();
                if(u.incog && d.id !== me.id) return;
                list.innerHTML += `
                    <div class="card" onclick="openChat('${d.id}', ${JSON.stringify(u).replace(/"/g, '&quot;')})">
                        <img src="${u.ava}" class="avatar">
                        <div style="flex:1">
                            <div style="display:flex; justify-content:space-between; align-items:center">
                                <b>${u.nick}</b>
                                ${u.streak > 0 ? `<span class="streak-tag">🔥 ${u.streak}</span>` : ''}
                            </div>
                            <p style="font-size:12px; color:var(--text-sec); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px">
                                ${u.bio || 'Аноним Hafland X'}
                            </p>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function openChat(id, otherData) {
            currentOther = {id, ...otherData};
            activeChat = me.id < id ? me.id+'_'+id : id+'_'+me.id;
            document.getElementById('c-nick').innerText = currentOther.nick;
            document.getElementById('c-ava').src = currentOther.ava;
            go('screen-chat');
            
            chatSub = db.collection('chats').doc(activeChat).collection('m').orderBy('t','asc').onSnapshot(s => {
                const box = document.getElementById('chat-msgs'); 
                const oldScroll = box.scrollHeight;
                box.innerHTML = "";
                let msgs = [];
                s.forEach(d => msgs.push(d.data()));

                msgs.forEach((m, idx) => {
                    // Рендерим плавающий островок посередине, если есть стрик
                    if(idx === Math.floor(msgs.length/2) && (me.streak > 0 || currentOther.streak > 0)) {
                        box.innerHTML += `
                            <div class="streak-island">
                                <span style="font-size:12px; font-weight:800; color:#FF7800">
                                    🔥 ${me.stName}: ${me.streak} | ${currentOther.stName}: ${currentOther.streak}
                                </span>
                            </div>
                        `;
                    }
                    box.innerHTML += `<div class="bubble ${m.s === me.id ? 'my' : 'other'}">${m.txt}</div>`;
                });
                
                box.scrollTop = box.scrollHeight;
            });
        }

        function listenChats() {
            db.collection('chats').where('participants', 'array-contains', me.id).onSnapshot(async s => {
                const list = document.getElementById('active-chats-list'); 
                list.innerHTML = "";
                for (const d of s.docs) {
                    const c = d.data();
                    const otherId = c.participants.find(p => p !== me.id);
                    if(!otherId) continue;
                    const otherDoc = await db.collection('users').doc(otherId).get();
                    if(otherDoc.exists) {
                        const u = otherDoc.data();
                        list.innerHTML += `
                            <div class="card" onclick="openChat('${otherId}', ${JSON.stringify(u).replace(/"/g, '&quot;')})">
                                <img src="${u.ava}" class="avatar">
                                <div style="flex:1">
                                    <div style="display:flex; justify-content:space-between">
                                        <b>${u.nick}</b>
                                        <span style="font-size:10px; color:var(--text-sec)">${new Date(c.lastT).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                    </div>
                                    <p style="font-size:13px; color:var(--text-sec); margin-top:4px">${c.lastMsg || ''}</p>
                                </div>
                            </div>
                        `;
                    }
                }
                lucide.createIcons();
            });
        }

        async function send() {
            const inp = document.getElementById('m-input');
            const txt = inp.value.trim();
            if(!txt || !activeChat) return;
            
            const chatRef = db.collection('chats').doc(activeChat);
            inp.value = "";

            await chatRef.set({ 
                participants: [me.id, currentOther.id], 
                lastT: Date.now(),
                lastMsg: txt
            }, {merge: true});
            
            await chatRef.collection('m').add({ s: me.id, txt: txt, t: Date.now() });
        }

        function setOpt(type) {
            if(type === 'incog') me.incog = !me.incog;
            else me.theme = me.theme === 'light' ? 'dark' : 'light';
            sync();
            db.collection('users').doc(me.id).update(me);
        }

        function renameFire() {
            const val = prompt("Имя вашего счётчика:", me.stName);
            if(val) { me.stName = val; sync(); db.collection('users').doc(me.id).update({stName: val}); }
        }

        function pickAva() { document.getElementById('f-pick').click(); }
        function upAva(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                me.ava = e.target.result;
                sync();
                db.collection('users').doc(me.id).update({ava: me.ava});
            };
            r.readAsDataURL(f);
        }

        function updateMe() {
            me.bio = document.getElementById('p-bio').value;
            db.collection('users').doc(me.id).update({bio: me.bio});
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        lucide.createIcons();
    </script>
</body>
</html>
