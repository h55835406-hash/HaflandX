<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X 1.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            margin: 0;
            color: white;
            overflow: hidden;
        }
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        // Безопасная инициализация
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "hafland_v1_core";

        const App = () => {
            const [authState, setAuthState] = useState({ loaded: false, user: null });
            const [userData, setUserData] = useState(null);
            const [regName, setRegName] = useState('');
            const [regError, setRegError] = useState('');
            const [activeTab, setActiveTab] = useState('chats');
            const [currentChat, setCurrentChat] = useState(null);
            const [allUsers, setAllUsers] = useState([]);
            const [myChats, setMyChats] = useState([]);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const chatEndRef = useRef(null);

            // 1. Авторизация
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setAuthState({ loaded: true, user: u });
                    } else {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            console.error("Auth failed", e);
                            setAuthState({ loaded: true, user: null });
                        }
                    }
                });
                return unsub;
            }, []);

            // 2. Загрузка профиля
            useEffect(() => {
                if (!authState.user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(authState.user.uid)
                    .onSnapshot(doc => {
                        if (doc.exists) setUserData(doc.data());
                        else setUserData({ empty: true });
                    }, err => console.error("Profile listen err", err));
                return () => unsub();
            }, [authState.user]);

            // 3. Загрузка данных мира
            useEffect(() => {
                if (!authState.user || (userData && userData.empty)) return;

                const unsubUsers = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users')
                    .onSnapshot(s => setAllUsers(s.docs.map(d => d.data()).filter(u => u.uid !== authState.user.uid)));
                
                const unsubChats = db.collection('artifacts').doc(appId).collection('users').doc(authState.user.uid).collection('active_chats')
                    .orderBy('timestamp', 'desc')
                    .onSnapshot(s => setMyChats(s.docs.map(d => d.data())));

                return () => { unsubUsers(); unsubChats(); };
            }, [authState.user, userData]);

            const handleRegister = async () => {
                const nameTrimmed = regName.trim();
                const lowerName = nameTrimmed.toLowerCase();
                
                if (nameTrimmed.length < 3) return setRegError('Имя слишком короткое');
                setRegError('Checking name...');
                
                try {
                    const snapshot = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').get();
                    const isTaken = snapshot.docs.some(d => d.data().name?.toLowerCase() === lowerName);

                    if (isTaken) {
                        setRegError('Это имя уже занято');
                        return;
                    }

                    let stars = 100;
                    let role = 'User';
                    if (lowerName === 'hafa168') {
                        stars = 999000000000;
                        role = 'Admin';
                    }

                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(authState.user.uid).set({
                        uid: authState.user.uid,
                        name: nameTrimmed,
                        stars: stars,
                        role: role,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    setRegError('Ошибка сети. Попробуйте снова.');
                }
            };

            const openChat = (target) => {
                setCurrentChat(target);
                const chatId = [authState.user.uid, target.uid].sort().join('_');
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(s => {
                        setMessages(s.docs.map(d => d.data()));
                        setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
            };

            const sendMessage = async () => {
                if (!inputText.trim() || !currentChat) return;
                const text = inputText;
                setInputText('');
                const chatId = [authState.user.uid, currentChat.uid].sort().join('_');
                
                const msgData = {
                    text,
                    senderId: authState.user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add(msgData);
                
                const updateEntry = (oid, tid, tname) => {
                    db.collection('artifacts').doc(appId).collection('users').doc(oid).collection('active_chats').doc(tid).set({
                        uid: tid, name: tname, lastMsg: text, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                };
                updateEntry(authState.user.uid, currentChat.uid, currentChat.name);
                updateEntry(currentChat.uid, authState.user.uid, userData.name);
            };

            // Loading state
            if (!authState.loaded || !userData) {
                return (
                    <div className="loading-screen">
                        <div className="text-2xl font-black italic mb-4 tracking-tighter">HAFLAND X</div>
                        <div className="spinner"></div>
                    </div>
                );
            }

            // Register screen
            if (userData.empty) {
                return (
                    <div className="h-screen w-full bg-[#020617] p-8 flex flex-col justify-center items-center text-center">
                        <h1 className="text-4xl font-black italic mb-2">IDENTITY</h1>
                        <p className="text-blue-500 text-[10px] font-bold uppercase tracking-widest mb-10">Create unique node name</p>
                        <input 
                            value={regName} 
                            onChange={e => setRegName(e.target.value)} 
                            placeholder="Enter name..." 
                            className="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl p-5 text-lg font-bold outline-none focus:border-blue-600 mb-2" 
                        />
                        {regError && <p className="text-red-500 text-[10px] font-bold uppercase mb-4">{regError}</p>}
                        <button onClick={handleRegister} className="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Connect</button>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full flex flex-col bg-[#020617] text-white">
                    <header className="pt-12 pb-4 px-6 flex justify-between items-center border-b border-white/5">
                        <div className="text-xl font-black italic tracking-tighter">HAFLAND X 1.0</div>
                        <div className="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-full border border-white/10">
                            <span className="text-xs font-black italic text-yellow-400">
                                {userData.stars >= 1000000000 ? '999B+' : userData.stars.toLocaleString()}
                            </span>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24">
                        {activeTab === 'chats' && (
                            <div className="p-4 space-y-6">
                                <div>
                                    <h3 className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-4 ml-1">Nodes Online</h3>
                                    <div className="flex gap-4 overflow-x-auto pb-2">
                                        {allUsers.map(u => (
                                            <div key={u.uid} onClick={() => openChat(u)} className="min-w-[64px] flex flex-col items-center gap-2">
                                                <div className={`w-14 h-14 rounded-full flex items-center justify-center font-black border-2 ${u.role === 'Admin' ? 'border-blue-500 bg-blue-500/10 shadow-[0_0_10px_rgba(59,130,246,0.3)]' : 'border-white/10 bg-slate-900'}`}>{u.name[0].toUpperCase()}</div>
                                                <span className="text-[9px] font-bold uppercase truncate w-full text-center">{u.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <h3 className="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1">Recent Sessions</h3>
                                    {myChats.map(c => (
                                        <div key={c.uid} onClick={() => openChat(c)} className="flex items-center gap-4 p-4 bg-slate-900/40 rounded-3xl border border-white/5">
                                            <div className="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center font-black uppercase border border-white/5">{c.name[0]}</div>
                                            <div className="flex-1 overflow-hidden">
                                                <div className="flex justify-between items-center"><span className="font-black text-sm italic uppercase">{c.name}</span><span className="text-[7px] text-slate-500 uppercase">Secure</span></div>
                                                <p className="text-xs text-slate-400 truncate mt-0.5">{c.lastMsg}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'profile' && (
                            <div className="p-8 flex flex-col items-center">
                                <div className={`w-28 h-28 rounded-full border-4 flex items-center justify-center text-4xl font-black italic mb-4 uppercase ${userData.role === 'Admin' ? 'border-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.2)]' : 'border-white/10'}`}>{userData.name[0]}</div>
                                <h2 className="text-2xl font-black italic uppercase tracking-tighter">{userData.name}</h2>
                                <p className="text-[9px] text-blue-500 font-black uppercase tracking-[0.3em] mt-2">{userData.role === 'Admin' ? 'Administrator' : 'Resident'}</p>
                                <div className="w-full bg-slate-900/80 rounded-[40px] p-8 mt-10 border border-white/5 flex flex-col items-center">
                                    <div className="text-4xl font-black italic mb-1 tracking-tighter">{userData.stars.toLocaleString()}</div>
                                    <span className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Available Stars</span>
                                </div>
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-[35px] p-1.5 flex gap-1 z-50 shadow-2xl">
                        {['chats', 'contacts', 'profile'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3.5 rounded-[30px] flex flex-col items-center transition-all ${activeTab === t ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>
                                <span className="text-[8px] font-black uppercase tracking-widest">{t === 'chats' ? 'Nodes' : t === 'contacts' ? 'Market' : 'ID'}</span>
                            </button>
                        ))}
                    </div>

                    {currentChat && (
                        <div className="fixed inset-0 bg-[#020617] z-[60] flex flex-col animate-in slide-in-from-right duration-300">
                            <header className="pt-12 pb-4 px-4 flex items-center border-b border-white/5 bg-[#020617]">
                                <button onClick={() => setCurrentChat(null)} className="p-3 text-2xl font-black leading-none">←</button>
                                <div className="w-9 h-9 bg-slate-800 rounded-full flex items-center justify-center font-black mr-3 uppercase border border-white/10">{currentChat.name[0]}</div>
                                <span className="font-black uppercase italic text-sm">{currentChat.name}</span>
                            </header>
                            <main className="flex-1 overflow-y-auto p-4 space-y-4">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.senderId === authState.user.uid ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] px-4 py-3 rounded-2xl text-[13.5px] font-medium ${m.senderId === authState.user.uid ? 'bg-blue-600 text-white rounded-tr-none shadow-lg shadow-blue-600/10' : 'bg-slate-900 text-white rounded-tl-none border border-white/5'}`}>{m.text}</div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-4 flex gap-2 pb-10 bg-[#020617]">
                                <input value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMessage()} placeholder="Secure message..." className="flex-1 bg-slate-900 border border-white/10 rounded-full px-5 py-3.5 outline-none focus:border-blue-600 text-white" />
                                <button onClick={sendMessage} className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-xl shadow-lg shadow-blue-600/20 active:scale-90 transition-transform">➤</button>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
