<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X 1.0</title>
    
    <!-- PWA Meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #020617;
            color: white;
            overflow: hidden;
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-gradient {
            background: linear-gradient(to bottom, #020617, #0f172a);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .admin-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Конфигурация вашего проекта Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "hafland-x-v1-production";

        const App = () => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [regName, setRegName] = useState('');
            const [regError, setRegError] = useState('');
            const [activeTab, setActiveTab] = useState('chats');
            const [currentChat, setCurrentChat] = useState(null);
            const [allUsers, setAllUsers] = useState([]);
            const [myChats, setMyChats] = useState([]);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const chatEndRef = useRef(null);

            // Инициализация Auth
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                    } else {
                        try {
                            await auth.signInAnonymously();
                        } catch (e) { console.error(e); }
                    }
                    setIsAuthLoading(false);
                });
                return unsub;
            }, []);

            // Слушатель данных своего профиля
            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(user.uid)
                    .onSnapshot(doc => {
                        if (doc.exists) setUserData(doc.data());
                        else setUserData({ empty: true });
                    });
                return () => unsub();
            }, [user]);

            // Загрузка списков (Люди и Чаты)
            useEffect(() => {
                if (!user || (userData && userData.empty)) return;

                const unsubUsers = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users')
                    .onSnapshot(s => setAllUsers(s.docs.map(d => d.data()).filter(u => u.uid !== user.uid)));
                
                const unsubChats = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('active_chats')
                    .orderBy('timestamp', 'desc')
                    .onSnapshot(s => setMyChats(s.docs.map(d => d.data())));

                return () => { unsubUsers(); unsubChats(); };
            }, [user, userData]);

            const handleRegister = async () => {
                const nameTrimmed = regName.trim();
                const lowerName = nameTrimmed.toLowerCase();
                
                if (nameTrimmed.length < 3) return setRegError('Имя слишком короткое');
                if (nameTrimmed.length > 15) return setRegError('Имя слишком длинное');

                setRegError('Проверка уникальности...');
                
                const snapshot = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').get();
                const isTaken = snapshot.docs.some(d => d.data().name?.toLowerCase() === lowerName);

                if (isTaken) {
                    setRegError('Это имя уже занято другим пользователем');
                    return;
                }

                // Логика hafa168
                let stars = 100;
                let role = 'User';
                if (lowerName === 'hafa168') {
                    stars = 999000000000;
                    role = 'Admin';
                }

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users').doc(user.uid).set({
                    uid: user.uid,
                    name: nameTrimmed,
                    stars: stars,
                    role: role,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const openChat = (target) => {
                setCurrentChat(target);
                const chatId = [user.uid, target.uid].sort().join('_');
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages')
                    .orderBy('timestamp', 'asc')
                    .onSnapshot(s => {
                        setMessages(s.docs.map(d => d.data()));
                        setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
            };

            const sendMessage = async () => {
                if (!inputText.trim() || !currentChat) return;
                const text = inputText;
                setInputText('');
                const chatId = [user.uid, currentChat.uid].sort().join('_');
                
                const msgData = {
                    text,
                    senderId: user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('chats').doc(chatId).collection('messages').add(msgData);
                
                const updateLastMsg = (ownerId, targetId, targetName) => {
                    db.collection('artifacts').doc(appId).collection('users').doc(ownerId).collection('active_chats').doc(targetId).set({
                        uid: targetId,
                        name: targetName,
                        lastMsg: text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                };

                updateLastMsg(user.uid, currentChat.uid, currentChat.name);
                updateLastMsg(currentChat.uid, user.uid, userData.name);
            };

            if (isAuthLoading || !userData) {
                return (
                    <div className="h-screen w-full bg-[#020617] flex flex-col items-center justify-center">
                        <div className="text-4xl font-black italic tracking-tighter text-white animate-pulse">HAFLAND X</div>
                        <div className="mt-4 text-[10px] text-blue-500 font-bold tracking-[0.3em] uppercase">v 1.0 Loading</div>
                    </div>
                );
            }

            // Регистрация
            if (userData.empty) {
                return (
                    <div className="h-screen w-full bg-[#020617] p-8 flex flex-col justify-center">
                        <div className="mb-12">
                            <h1 className="text-5xl font-black italic text-white tracking-tighter">IDENTITY</h1>
                            <p className="text-blue-500 font-bold uppercase text-[10px] tracking-widest mt-2">Hafland X Network Registration</p>
                        </div>
                        <div className="space-y-6">
                            <div className="relative">
                                <input 
                                    value={regName} 
                                    onChange={e => setRegName(e.target.value)} 
                                    placeholder="Enter your name..." 
                                    className="w-full bg-slate-900 border-2 border-slate-800 rounded-3xl p-6 text-xl font-bold text-white outline-none focus:border-blue-600 transition-all"
                                />
                            </div>
                            {regError && <p className="text-red-500 text-xs font-bold uppercase ml-2">{regError}</p>}
                            <button 
                                onClick={handleRegister} 
                                className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-3xl uppercase tracking-widest shadow-2xl shadow-blue-600/20 active:scale-95 transition-all"
                            >
                                Get Started
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full flex flex-col bg-[#020617] text-white">
                    {/* Header */}
                    <header className="pt-14 pb-4 px-6 flex justify-between items-end border-b border-white/5">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter">HAFLAND X <span className="text-blue-600 text-[12px] align-top ml-1">1.0</span></h1>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-900/50 px-4 py-2 rounded-full border border-white/5">
                            <div className="w-2 h-2 bg-yellow-400 rounded-full shadow-[0_0_8px_rgba(250,204,21,0.6)]"></div>
                            <span className="text-sm font-black tabular-nums">
                                {userData.stars >= 1000000000 ? '∞' : userData.stars.toLocaleString()}
                            </span>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto pb-32">
                        {activeTab === 'chats' && (
                            <div className="p-4 space-y-8 animate-fade">
                                <section>
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 ml-2">Available Nodes</h3>
                                    <div className="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                                        {allUsers.map(u => (
                                            <div key={u.uid} onClick={() => openChat(u)} className="flex flex-col items-center gap-2 min-w-[70px]">
                                                <div className={`w-16 h-16 rounded-full flex items-center justify-center text-xl font-black border-2 transition-all active:scale-90 ${u.role === 'Admin' ? 'border-blue-500 admin-glow bg-blue-500/10' : 'border-white/10 bg-slate-900'}`}>
                                                    {u.name[0].toUpperCase()}
                                                </div>
                                                <span className="text-[10px] font-bold truncate w-full text-center uppercase tracking-tighter">{u.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="space-y-3">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 ml-2">Recent Encrypted Chats</h3>
                                    {myChats.length === 0 ? (
                                        <div className="py-10 text-center text-slate-600 text-xs font-bold uppercase tracking-widest">No Active Sessions</div>
                                    ) : (
                                        myChats.map(c => (
                                            <div key={c.uid} onClick={() => openChat(c)} className="flex items-center gap-4 p-5 bg-slate-900/40 rounded-[32px] border border-white/5 active:bg-slate-800/60 transition-all">
                                                <div className="w-14 h-14 bg-slate-900 rounded-full border-2 border-white/5 flex items-center justify-center font-black text-xl uppercase">
                                                    {c.name[0]}
                                                </div>
                                                <div className="flex-1 overflow-hidden">
                                                    <div className="flex justify-between items-center mb-0.5">
                                                        <p className="font-black text-sm uppercase italic tracking-tighter">{c.name}</p>
                                                        <span className="text-[8px] text-slate-500 font-bold uppercase">SECURE</span>
                                                    </div>
                                                    <p className="text-xs text-slate-400 truncate font-medium">{c.lastMsg}</p>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </section>
                            </div>
                        )}

                        {activeTab === 'profile' && (
                            <div className="p-8 flex flex-col items-center animate-fade">
                                <div className={`w-32 h-32 rounded-full border-[6px] flex items-center justify-center text-5xl font-black italic mb-6 uppercase transition-all ${userData.role === 'Admin' ? 'border-blue-600 admin-glow shadow-blue-600/20' : 'border-white/5 bg-slate-900'}`}>
                                    {userData.name[0]}
                                </div>
                                <h2 className="text-3xl font-black uppercase italic tracking-tighter">{userData.name}</h2>
                                <div className="mt-2 px-4 py-1 bg-blue-600/10 rounded-full border border-blue-600/20">
                                    <p className="text-[10px] text-blue-500 font-black uppercase tracking-[0.3em]">
                                        {userData.role === 'Admin' ? 'System Administrator' : 'Hafland Resident'}
                                    </p>
                                </div>

                                <div className="mt-12 w-full bg-slate-900/60 rounded-[48px] p-10 flex flex-col items-center border border-white/5">
                                    <div className="flex items-center gap-4 mb-2 text-yellow-400">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.5 9.5H22L16 14.5L18.5 22L12 17.5L5.5 22L8 14.5L2 9.5H9.5L12 2Z"/></svg>
                                        <span className="text-5xl font-black italic tracking-tighter text-white">
                                            {userData.stars >= 1000000000 ? '999B+' : userData.stars.toLocaleString()}
                                        </span>
                                    </div>
                                    <span className="text-[10px] text-slate-500 font-black uppercase tracking-[0.4em] mb-10">Total Stars Balance</span>
                                    <button className="w-full bg-white text-black py-5 rounded-3xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
                                        Access Wallet
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-nav rounded-[40px] p-2 flex gap-1 z-40 shadow-2xl">
                        {[
                            { id: 'chats', label: 'Nodes', icon: <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/> },
                            { id: 'contacts', label: 'Discover', icon: <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8z"/> },
                            { id: 'profile', label: 'Identity', icon: <circle cx="12" cy="12" r="10" stroke="currentColor" fill="none" strokeWidth="2"/><circle cx="12" cy="10" r="3" stroke="currentColor" fill="none" strokeWidth="2"/><path d="M7 20.662V19c0-1.657 2.239-3 5-3s5 1.343 5 3v1.662" stroke="currentColor" fill="none" strokeWidth="2"/> },
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 flex flex-col items-center py-4 rounded-[32px] transition-all duration-300 ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/40' : 'text-slate-500'}`}>
                                <svg className="w-5 h-5 mb-1" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">{tab.icon}</svg>
                                <span className="text-[8px] font-black uppercase tracking-widest">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Chat Modal */}
                    {currentChat && (
                        <div className="fixed inset-0 bg-[#020617] z-[60] flex flex-col animate-in slide-in-from-right duration-300">
                            <header className="pt-14 pb-4 px-4 flex items-center border-b border-white/5">
                                <button onClick={() => setCurrentChat(null)} className="p-3 mr-2 active:bg-slate-800 rounded-full transition-colors text-white">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><path d="M15 18l-6-6 6-6"/></svg>
                                </button>
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black mr-3 uppercase border-2 ${currentChat.role === 'Admin' ? 'border-blue-500' : 'border-white/10'}`}>
                                    {currentChat.name[0]}
                                </div>
                                <div className="flex-1">
                                    <p className="font-black text-sm uppercase italic tracking-tighter">{currentChat.name}</p>
                                    <p className="text-[8px] text-green-500 font-bold uppercase tracking-widest">End-to-End Encrypted</p>
                                </div>
                            </header>

                            <main className="flex-1 overflow-y-auto p-4 space-y-4 chat-gradient">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex flex-col ${m.senderId === user.uid ? 'items-end' : 'items-start'}`}>
                                        <div className={`max-w-[85%] px-5 py-3.5 rounded-[28px] text-[14px] font-medium leading-relaxed ${m.senderId === user.uid ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-900 text-white border border-white/5 rounded-tl-none'}`}>
                                            {m.text}
                                        </div>
                                        <span className="text-[7px] text-slate-600 mt-1 font-bold uppercase mx-2">
                                            {m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...'}
                                        </span>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </main>

                            <footer className="p-4 flex gap-3 bg-[#020617] pb-10">
                                <input 
                                    value={inputText} 
                                    onChange={e => setInputText(e.target.value)} 
                                    onKeyPress={e => e.key === 'Enter' && sendMessage()} 
                                    placeholder="Type encrypted message..." 
                                    className="flex-1 bg-slate-900/80 border border-white/5 rounded-full px-6 py-4 text-sm font-medium outline-none focus:border-blue-600 transition-all text-white" 
                                />
                                <button onClick={sendMessage} className="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-600/30 active:scale-90 transition-transform">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                                </button>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
