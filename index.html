<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hafland X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: rgba(26, 32, 44, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: #111827;
            --item-bg: rgba(255, 255, 255, 0.03);
            --bubble-me: #2563eb;
            --bubble-other: #1f2937;
        }

        .light-theme {
            --bg-color: #f3f4f6;
            --text-color: #111827;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
            --item-bg: #ffffff;
            --bubble-me: #3b82f6;
            --bubble-other: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .nav-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            display: flex;
            padding: 6px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            color: #94a3b8;
            border-radius: 24px;
            transition: all 0.2s ease;
            background: none;
            border: none;
        }

        .nav-btn.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .nav-btn i { width: 22px; height: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 10px; font-weight: 700; }

        .screen-content { 
            height: 100vh; 
            overflow-y: auto; 
            padding-bottom: 120px; 
            -webkit-overflow-scrolling: touch;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(24px); }

        .auth-card {
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 32px;
        }

        .auth-input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 18px;
            border-radius: 20px;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .chat-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15px;
            word-wrap: break-word;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .setting-item {
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .legal-box {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body class="dark">

    <div id="app-root">
        <div id="screen" class="screen-content no-scrollbar"></div>

        <div id="nav-bar" class="nav-container hidden">
            <button onclick="window.goTab('chats', 0)" id="tab-chats" class="nav-btn active">
                <i data-lucide="message-circle"></i>
                <span>Чаты</span>
            </button>
            <button onclick="window.goTab('contacts', 1)" id="tab-contacts" class="nav-btn">
                <i data-lucide="search"></i>
                <span>Поиск</span>
            </button>
            <button onclick="window.goTab('settings', 2)" id="tab-settings" class="nav-btn">
                <i data-lucide="settings"></i>
                <span>Настройки</span>
            </button>
            <button onclick="window.goTab('profile', 3)" id="tab-profile" class="nav-btn">
                <i data-lucide="circle-user"></i>
                <span>Профиль</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLn2gSJqs9JBfbWS2Z2PSl_V_qZxNsW-k",
            authDomain: "hafland-x-66cdc.firebaseapp.com",
            projectId: "hafland-x-66cdc",
            storageBucket: "hafland-x-66cdc.firebasestorage.app",
            messagingSenderId: "1007892951941",
            appId: "1:1007892951941:web:692984898e47747307caec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "hx_v25_stable";

        let user = null;
        let isReg = false;
        let unsubMessages = null;

        const updateIcons = () => lucide.createIcons();

        const applyTheme = (mode) => {
            if (mode === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
            localStorage.setItem('hx_theme', mode);
        };
        applyTheme(localStorage.getItem('hx_theme') || 'dark');

        const showLogin = () => {
            document.getElementById('nav-bar').classList.add('hidden');
            document.getElementById('screen').innerHTML = `
                <div class="p-6 pt-16 max-w-md mx-auto">
                    <div class="mb-10">
                        <h1 class="text-5xl font-black text-blue-500 tracking-tighter italic">Hafland X</h1>
                        <p class="text-zinc-600 font-bold text-sm ml-1">v2.7 by Hafa Studio</p>
                    </div>
                    <div class="auth-card space-y-4">
                        <input id="auth-nick" type="text" placeholder="Ваш никнейм" class="auth-input">
                        <input id="auth-pass" type="password" placeholder="Пароль" class="auth-input">
                        
                        ${isReg ? `
                        <div class="legal-box">
                            <input type="checkbox" id="agree" class="w-5 h-5 accent-blue-500 mt-1">
                            <label for="agree" class="text-[10px] text-zinc-400 leading-tight font-medium">
                                Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент и содержание ваших сообщений внутри платформы.
                            </label>
                        </div>` : ''}

                        <button id="auth-btn" onclick="window.doAuth()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-white active:scale-95 transition-all">
                            ${isReg ? 'СОЗДАТЬ АККАУНТ' : 'ВОЙТИ'}
                        </button>
                        <button onclick="window.toggleMode()" class="w-full text-zinc-500 font-bold text-xs uppercase tracking-widest pt-2">
                            ${isReg ? 'Есть профиль? Войти' : 'Нет аккаунта? Регистрация'}
                        </button>
                    </div>
                </div>
            `;
            updateIcons();
        };

        window.toggleMode = () => { isReg = !isReg; showLogin(); };

        window.doAuth = async () => {
            const nick = document.getElementById('auth-nick').value.trim().toLowerCase();
            const pass = document.getElementById('auth-pass').value;
            const btn = document.getElementById('auth-btn');
            if (!nick || !pass) return;
            if (isReg && !document.getElementById('agree').checked) return;

            btn.disabled = true;
            try {
                await signInAnonymously(auth);
                const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', nick);
                const snap = await getDoc(userRef);
                if (isReg) {
                    if (snap.exists()) throw new Error("Ник занят");
                    const data = { nick, pass, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${nick}`, hidden: false, ts: Date.now() };
                    await setDoc(userRef, data);
                    user = data;
                } else {
                    if (!snap.exists() || snap.data().pass !== pass) throw new Error("Ошибка входа");
                    user = snap.data();
                }
                localStorage.setItem('hx_session', nick);
                window.goTab('chats', 0);
            } catch (e) {
                alert(e.message);
                btn.disabled = false;
            }
        };

        window.goTab = (tab, idx) => {
            document.getElementById('nav-bar').classList.remove('hidden');
            if (unsubMessages) { unsubMessages(); unsubMessages = null; }
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            renderTab(tab);
            updateIcons();
        };

        const renderTab = (tab) => {
            const scr = document.getElementById('screen');
            if (tab === 'chats') {
                scr.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6 italic">Сообщения</h2><div id="chats-list" class="space-y-1"></div></div>`;
                loadChats();
            }
            if (tab === 'contacts') {
                scr.innerHTML = `<div class="p-6"><h2 class="text-3xl font-black mb-6 italic">Поиск</h2><div id="user-list" class="space-y-3"></div></div>`;
                loadUsers();
            }
            if (tab === 'settings') {
                const isLight = localStorage.getItem('hx_theme') === 'light';
                scr.innerHTML = `
                    <div class="p-6 pt-10">
                        <h2 class="text-3xl font-black mb-8 italic">Настройки</h2>
                        <div class="space-y-4">
                            <div class="setting-item">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="sun" class="text-blue-500"></i>
                                    <span class="font-bold">Светлая тема</span>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="theme-toggle" ${isLight ? 'checked' : ''} onchange="window.handleTheme(this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="eye-off" class="text-purple-500"></i>
                                    <span class="font-bold">Инкогнито</span>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="incognito-toggle" ${user.hidden ? 'checked' : ''} onchange="window.handleIncognito(this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <p class="text-[10px] text-zinc-500 px-4 font-bold tracking-tight">В режиме инкогнито ваш ник не будет отображаться во вкладке «Поиск» у других пользователей.</p>
                        </div>
                    </div>`;
                updateIcons();
            }
            if (tab === 'profile') {
                scr.innerHTML = `
                    <div class="p-10 flex flex-col items-center">
                        <img src="${user.avatar}" class="w-32 h-32 rounded-full border-4 border-blue-500/10 mb-6 bg-zinc-800">
                        <h2 class="text-4xl font-black">${user.nick}</h2>
                        <p class="text-blue-500 font-bold text-xs mt-2 uppercase tracking-tighter">Hafland Cloud User</p>
                        <button onclick="localStorage.clear(); location.reload();" class="w-full p-5 bg-red-500/10 text-red-500 font-black rounded-3xl mt-12">ВЫЙТИ ИЗ ХАФЛАНД</button>
                    </div>`;
            }
        };

        window.handleTheme = (isLight) => { applyTheme(isLight ? 'light' : 'dark'); };

        window.handleIncognito = async (isHidden) => {
            user.hidden = isHidden;
            const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', user.nick);
            await updateDoc(userRef, { hidden: isHidden });
        };

        const loadUsers = () => {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users'), (s) => {
                const list = document.getElementById('user-list');
                if (!list) return;
                list.innerHTML = '';
                s.docs.forEach(d => {
                    const u = d.data();
                    if (u.nick === user.nick || u.hidden) return;
                    list.innerHTML += `
                        <div class="flex items-center justify-between p-4 bg-zinc-900/40 rounded-3xl border border-white/5">
                            <div class="flex items-center gap-4">
                                <img src="${u.avatar}" class="w-12 h-12 rounded-full bg-zinc-800">
                                <span class="font-bold text-lg">${u.nick}</span>
                            </div>
                            <button onclick="window.openChat('${u.nick}')" class="bg-blue-600 p-3 rounded-2xl text-white"><i data-lucide="send"></i></button>
                        </div>`;
                });
                updateIcons();
            });
        };

        const loadChats = () => {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const list = document.getElementById('chats-list');
                if (!list) return;
                const sessions = new Map();
                s.docs.forEach(doc => {
                    const m = doc.data();
                    if (m.f === user.nick || m.t === user.nick) {
                        const other = m.f === user.nick ? m.t : m.f;
                        if (!sessions.has(other) || sessions.get(other).ts < m.ts) sessions.set(other, m);
                    }
                });
                list.innerHTML = sessions.size === 0 ? `<p class="text-center text-zinc-600 py-20 font-bold italic">Диалогов нет</p>` : '';
                [...sessions.entries()].sort((a,b) => b[1].ts - a[1].ts).forEach(([name, m]) => {
                    list.innerHTML += `
                        <div onclick="window.openChat('${name}')" class="flex items-center gap-4 p-4 active:bg-blue-500/5 transition-all border-b border-white/5">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${name}" class="w-14 h-14 rounded-full bg-zinc-800">
                            <div class="flex-1 overflow-hidden">
                                <div class="flex justify-between items-center"><span class="font-bold text-lg">${name}</span></div>
                                <p class="text-zinc-500 text-sm truncate">${m.txt}</p>
                            </div>
                        </div>`;
                });
            });
        };

        window.openChat = (other) => {
            document.getElementById('nav-bar').classList.add('hidden');
            const scr = document.getElementById('screen');
            scr.innerHTML = `
                <div class="flex flex-col h-screen">
                    <div class="p-4 flex items-center gap-4 border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-md z-50">
                        <button onclick="window.goTab('chats', 0)" class="p-2"><i data-lucide="arrow-left"></i></button>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${other}" class="w-10 h-10 rounded-full">
                        <span class="font-bold text-xl">${other}</span>
                    </div>
                    <div id="flow" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-28"></div>
                    <div class="p-4 fixed bottom-0 left-0 right-0 max-w-md mx-auto flex gap-2 bg-black">
                        <input id="msg-input" type="text" placeholder="Напишите сообщение..." class="flex-1 p-4 bg-zinc-900 rounded-2xl border border-white/5 outline-none text-white">
                        <button onclick="window.send('${other}')" class="bg-blue-600 p-4 rounded-2xl text-white"><i data-lucide="send-horizonal"></i></button>
                    </div>
                </div>`;
            updateIcons();
            unsubMessages = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (s) => {
                const flow = document.getElementById('flow');
                if (!flow) return;
                const msgs = s.docs.map(d => d.data())
                    .filter(m => (m.f === user.nick && m.t === other) || (m.f === other && m.t === user.nick))
                    .sort((a,b) => a.ts - b.ts);
                flow.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.f === user.nick;
                    flow.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><div class="chat-bubble ${isMe ? 'bg-blue-600 text-white' : 'bg-zinc-800 text-zinc-300'}">${m.txt}</div></div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        };

        window.send = async (to) => {
            const inp = document.getElementById('msg-input');
            const v = inp.value.trim();
            if (!v) return;
            inp.value = '';
            await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), { f: user.nick, t: to, txt: v, ts: Date.now() });
        };

        onAuthStateChanged(auth, async (fbUser) => {
            const saved = localStorage.getItem('hx_session');
            if (fbUser && saved) {
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', saved));
                if (snap.exists()) {
                    user = snap.data();
                    window.goTab('chats', 0);
                    return;
                }
            }
            showLogin();
        });
    </script>
</body>
</html>
