<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland X Ultra</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --main: #3388FF;
            --main-rgb: 51, 136, 255;
            --bg: #060912;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #F8FAFC;
            --text-sec: #94A3B8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        .light-theme {
            --bg: #F0F4F9;
            --glass: rgba(0, 0, 0, 0.02);
            --glass-thick: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text: #1E293B;
            --text-sec: #64748B;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(var(--main-rgb), 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(var(--main-rgb), 0.1) 0%, transparent 40%);
        }

        .screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            background: var(--bg);
            z-index: 10;
        }

        .screen.active { 
            display: flex;
            animation: screenIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes screenIn { 
            from { transform: scale(1.05); opacity: 0; filter: blur(10px); } 
            to { transform: scale(1); opacity: 1; filter: blur(0); } 
        }

        .header {
            padding: calc(20px + var(--safe-top)) 24px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(30px) saturate(180%); 
            background: var(--glass-thick);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-header { display: flex; align-items: center; gap: 12px; }
        .brand-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-header img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--main)); }

        .scroll-area { 
            flex: 1; overflow-y: auto; 
            padding-bottom: 120px; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .input-field {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 18px 24px; color: var(--text);
            font-size: 16px; width: 100%; outline: none; 
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus { border-color: var(--main); background: var(--glass-thick); box-shadow: 0 0 0 4px rgba(var(--main-rgb), 0.1); }

        .btn-main {
            background: var(--main); color: #fff; border: none; border-radius: 22px;
            padding: 20px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 15px 30px rgba(var(--main-rgb), 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: var(--glass-thick);
            backdrop-filter: blur(40px) saturate(150%); 
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex; justify-content: space-around;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); transition: 0.3s; }
        .nav-item.active { color: var(--main); }

        .card {
            margin: 12px 20px; padding: 18px; 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            display: flex; align-items: center; gap: 16px;
        }
        .card:active { transform: scale(0.98); background: var(--glass-thick); }

        .avatar { width: 56px; height: 56px; border-radius: 20px; object-fit: cover; background: var(--glass-thick); }

        .msg-container { display: flex; flex-direction: column; margin: 4px 0; position: relative; }

        .bubble {
            max-width: 80%; padding: 16px 20px; border-radius: 24px; font-size: 15px;
            line-height: 1.4; position: relative; word-wrap: break-word;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .bubble.my { 
            align-self: flex-end; background: var(--main); color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 8px 20px rgba(var(--main-rgb), 0.2);
        }
        .bubble.other { 
            align-self: flex-start; background: var(--glass-thick); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; 
        }

        .msg-actions { 
            position: absolute; top: 0; padding: 5px; cursor: pointer; color: var(--text-sec); opacity: 0.4;
        }
        .msg-container.my .msg-actions { left: -30px; }
        .msg-container.other .msg-actions { right: -30px; }
        .msg-container:hover .msg-actions { opacity: 1; }

        .reaction-bar {
            position: absolute; bottom: -15px; font-size: 12px;
            display: flex; gap: 4px; z-index: 5;
        }
        .msg-container.my .reaction-bar { right: 5px; }
        .msg-container.other .reaction-bar { left: 5px; }
        .reaction-item { 
            background: var(--glass-thick); backdrop-filter: blur(5px);
            padding: 2px 6px; border-radius: 10px; border: 1px solid var(--glass-border);
        }

        .deleting { transform: scale(0) !important; opacity: 0 !important; }
        
        .sticker-msg { width: 150px; height: 150px; object-fit: contain; margin: 10px 0; align-self: flex-end; transition: 0.4s; }
        .sticker-msg.other { align-self: flex-start; }

        .toggle { width: 52px; height: 30px; background: var(--glass-thick); border-radius: 20px; position: relative; cursor: pointer; }
        .toggle.on { background: var(--main); }
        .toggle::after { content: ''; position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toggle.on::after { left: 26px; }

        .streak-tag {
            background: rgba(255, 100, 0, 0.15); color: #FF7800;
            padding: 6px 12px; border-radius: 14px; font-size: 13px; font-weight: 700;
            backdrop-filter: blur(5px);
        }

        .streak-island-float {
            position: fixed; top: 120px; right: 20px;
            width: 100px; height: 100px; padding: 10px; z-index: 2000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            cursor: grab;
            animation: islandPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .streak-island-float b { font-size: 11px; margin-top: 5px; text-align: center; }
        .streak-island-float span { font-size: 10px; color: var(--main); font-weight: 800; }

        .kb-panel {
            background: var(--glass-thick); backdrop-filter: blur(50px);
            border-top: 1px solid var(--glass-border);
            height: 0; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .kb-panel.open { height: 350px; padding-bottom: var(--safe-bottom); }
        
        .sticker-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px;
            overflow-y: auto; flex: 1;
        }
        .sticker-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg); border: 1px solid var(--glass-border); border-radius: 30px; width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

        #chat-msgs { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>

    <!-- Auth Screens -->
    <div id="screen-login" class="screen active">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <div style="text-align:center; margin-bottom:60px">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png" style="width:100px; filter: drop-shadow(0 0 15px var(--main));">
                <h1 style="font-size:36px; margin-top:20px; font-weight:900; letter-spacing:-1px">Hafland X</h1>
            </div>
            <div style="display:flex; flex-direction:column; gap:12px">
                <input type="text" id="l-nick" class="input-field" placeholder="Никнейм">
                <input type="password" id="l-pass" class="input-field" placeholder="Пароль">
                <button class="btn-main" onclick="authAction('login')" style="margin-top:10px">ВОЙТИ В СИСТЕМУ</button>
            </div>
            <p style="text-align:center; margin-top:30px; color:var(--text-sec); font-size:14px">
                Нет аккаунта? <span style="color:var(--main); font-weight:600" onclick="go('screen-reg')">Создать</span>
            </p>
        </div>
    </div>

    <div id="screen-reg" class="screen">
        <div style="flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;">
            <h1 style="font-size:32px; font-weight:900; margin-bottom:40px">Регистрация</h1>
            <div style="display:flex; flex-direction:column; gap:12px">
                <input type="text" id="r-nick" class="input-field" placeholder="Придумайте ник">
                <input type="password" id="r-pass" class="input-field" placeholder="Пароль">
                <div style="background:var(--glass); padding:18px; border-radius:20px; border:1px solid var(--glass-border); margin-bottom:15px">
                    <label style="display:flex; gap:12px; font-size:12px; color:var(--text-sec); line-height:1.4">
                        <input type="checkbox" id="r-agree" style="width:18px; height:18px; accent-color:var(--main)">
                        Я соглашаюсь с тем, что Hafland X — это независимая площадка. Сервис не несет ответственности за контент.
                    </label>
                </div>
                <button class="btn-main" onclick="authAction('reg')">ПОДТВЕРДИТЬ</button>
            </div>
            <p style="text-align:center; margin-top:30px; color:var(--text-sec)" onclick="go('screen-login')">Уже с нами? <span style="color:var(--main); font-weight:600">Войти</span></p>
        </div>
    </div>

    <!-- Main Screens -->
    <div id="screen-main" class="screen">
        <header class="header">
            <div class="brand-header">
                <img src="https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-27_19-28-17-781.png">
                <h1>Hafland X</h1>
            </div>
            <div style="display:flex; gap:15px; align-items:center">
                <button onclick="showModal('modal-create-group')" style="background:var(--main); border:none; color:white; padding:8px 15px; border-radius:12px; font-weight:800; font-size:12px">ГРУППА +</button>
            </div>
        </header>

        <div id="view-chats" class="tab-view scroll-area"></div>
        <div id="view-people" class="tab-view scroll-area" style="display:none"></div>
        <div id="view-options" class="tab-view scroll-area" style="display:none; padding-top:20px">
            <div class="card" style="justify-content:space-between">
                <div><b>Режим инкогнито</b></div>
                <div id="tog-incog" class="toggle" onclick="setOpt('incog')"></div>
            </div>
            <div class="card" style="justify-content:space-between">
                <div><b>Светлая тема</b></div>
                <div id="tog-theme" class="toggle" onclick="setOpt('theme')"></div>
            </div>
        </div>

        <div id="view-profile" class="tab-view scroll-area" style="display:none; align-items:center; flex-direction:column; padding-top:40px">
            <img id="p-ava" class="avatar" style="width:130px; height:130px; border-radius:40px; border:4px solid var(--main)" onclick="pickAva()">
            <h2 id="p-nick" style="margin-top:20px; font-size:26px; font-weight:800">...</h2>
            <div class="streak-tag" style="margin-top:12px">🔥 <span id="p-streak">0</span></div>
            <div style="width:100%; padding:0 24px; margin-top:35px">
                <textarea id="p-bio" class="input-field" style="height:120px; resize:none" placeholder="О себе..." onblur="updateMe()"></textarea>
            </div>
            <button onclick="logout()" style="color:#FF4B4B; background:none; border:none; margin-top:40px; font-weight:700">ВЫЙТИ</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="tab('chats', this)"><i data-lucide="message-circle"></i></div>
            <div class="nav-item" onclick="tab('people', this)"><i data-lucide="compass"></i></div>
            <div class="nav-item" onclick="tab('options', this)"><i data-lucide="layers"></i></div>
            <div class="nav-item" onclick="tab('profile', this)"><i data-lucide="smile"></i></div>
        </nav>
    </div>

    <!-- Chat Screen -->
    <div id="screen-chat" class="screen">
        <header class="header">
            <div style="display:flex; align-items:center; gap:16px; flex:1">
                <i data-lucide="chevron-left" onclick="go('screen-main')"></i>
                <img id="c-ava" class="avatar" style="width:44px; height:44px; border-radius:15px">
                <b id="c-nick">...</b>
            </div>
            <div style="display:flex; gap:15px">
                <button onclick="createStreakIsland()" id="btn-fire" style="background:rgba(255,100,0,0.1); border:none; color:#FF7800; padding:8px 12px; border-radius:12px; font-weight:800; font-size:11px; display:none">СОЗДАТЬ ОГОНЁК</button>
            </div>
        </header>
        <div id="chat-msgs" class="scroll-area"></div>
        
        <div id="streak-island" class="streak-island-float" style="display:none" onmousedown="dragStart(event)" ontouchstart="dragStart(event)">
            <img id="si-img" src="" style="width:30px">
            <b id="si-name">Огонёк</b>
            <span id="si-count">0 дней</span>
        </div>

        <div style="background:var(--glass-thick); backdrop-filter: blur(40px); border-top:1px solid var(--glass-border)">
            <div style="padding:15px 20px; display:flex; gap:12px; align-items:center">
                <i data-lucide="sticker" onclick="toggleKB()"></i>
                <input type="text" id="m-input" class="input-field" placeholder="Сообщение..." style="margin:0">
                <button onclick="send()" style="background:var(--main); width:50px; height:50px; border-radius:18px; border:none; color:white; flex-shrink:0">
                    <i data-lucide="send-horizontal"></i>
                </button>
            </div>
            <div id="kb-panel" class="kb-panel">
                <div class="sticker-grid" id="sticker-grid"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-delete" class="modal">
        <div class="modal-content">
            <h3>Удалить сообщение?</h3>
            <p style="color:var(--text-sec); font-size:14px; margin:15px 0">Это действие нельзя отменить</p>
            <button class="btn-main" style="width:100%; background:#FF4B4B; margin-bottom:10px" id="btn-del-all">УДАЛИТЬ У ВСЕХ</button>
            <button class="btn-main" style="width:100%; background:var(--glass-thick); color:var(--text)" id="btn-del-me">УДАЛИТЬ У МЕНЯ</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-sec)">ОТМЕНА</button>
        </div>
    </div>

    <div id="modal-react" class="modal">
        <div class="modal-content" style="padding:20px">
            <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px" id="react-grid">
                <span>🔥</span><span>❤️</span><span>😂</span><span>👍</span><span>😢</span>
                <span>😮</span><span>🙏</span><span>💯</span><span>🎉</span><span>👀</span>
            </div>
            <p style="margin-top:20px; text-align:center; color:var(--text-sec); font-size:12px">Выберите реакцию или стикер</p>
            <div id="react-sticker-grid" class="sticker-grid" style="height:150px"></div>
        </div>
    </div>

    <div id="modal-create-group" class="modal">
        <div class="modal-content">
            <h2>Новая группа</h2>
            <input type="text" id="g-name" class="input-field" placeholder="Название" style="margin:15px 0">
            <button class="btn-main" style="width:100%" onclick="createGroup()">СОЗДАТЬ</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:var(--text-sec)">ОТМЕНА</button>
        </div>
    </div>

    <input type="file" id="f-pick" hidden onchange="upAva(this)">
    <input type="file" id="f-sticker" hidden onchange="upSticker(this)" accept="image/*">

    <script>
        const cfg = {
            apiKey: "AIzaSyDZ4RXIlFZMaTe0jSPs3g6Sq4g_d0Vy1Ys",
            authDomain: "haflind-24664.firebaseapp.com",
            projectId: "haflind-24664",
            storageBucket: "haflind-24664.firebasestorage.app",
            messagingSenderId: "906481888723",
            appId: "1:906481888723:web:43bbaebbe69e850e721326"
        };

        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();
        let me = null, activeChat = null, chatSub = null, currentOtherId = null, chatData = null;

        const ST_ON = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-28_01-14-11-937.png";
        const ST_OFF = "https://raw.githubusercontent.com/h55835406-hash/HaflandX/main/Picsart_26-02-28_01-13-54-413.png";

        auth.onAuthStateChanged(async u => {
            if(u) {
                const d = await db.collection('users').doc(u.uid).get();
                if(d.exists) { me = {id: u.uid, ...d.data()}; sync(); go('screen-main'); listenChats(); }
                else go('screen-reg');
            } else go('screen-login');
        });

        async function authAction(type) {
            const n = document.getElementById(type==='reg'?'r-nick':'l-nick').value.trim();
            const p = document.getElementById(type==='reg'?'r-pass':'l-pass').value;
            if(!n || !p) return;
            if(type === 'reg' && !document.getElementById('r-agree').checked) return;
            
            try {
                if(type === 'reg') {
                    const res = await auth.signInAnonymously();
                    const data = { nick: n, pass: p, incog: false, streak: 0, lastMsgTime: 0, stName: 'Огонек', bio: '', ava: '', theme: 'dark', stickers: [] };
                    await db.collection('users').doc(res.user.uid).set(data);
                    await db.collection('nicknames').doc(n.toLowerCase()).set({uid: res.user.uid});
                    location.reload();
                } else {
                    const sn = await db.collection('nicknames').doc(n.toLowerCase()).get();
                    if(sn.exists) {
                        const ud = await db.collection('users').doc(sn.data().uid).get();
                        if(ud.data().pass === p) { me = {id: sn.data().uid, ...ud.data()}; go('screen-main'); listenChats(); }
                    }
                }
            } catch(e) { }
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        }

        function tab(t, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
            document.getElementById('view-'+t).style.display = t === 'profile' ? 'flex' : 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(t === 'people') loadPeople();
            lucide.createIcons();
        }

        function sync() {
            document.getElementById('p-nick').innerText = me.nick;
            document.getElementById('p-streak').innerText = me.streak;
            document.getElementById('p-bio').value = me.bio;
            document.getElementById('p-ava').src = me.ava || ST_ON;
            document.body.className = me.theme === 'light' ? 'light-theme' : 'dark-theme';
            loadStickers();
        }

        async function loadPeople() {
            const list = document.getElementById('view-people');
            list.innerHTML = `<h2 style="padding:25px">Люди</h2>`;
            const snap = await db.collection('users').limit(20).get();
            snap.forEach(d => {
                const u = d.data(); if(u.incog && d.id !== me.id) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openChat(d.id, u);
                card.innerHTML = `<img src="${u.ava || ST_ON}" class="avatar"><div><b>${u.nick}</b><p style="font-size:12px; color:var(--text-sec)">${u.bio || 'Hafland User'}</p></div>`;
                list.appendChild(card);
            });
        }

        async function openChat(id, otherOrGroup) {
            currentOtherId = id; chatData = otherOrGroup;
            activeChat = otherOrGroup.isGroup ? id : (me.id < id ? me.id+'_'+id : id+'_'+me.id);
            document.getElementById('c-nick').innerText = otherOrGroup.nick || otherOrGroup.name;
            document.getElementById('c-ava').src = otherOrGroup.ava || ST_ON;
            document.getElementById('btn-fire').style.display = otherOrGroup.isGroup ? 'none' : 'block';
            go('screen-chat');
            
            if(chatSub) chatSub();
            chatSub = db.collection('chats').doc(activeChat).collection('m').orderBy('t','asc').onSnapshot(s => {
                const box = document.getElementById('chat-msgs'); box.innerHTML = "";
                s.forEach(d => {
                    const m = {id: d.id, ...d.data()};
                    const container = document.createElement('div');
                    container.className = `msg-container ${m.s === me.id ? 'my' : 'other'}`;
                    container.id = 'msg-' + m.id;
                    
                    let content = '';
                    if(m.type === 'sticker') content = `<img src="${m.txt}" class="sticker-msg ${m.s === me.id ? '' : 'other'}">`;
                    else content = `<div class="bubble ${m.s === me.id ? 'my' : 'other'}">${m.txt}</div>`;
                    
                    const actions = `<div class="msg-actions" onclick="showMsgMenu('${m.id}', '${m.s}')"><i data-lucide="more-vertical" style="width:16px"></i></div>`;
                    
                    let reactions = '';
                    if(m.reacts) {
                        reactions = `<div class="reaction-bar">` + Object.entries(m.reacts).map(([emo, count]) => `<div class="reaction-item">${emo} ${count}</div>`).join('') + `</div>`;
                    }

                    container.innerHTML = content + actions + reactions;
                    box.appendChild(container);
                });
                box.scrollTop = box.scrollHeight;
                lucide.createIcons();
            });
        }

        function showMsgMenu(mid, sender) {
            showModal('modal-react');
            document.getElementById('react-grid').onclick = (e) => { if(e.target.tagName === 'SPAN') addReact(mid, e.target.innerText); };
            const sGrid = document.getElementById('react-sticker-grid');
            sGrid.innerHTML = "";
            (me.stickers || []).forEach(s => {
                const img = document.createElement('img'); img.src = s;
                img.onclick = () => addReact(mid, s, true);
                sGrid.appendChild(img);
            });

            const delBtn = document.createElement('div');
            delBtn.innerHTML = `<button class="btn-main" style="width:100%; background:#FF4B4B; margin-top:15px">УДАЛИТЬ</button>`;
            delBtn.onclick = () => { closeModals(); confirmDelete(mid, sender === me.id); };
            sGrid.parentNode.appendChild(delBtn);
        }

        async function addReact(mid, val, isSticker = false) {
            const ref = db.collection('chats').doc(activeChat).collection('m').doc(mid);
            const key = isSticker ? `reacts.sticker_${Date.now()}` : `reacts.${val}`;
            await ref.update({ [key]: firebase.firestore.FieldValue.increment(1) });
            closeModals();
        }

        function confirmDelete(mid, isMine) {
            showModal('modal-delete');
            document.getElementById('btn-del-all').style.display = isMine ? 'block' : 'none';
            document.getElementById('btn-del-all').onclick = () => deleteMsg(mid, true);
            document.getElementById('btn-del-me').onclick = () => deleteMsg(mid, false);
        }

        async function deleteMsg(mid, forAll) {
            const el = document.getElementById('msg-' + mid);
            el.classList.add('deleting');
            setTimeout(async () => {
                if(forAll) await db.collection('chats').doc(activeChat).collection('m').doc(mid).delete();
                else el.remove(); 
                closeModals();
            }, 400);
        }

        function createStreakIsland() {
            const isl = document.getElementById('streak-island');
            isl.style.display = 'flex';
            document.getElementById('si-img').src = ST_ON;
            document.getElementById('si-name').innerText = me.stName || 'Огонёк';
            document.getElementById('si-count').innerText = (me.streak || 0) + ' дней';
        }

        async function send(sticker = null) {
            const inp = document.getElementById('m-input');
            const txt = sticker || inp.value.trim();
            if(!txt || !activeChat) return;
            if(!sticker) inp.value = "";
            const t = Date.now();
            await db.collection('chats').doc(activeChat).set({ participants: chatData.isGroup ? chatData.participants : [me.id, currentOtherId], lastT: t, lastMsg: sticker ? '[Стикер]' : txt, isGroup: !!chatData.isGroup }, {merge: true});
            await db.collection('chats').doc(activeChat).collection('m').add({ s: me.id, txt: txt, t: t, type: sticker ? 'sticker' : 'text' });
        }

        function listenChats() {
            db.collection('chats').where('participants', 'array-contains', me.id).onSnapshot(async s => {
                const list = document.getElementById('view-chats'); list.innerHTML = `<h2 style="padding:25px">Чаты</h2>`;
                for(const d of s.docs) {
                    const c = d.data(); let name = c.name || "Группа", ava = c.ava || ST_ON;
                    if(!c.isGroup) {
                        const oid = c.participants.find(p => p !== me.id);
                        const ud = await db.collection('users').doc(oid).get();
                        if(ud.exists) { name = ud.data().nick; ava = ud.data().ava || ST_ON; }
                    }
                    const card = document.createElement('div'); card.className = 'card';
                    card.onclick = () => openChat(c.isGroup ? d.id : c.participants.find(p=>p!==me.id), c);
                    card.innerHTML = `<img src="${ava}" class="avatar"><div><b>${name}</b><p style="font-size:12px; color:var(--text-sec)">${c.lastMsg || ''}</p></div>`;
                    list.appendChild(card);
                }
            });
        }

        // Utils
        function toggleKB() { document.getElementById('kb-panel').classList.toggle('open'); }
        function loadStickers() {
            const grid = document.getElementById('sticker-grid'); grid.innerHTML = "";
            (me.stickers || []).forEach(s => {
                const div = document.createElement('div'); div.className = 'sticker-item';
                div.innerHTML = `<img src="${s}">`;
                div.onclick = () => { send(s); toggleKB(); };
                grid.appendChild(div);
            });
        }
        function upSticker(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = async e => {
                await db.collection('users').doc(me.id).update({ stickers: firebase.firestore.FieldValue.arrayUnion(e.target.result) });
                me.stickers.push(e.target.result); loadStickers();
            }; r.readAsDataURL(f);
        }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function setOpt(t) { if(t==='incog') me.incog = !me.incog; else me.theme = me.theme==='light'?'dark':'light'; sync(); db.collection('users').doc(me.id).update({incog:me.incog, theme:me.theme}); }
        function pickAva() { document.getElementById('f-pick').click(); }
        function upAva(i) {
            const f = i.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = e => { me.ava = e.target.result; sync(); db.collection('users').doc(me.id).update({ava: me.ava}); };
            r.readAsDataURL(f);
        }
        function updateMe() { me.bio = document.getElementById('p-bio').value; db.collection('users').doc(me.id).update({bio: me.bio}); }
        function logout() { auth.signOut().then(() => location.reload()); }

        // Dragging
        let isDragging = false, offsetX, offsetY;
        function dragStart(e) {
            isDragging = true; const t = e.type === 'touchstart' ? e.touches[0] : e;
            const rect = document.getElementById('streak-island').getBoundingClientRect();
            offsetX = t.clientX - rect.left; offsetY = t.clientY - rect.top;
            document.addEventListener(e.type==='touchstart'?'touchmove':'mousemove', dragMove);
            document.addEventListener(e.type==='touchstart'?'touchend':'mouseup', dragEnd);
        }
        function dragMove(e) {
            if(!isDragging) return; const t = e.type === 'touchmove' ? e.touches[0] : e;
            const isl = document.getElementById('streak-island');
            isl.style.left = (t.clientX - offsetX) + 'px'; isl.style.top = (t.clientY - offsetY) + 'px';
            isl.style.right = 'auto';
        }
        function dragEnd() { isDragging = false; }

        lucide.createIcons();
    </script>
</body>
</html>
